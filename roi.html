<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Onyx ROI Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --emerald-accent: #10b981; 
            --neon-yellow: #facc15; 
            --deep-black: #020617; 
            --card-dark: #0f172a;
        }
        
        body { 
            background-color: var(--deep-black); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        .excel-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; font-size: 11px; }
        .excel-table th { 
            background: rgba(2, 6, 23, 0.8); 
            color: #94a3b8; 
            text-transform: uppercase; 
            padding: 12px 10px; 
            font-weight: 800;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .excel-table td { padding: 12px 10px; vertical-align: middle; transition: all 0.2s; }
        .excel-table tr:hover td { background: rgba(255,255,255,0.02); }

        .row-win { background: rgba(16, 185, 129, 0.08) !important; }
        .row-win td:first-child { border-left: 3px solid #10b981; }
        .row-win .text-status { color: #34d399; font-weight: 800; }

        .row-loss { background: rgba(239, 68, 68, 0.08) !important; }
        .row-loss td:first-child { border-left: 3px solid #ef4444; }
        .row-loss .text-status { color: #f87171; font-weight: 800; }

        .row-pending { background: rgba(250, 204, 21, 0.05) !important; }
        .row-pending td:first-child { border-left: 3px solid var(--neon-yellow); }
        
        .btn-action { width: 28px; height: 28px; border-radius: 6px; font-weight: bold; font-size: 10px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-action:hover { transform: translateY(-1px); filter: brightness(1.2); }
        .btn-win { background: #065f46; color: #34d399; border: 1px solid #064e3b; }
        .btn-loss { background: #7f1d1d; color: #fca5a5; border: 1px solid #7c2d12; }
        .btn-pending { background: #713f12; color: #fde047; border: 1px solid #422006; }
        
        .scroll-custom::-webkit-scrollbar { width: 4px; height: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        #filter-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; overflow: hidden; opacity: 0; }
        #filter-container.show { max-height: 1000px; opacity: 1; margin-top: 1rem; }
        
        .filter-input { background: #020617; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 6px 8px; color: #10b981; font-size: 11px; width: 100%; outline: none; transition: border 0.2s; }
        .filter-input:focus { border-color: var(--emerald-accent); }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 p-4 bg-slate-950/80 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt-lightning text-slate-950"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter">BETAGS <span class="text-emerald-500">ONYX LAB</span></h1>
            </div>
            <div class="flex gap-2 bg-slate-900 p-1 rounded-xl">
                <a href="index.html" class="px-4 py-1.5 text-xs font-bold text-slate-400 hover:text-white transition">Calculadora</a>
                <a href="roi.html" class="px-4 py-1.5 text-xs font-bold bg-emerald-500 text-slate-950 rounded-lg shadow-lg shadow-emerald-500/20">Dashboard ROI</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <div class="glass-card p-4 rounded-2xl border-t-2 border-t-emerald-500/50">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Profit Netto</p>
                <p id="stat-profit" class="text-2xl font-black mono text-emerald-400">$0.00</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border-t-2 border-t-blue-500/50">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Yield (%)</p>
                <p id="stat-yield" class="text-2xl font-black mono">0%</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border-t-2 border-t-purple-500/50">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Hit Rate</p>
                <p id="stat-hit" class="text-2xl font-black mono">0%</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border-t-2 border-t-red-500/50">
                <p class="text-[10px] text-red-500/80 uppercase font-bold mb-1">Drawdown</p>
                <p id="stat-dd" class="text-2xl font-black mono text-red-400">0.00u</p>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Total Picks</p>
                <p id="stat-count" class="text-2xl font-black mono">0</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border-t-2 border-t-yellow-500/50">
                <p class="text-[10px] text-yellow-500/80 uppercase font-bold mb-1">P-Value</p>
                <p id="stat-pvalue" class="text-2xl font-black mono text-yellow-500">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-card p-5 rounded-2xl">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-black uppercase text-emerald-500 tracking-widest">Miner Filters</h3>
                        <button onclick="toggleFilters()" class="text-slate-500 hover:text-white transition">
                            <i id="filter-chevron" class="fa-solid fa-sliders"></i>
                        </button>
                    </div>

                    <div id="filter-container" class="show">
                        <div class="space-y-4">
                            <select id="f_market" class="filter-input" onchange="updateStats()">
                                <option value="">Todos los Mercados</option>
                                <option value="OVER 2.5">Over 2.5</option>
                                <option value="UNDER 2.5">Under 2.5</option>
                                <option value="BTTS (SÍ)">BTTS (Sí)</option>
                                <option value="BTTS (NO)">BTTS (No)</option>
                            </select>

                            <select id="f_status" class="filter-input" onchange="updateStats()">
                                <option value="">Cualquier Resultado</option>
                                <option value="win">W - Ganadas</option>
                                <option value="loss">L - Perdidas</option>
                                <option value="pending">P - Pendientes</option>
                            </select>

                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[9px] text-slate-500 font-bold mb-1 block">CUOTA MIN</label>
                                    <input type="number" id="f_oc_min" step="0.1" class="filter-input" placeholder="1.50" oninput="updateStats()">
                                </div>
                                <div>
                                    <label class="text-[9px] text-slate-500 font-bold mb-1 block">CUOTA MAX</label>
                                    <input type="number" id="f_oc_max" step="0.1" class="filter-input" placeholder="5.00" oninput="updateStats()">
                                </div>
                            </div>

                            <div>
                                <label class="text-[9px] text-slate-500 font-bold mb-1 block">EDGE % MIN</label>
                                <input type="number" id="f_e_min" class="filter-input" placeholder="5%" oninput="updateStats()">
                            </div>

                            <div class="pt-4 border-t border-white/5 space-y-2">
                                <button onclick="exportToExcel()" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 text-slate-950 text-[10px] font-black rounded-lg uppercase transition">
                                    <i class="fa-solid fa-download mr-2"></i>Exportar CSV
                                </button>
                                <button onclick="clearHistory()" class="w-full py-2 text-red-500/50 hover:text-red-400 text-[10px] font-bold uppercase transition">Borrar Historial</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="glass-card p-5 rounded-2xl overflow-hidden">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-4 text-center tracking-widest">Equity Curve</p>
                    <div class="h-[180px]">
                        <canvas id="bankrollChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="glass-card rounded-2xl border border-white/5 overflow-hidden">
                    <div class="overflow-x-auto scroll-custom">
                        <table class="excel-table">
                            <thead>
                                <tr>
                                    <th class="text-left">Evento / Fecha</th>
                                    <th>Mercado</th>
                                    <th>Prob %</th>
                                    <th>C. Justa</th>
                                    <th>C. Casa</th>
                                    <th>Edge</th>
                                    <th>Stake</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'betags_v3_miner';
        let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let bChart;

        function toggleFilters() {
            document.getElementById('filter-container').classList.toggle('show');
        }

        function calculatePValue(n, yieldVal, avgOdd) {
            if (n < 5 || avgOdd <= 1) return null;
            const yieldDec = yieldVal / 100;
            const sd = Math.sqrt(avgOdd - 1) / Math.sqrt(n);
            const z = yieldDec / sd;
            const t = 1 / (1 + 0.5 * Math.abs(z));
            const ans = 1 - t * Math.exp(-z * z - 1.26551223 + t * (1.00002368 + t * (0.37409196 + t * (0.09678418 + t * (-0.18628806 + t * (0.27886807 + t * (-1.13520398 + t * (1.48851587 + t * (-0.82215223 + t * 0.17087277)))))))));
            const result = z >= 0 ? 1 - (ans + 1) / 2 : (ans + 1) / 2;
            return result;
        }

        function updateStats() {
            const f_market = document.getElementById('f_market').value;
            const f_status = document.getElementById('f_status').value;
            const ocMin = parseFloat(document.getElementById('f_oc_min').value) || -Infinity;
            const ocMax = parseFloat(document.getElementById('f_oc_max').value) || Infinity;
            const eMin = parseFloat(document.getElementById('f_e_min').value) || -Infinity;

            const filtered = bets.filter(b => {
                const matchM = !f_market || (b.market && b.market.toString().toUpperCase().includes(f_market.toUpperCase()));
                const matchS = !f_status || (b.status === f_status);
                const odd = Number(b.odd) || 0;
                const edge = parseFloat(b.edge?.toString().replace('%','')) || 0;
                return matchM && matchS && (odd >= ocMin && odd <= ocMax) && (edge >= eMin);
            });

            const resolved = filtered.filter(b => b.status === 'win' || b.status === 'loss');
            const sortedResolved = [...resolved].sort((a,b) => new Date(a.date) - new Date(b.date));
            
            const profit = sortedResolved.reduce((a, b) => a + (Number(b.profit) || 0), 0);
            const staked = sortedResolved.reduce((a, b) => a + (Number(b.stake) || 0), 0);
            
            let currentBank = 100, peak = 100, maxDD = 0;
            sortedResolved.forEach(b => {
                currentBank += Number(b.profit);
                if(currentBank > peak) peak = currentBank;
                let dd = peak - currentBank;
                if(dd > maxDD) maxDD = dd;
            });

            const wins = sortedResolved.filter(b => b.status === 'win').length;
            const avgOdd = sortedResolved.length > 0 ? sortedResolved.reduce((a, b) => a + (Number(b.odd) || 0), 0) / sortedResolved.length : 0;
            const currentYield = staked > 0 ? (profit/staked*100) : 0;
            
            document.getElementById('stat-profit').innerText = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "u";
            document.getElementById('stat-yield').innerText = currentYield.toFixed(1) + "%";
            document.getElementById('stat-hit').innerText = (sortedResolved.length > 0 ? (wins/sortedResolved.length*100).toFixed(1) : 0) + "%";
            document.getElementById('stat-dd').innerText = maxDD.toFixed(2) + "u";
            document.getElementById('stat-count').innerText = sortedResolved.length;

            const pVal = calculatePValue(sortedResolved.length, currentYield, avgOdd);
            const pElem = document.getElementById('stat-pvalue');
            if(pVal !== null) {
                pElem.innerText = (pVal * 100).toFixed(2) + "%";
                pElem.style.color = pVal < 0.05 ? "#10b981" : "#facc15";
            } else { pElem.innerText = "--"; }
            
            renderHistory(filtered);
            renderBankrollChart(sortedResolved);
        }

        function renderHistory(data) {
            const tbody = document.getElementById('history-body'); 
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-20 text-center text-slate-600 font-bold uppercase tracking-widest text-[10px]">No se encontraron registros</td></tr>';
                return;
            }

            [...data].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(b => {
                const tr = document.createElement('tr');
                const status = b.status || 'pending';
                tr.className = `row-${status}`;
                
                const probDisp = b.prob ? (Number(b.prob) * 100).toFixed(1) + "%" : "0%";
                const fairDisp = b.fair_odd ? Number(b.fair_odd).toFixed(2) : (b.prob ? (1/Number(b.prob)).toFixed(2) : "0.00");
                const edgeVal = parseFloat(b.edge?.toString().replace('%','')) || 0;

                tr.innerHTML = `
                    <td>
                        <div class="font-black text-slate-100 uppercase text-[10px]">${b.teams || 'Evento'}</div>
                        <div class="text-[9px] text-slate-500 mono">${b.date || ''}</div>
                    </td>
                    <td class="font-bold text-blue-400">${b.market || '-'}</td>
                    <td class="mono">${probDisp}</td>
                    <td class="mono text-slate-500">${fairDisp}</td>
                    <td class="mono font-bold text-slate-100">${b.odd || '0.00'}</td>
                    <td class="mono ${edgeVal > 0 ? 'text-emerald-400' : 'text-slate-500'} font-black">${edgeVal.toFixed(1)}%</td>
                    <td class="mono">${b.stake || '0'}u</td>
                    <td>
                        <div class="flex gap-1.5">
                            <button onclick="resolve('${b.id}', 'win')" class="btn-action btn-win">W</button>
                            <button onclick="resolve('${b.id}', 'loss')" class="btn-action btn-loss">L</button>
                            <button onclick="resolve('${b.id}', 'pending')" class="btn-action btn-pending">P</button>
                        </div>
                    </td>
                    <td><button onclick="deleteBet('${b.id}')" class="text-slate-700 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resolve(id, status) {
            const idx = bets.findIndex(x => x.id.toString() === id.toString());
            if(idx !== -1) {
                bets[idx].status = status;
                const odd = Number(bets[idx].odd) || 0;
                const stake = Number(bets[idx].stake) || 0;
                bets[idx].profit = status === 'win' ? stake * (odd - 1) : (status === 'loss' ? -stake : 0);
                saveAndRefresh();
            }
        }

        function renderBankrollChart(sortedResolved) {
            const ctx = document.getElementById('bankrollChart').getContext('2d');
            if(bChart) bChart.destroy();
            
            let current = 100;
            let chartData = [100];
            sortedResolved.forEach(b => { current += Number(b.profit); chartData.push(current); });

            const gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, 'rgba(16, 185, 129, 0.3)');
            gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

            bChart = new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: chartData.map((_,i)=>i), 
                    datasets: [{ 
                        data: chartData, 
                        borderColor: '#10b981', 
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true, 
                        tension: 0.4, 
                        pointRadius: 0,
                        pointHoverRadius: 5
                    }] 
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false }, 
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, 
                            ticks: { color: '#475569', font: { size: 9, family: 'JetBrains Mono' } } 
                        } 
                    }
                }
            });
        }

        function deleteBet(id) { if(confirm('¿Eliminar registro?')) { bets = bets.filter(x => x.id.toString() !== id.toString()); saveAndRefresh(); } }
        function saveAndRefresh() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); updateStats(); }
        function clearHistory() { if(confirm('¿Eliminar TODO el historial?')) { bets = []; saveAndRefresh(); } }
        
        function exportToExcel() {
            if (bets.length === 0) return;
            const headers = ["FECHA", "EQUIPOS", "MERCADO", "CUOTA", "STAKE", "PROFIT", "RESULTADO"];
            const rows = bets.map(b => [b.date, b.teams, b.market, b.odd, b.stake, b.profit, b.status].join(","));
            const csv = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `BetAGS_Onyx_ROI_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        window.onload = updateStats;
    </script>
</body>
</html>

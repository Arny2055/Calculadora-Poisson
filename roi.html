<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Análisis de ROI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th { background: rgba(255, 255, 255, 0.05); color: #10b981; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 2px solid rgba(16, 185, 129, 0.2); }
        .excel-table td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); vertical-align: middle; }
        
        /* ESTADOS DE FILA ACTUALIZADOS */
        .row-win { background: rgba(34, 197, 94, 0.05); }
        .row-loss { background: rgba(239, 68, 68, 0.05); }
        .row-pending { 
            background: rgba(255, 235, 0, 0.12) !important; /* Fondo amarillo más intenso */
            border-left: 4px solid var(--bet-yellow); /* Barra lateral amarilla */
        }
        .text-pending { color: #ffeb00 !important; }

        .btn-action { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; transition: all 0.2s; opacity: 0.8; }
        .btn-action:hover { opacity: 1; transform: scale(1.05); }
        .btn-win { background: #15803d; color: white; }
        .btn-loss { background: #b91c1c; color: white; }
        .btn-pending { background: #a16207; color: white; }
        
        .scroll-custom::-webkit-scrollbar { width: 6px; height: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="p-4 bg-slate-900/90 border-b border-emerald-500/20">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">BETAGS <span class="text-emerald-400">ROI LAB</span></h1>
            <div class="flex gap-2">
                <a href="index.html" class="px-3 py-1 text-sm bg-slate-800 rounded hover:bg-slate-700 transition">Calculadora</a>
                <a href="roi.html" class="px-3 py-1 text-sm bg-slate-700 text-yellow-400 rounded border border-yellow-400/30">ROI</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase">Profit Total</p>
                <p id="stat-profit" class="text-xl font-bold">$0.00</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase">Yield</p>
                <p id="stat-yield" class="text-xl font-bold">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase">Hit Rate</p>
                <p id="stat-hit" class="text-xl font-bold">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase">Picks</p>
                <p id="stat-count" class="text-xl font-bold">0</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center border border-emerald-500/30">
                <p class="text-[10px] text-emerald-400 uppercase font-bold">P-Value (Luck)</p>
                <p id="stat-pvalue" class="text-xl font-bold text-emerald-400">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-sm font-bold mb-4 uppercase text-emerald-400">Filtros y Datos</h3>
                    <div class="space-y-4">
                        <select id="f_market" class="w-full bg-slate-800 p-2 text-xs rounded border border-white/10" onchange="updateStats()">
                            <option value="">Todos los Mercados</option>
                            <option value="OVER 2.5">Over 2.5</option>
                            <option value="UNDER 2.5">Under 2.5</option>
                            <option value="BTTS YES">BTTS Yes</option>
                            <option value="BTTS NO">BTTS No</option>
                        </select>
                        <button onclick="exportToExcel()" class="w-full py-2 bg-emerald-700 hover:bg-emerald-600 text-white text-[10px] font-bold rounded uppercase">
                            <i class="fa-solid fa-file-excel mr-2"></i>Exportar Excel (.csv)
                        </button>
                        <button onclick="clearHistory()" class="w-full py-2 bg-red-900/30 text-red-400 text-[10px] font-bold rounded uppercase">Borrar Todo</button>
                    </div>
                </div>
                
                <div class="glass-card p-4 rounded-2xl">
                    <p class="text-[10px] text-slate-500 uppercase mb-2 text-center">Curva de Crecimiento</p>
                    <div class="h-[150px]">
                        <canvas id="bankrollChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="glass-card rounded-2xl overflow-hidden">
                    <div class="overflow-x-auto scroll-custom">
                        <table class="excel-table">
                            <thead>
                                <tr>
                                    <th>Evento / Fecha</th>
                                    <th>Mercado</th>
                                    <th>Prob %</th>
                                    <th>C. Justa</th>
                                    <th>C. Casa</th>
                                    <th>Edge</th>
                                    <th>Stake</th>
                                    <th>Resultado</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="history-body">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div id="loading-trigger" class="py-4 w-full flex justify-center items-center text-slate-500 text-[10px] uppercase tracking-widest">
                    <span>Fin del historial</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'betags_v3_miner';
        let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let bChart;

        function calculatePValue(n, yieldVal, avgOdd) {
            if (n < 5 || avgOdd <= 1) return null;
            const yieldDec = yieldVal / 100;
            const sd = Math.sqrt(avgOdd - 1) / Math.sqrt(n);
            const z = yieldDec / sd;
            const t = 1 / (1 + 0.5 * Math.abs(z));
            const ans = 1 - t * Math.exp(-z * z - 1.26551223 + t * (1.00002368 + t * (0.37409196 + t * (0.09678418 + t * (-0.18628806 + t * (0.27886807 + t * (-1.13520398 + t * (1.48851587 + t * (-0.82215223 + t * 0.17087277)))))))));
            const prob = z >= 0 ? 1 - (ans + 1) / 2 : (ans + 1) / 2;
            return prob;
        }

        function updateStats() {
            const filterVal = document.getElementById('f_market').value;
            const filtered = filterVal 
                ? bets.filter(b => b.market && b.market.toString().toUpperCase().includes(filterVal.toUpperCase())) 
                : bets;

            const resolved = filtered.filter(b => b.status === 'win' || b.status === 'loss');
            const profit = resolved.reduce((a, b) => a + (Number(b.profit) || 0), 0);
            const staked = resolved.reduce((a, b) => a + (Number(b.stake) || 0), 0);
            const wins = resolved.filter(b => b.status === 'win').length;
            const avgOdd = resolved.length > 0 ? resolved.reduce((a, b) => a + (Number(b.odd) || 0), 0) / resolved.length : 0;
            const currentYield = staked > 0 ? (profit/staked*100) : 0;
            
            document.getElementById('stat-profit').innerText = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "u";
            document.getElementById('stat-yield').innerText = currentYield.toFixed(1) + "%";
            document.getElementById('stat-hit').innerText = (resolved.length > 0 ? (wins/resolved.length*100).toFixed(1) : 0) + "%";
            document.getElementById('stat-count').innerText = resolved.length;

            const pVal = calculatePValue(resolved.length, currentYield, avgOdd);
            const pElem = document.getElementById('stat-pvalue');
            if(pVal !== null) {
                pElem.innerText = (pVal * 100).toFixed(2) + "%";
                pElem.className = pVal < 0.05 ? "text-xl font-bold text-emerald-400" : "text-xl font-bold text-yellow-500";
            } else { pElem.innerText = "--"; }
            
            renderHistory(filtered);
            renderBankrollChart(resolved);
        }

        function renderHistory(data) {
            const tbody = document.getElementById('history-body'); 
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="p-10 text-center text-slate-500">No se encontraron apuestas registradas.</td></tr>';
                return;
            }

            const displayData = [...data].reverse();
            
            displayData.forEach(b => {
                const tr = document.createElement('tr');
                const status = b.status || 'pending';
                tr.className = `row-${status}`;
                
                // MANTENER LÓGICA DE EDGE
                let edgeValue = 0;
                if (b.edge) {
                    const cleanEdge = b.edge.toString().replace('%', '').trim();
                    edgeValue = parseFloat(cleanEdge) || 0;
                }
                const edgeDisplay = edgeValue.toFixed(1) + "%";
                
                const probDisplay = b.prob ? (Number(b.prob) * 100).toFixed(1) + "%" : "N/A";
                const fairOddDisplay = b.fair_odd ? Number(b.fair_odd).toFixed(2) : (b.prob ? (1/Number(b.prob)).toFixed(2) : "N/A");

                tr.innerHTML = `
                    <td>
                        <div class="font-bold text-slate-200">${b.teams || 'Evento Desconocido'}</div>
                        <div class="text-[9px] text-slate-500">${b.date || ''} | ${b.league || ''}</div>
                    </td>
                    <td class="font-bold text-emerald-400">${b.market || '-'}</td>
                    <td>${probDisplay}</td>
                    <td>${fairOddDisplay}</td>
                    <td class="font-bold">${b.odd || '0.00'}</td>
                    <td class="${edgeValue > 0 ? 'text-emerald-400' : 'text-slate-400'}">${edgeDisplay}</td>
                    <td>${b.stake || '0'}u</td>
                    <td>
                        <div class="flex gap-1">
                            <button onclick="resolve('${b.id}', 'win')" class="btn-action btn-win">W</button>
                            <button onclick="resolve('${b.id}', 'loss')" class="btn-action btn-loss">L</button>
                            <button onclick="resolve('${b.id}', 'pending')" class="btn-action btn-pending">P</button>
                        </div>
                    </td>
                    <td>
                        <button onclick="deleteBet('${b.id}')" class="text-slate-600 hover:text-red-500 transition-colors px-2"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resolve(id, status) {
            const index = bets.findIndex(x => x.id.toString() === id.toString());
            if(index !== -1) {
                bets[index].status = status;
                const odd = Number(bets[index].odd);
                const stake = Number(bets[index].stake);

                if(status === 'pending') {
                    bets[index].profit = 0;
                } else if(status === 'win') {
                    bets[index].profit = stake * (odd - 1);
                } else {
                    bets[index].profit = -stake;
                }
                saveAndRefresh();
            }
        }

        function renderBankrollChart(resolved) {
            const ctx = document.getElementById('bankrollChart').getContext('2d');
            if(bChart) bChart.destroy();
            
            let current = 100;
            let chartData = [100];
            
            const sorted = [...resolved].sort((a,b) => new Date(a.date) - new Date(b.date));
            sorted.forEach(b => { 
                current += Number(b.profit); 
                chartData.push(current); 
            });

            bChart = new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: chartData.map((_,i)=>i), 
                    datasets: [{ 
                        label: 'Bankroll', 
                        data: chartData, 
                        borderColor: '#10b981', 
                        fill: true, 
                        backgroundColor: 'rgba(16,185,129,0.1)',
                        borderWidth: 2,
                        pointRadius: 2,
                        tension: 0.3 
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 9 } } },
                        x: { display: false } 
                    }
                }
            });
        }

        function deleteBet(id) { 
            if(confirm('¿Eliminar esta apuesta del historial?')) {
                bets = bets.filter(x => x.id.toString() !== id.toString()); 
                saveAndRefresh(); 
            }
        }
        
        function saveAndRefresh() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
            updateStats();
        }

        function clearHistory() { 
            if(confirm('¡ATENCIÓN! Se borrarán todos los datos del ROI. ¿Continuar?')) { 
                bets = []; 
                saveAndRefresh(); 
            } 
        }

        function exportToExcel() {
            if (bets.length === 0) return alert("No hay datos para exportar");
            const headers = ["FECHA", "LIGA", "EQUIPOS", "MERCADO", "CUOTA CASA", "STAKE", "PROFIT", "RESULTADO"];
            const rows = bets.map(b => [
                `"${b.date || ''}"`, `"${b.league || ''}"`, `"${b.teams || ''}"`, `"${b.market || ''}"`,
                `"${b.odd || ''}"`, `"${b.stake || ''}"`, `"${b.profit || 0}"`, `"${(b.status || 'PENDIENTE').toUpperCase()}"`
            ].join(","));
            const csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `ROI_BetAGS_${new Date().toLocaleDateString()}.csv`);
            link.click();
        }

        window.onload = updateStats;
    </script>
</body>
</html>

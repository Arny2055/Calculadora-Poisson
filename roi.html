<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Análisis de ROI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bet-green: #10b981; 
            --bet-yellow: #fbbf24; 
            --deep-black: #020617; 
            --card-bg: #0f172a;    
            --border-color: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2ff;
        }
        
        body { 
            background-color: var(--deep-black); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at top right, #064e3b20, transparent);
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.95); 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th { 
            background: #1e293b; 
            color: #10b981; 
            text-transform: uppercase; 
            padding: 12px 10px; 
            text-align: left; 
            border-bottom: 2px solid rgba(16, 185, 129, 0.3); 
        }
        .excel-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); vertical-align: middle; }
        
        .row-win { background: rgba(16, 185, 129, 0.08) !important; border-left: 4px solid #10b981; }
        .row-win td { color: #4ade80 !important; font-weight: 500; }
        
        .row-loss { background: rgba(239, 68, 68, 0.08) !important; border-left: 4px solid #ef4444; }
        .row-loss td { color: #f87171 !important; font-weight: 500; }
        
        .row-pending { background: rgba(251, 191, 36, 0.1) !important; border-left: 4px solid var(--bet-yellow); }
        .row-pending td { color: var(--bet-yellow) !important; font-weight: 500; }
        
        @keyframes glowing-profitable {
            0% { box-shadow: inset 0 0 5px rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.1); }
            50% { box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.2); }
            100% { box-shadow: inset 0 0 5px rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.1); }
        }

        @keyframes blue-flash {
            0% { box-shadow: 0 0 5px var(--neon-blue); opacity: 0.8; }
            50% { box-shadow: 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue); opacity: 1; }
            100% { box-shadow: 0 0 5px var(--neon-blue); opacity: 0.8; }
        }

        .combo-top-flash {
            background: #00e5ff !important;
            color: #000 !important;
            animation: blue-flash 1.5s infinite ease-in-out;
            border: none;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .profitable-alert {
            animation: glowing-profitable 2s infinite ease-in-out;
            border-left: 4px solid #10b981 !important;
        }

        .btn-action { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; transition: all 0.2s; }
        .btn-action:hover { transform: translateY(-1px); filter: brightness(1.2); }
        .btn-win { background: #059669; color: white; }
        .btn-loss { background: #dc2626; color: white; }
        .btn-pending { background: #d97706; color: white; }
        
        .scroll-custom::-webkit-scrollbar { width: 6px; height: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .scroll-custom::-webkit-scrollbar-thumb:hover { background: #10b981; }

        #filter-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; overflow: hidden; opacity: 0; }
        #filter-container.show { max-height: 2000px; opacity: 1; margin-top: 1rem; padding-bottom: 1rem; }
        
        .filter-mini { background: #020617; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 4px 6px; color: #10b981; font-size: 10px; width: 48%; outline: none; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .filter-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; font-weight: 600; width: 60px; }
        
        .dot-active { height: 8px; width: 8px; background-color: var(--bet-yellow); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--bet-yellow); }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.active { transform: rotate(180deg); }

        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }

        .market-checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            background: #020617;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .market-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .market-item input[type="checkbox"], .select-bet-checkbox {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid #10b981;
            border-radius: 3px;
            background: transparent;
            position: relative;
            cursor: pointer;
        }
        .market-item input[type="checkbox"]:checked, .select-bet-checkbox:checked {
            background: #10b981;
        }
        .market-item input[type="checkbox"]:checked::after, .select-bet-checkbox:checked::after {
            content: "✓";
            color: black;
            font-size: 10px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <nav class="p-4 bg-black/60 border-b border-emerald-500/10 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter">BETAGS <span class="text-emerald-500">ROI LAB</span></h1>
            <div class="flex flex-wrap gap-2">
                <a href="index.html" class="px-4 py-1.5 text-xs font-semibold bg-slate-900 rounded-full border border-slate-800 hover:border-emerald-500/50 transition">Poisson</a>
                <a href="roi.html" class="px-4 py-1.5 text-xs font-semibold bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/30">ROI Pre</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Profit Total</p>
                <p id="stat-profit" class="text-xl font-black text-white">$0.00</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Yield</p>
                <p id="stat-yield" class="text-xl font-black text-emerald-400">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Hit Rate</p>
                <p id="stat-hit" class="text-xl font-black text-blue-400">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-red-500/80 uppercase font-bold tracking-widest mb-1">Max Drawdown</p>
                <p id="stat-dd" class="text-xl font-black text-red-500">0.00u</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Total Picks</p>
                <p id="stat-count" class="text-xl font-black text-white">0</p>
            </div>
            <div class="glass-card p-4 rounded-xl text-center border-emerald-500/30">
                <p class="text-[10px] text-emerald-500 uppercase font-bold tracking-widest mb-1">P-Value</p>
                <p id="stat-pvalue" class="text-xl font-black text-emerald-400">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-5 rounded-2xl">
                    <button onclick="toggleFilters()" class="w-full flex justify-between items-center group">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-black uppercase text-emerald-500 tracking-tighter">Panel de Filtros</span>
                            <div id="active-indicator" class="hidden"><span class="dot-active"></span></div>
                        </div>
                        <i id="filter-chevron" class="fa-solid fa-chevron-down text-slate-500 group-hover:text-emerald-500 rotate-icon"></i>
                    </button>

                    <div id="filter-container">
                        <div class="space-y-4 pt-6">
                            <div class="pt-2">
                                <label class="text-[10px] text-emerald-400 uppercase font-black mb-2 block">Sincronización de Resultados</label>
                                <input type="text" id="sheet_id" placeholder="ID de la Hoja (Publicada como CSV)" class="w-full bg-slate-950 p-2.5 text-[10px] rounded-lg border border-emerald-500/20 text-slate-200">
                                <button onclick="syncResults()" class="w-full mt-2 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-[9px] font-black rounded uppercase transition-all">
                                    <i class="fa-solid fa-sync mr-1"></i> Sincronizar Resultados
                                </button>
                            </div>

                            <div>
                                <label class="text-[10px] text-slate-400 uppercase font-bold mb-2 block">Filtrar por Liga</label>
                                <select id="f_league" class="w-full bg-slate-950 p-2.5 text-[11px] rounded-lg border border-slate-800 text-slate-200" onchange="updateStats()">
                                    <option value="">Todas las Ligas</option>
                                </select>
                            </div>

                            <div>
                                <label class="text-[10px] text-slate-400 uppercase font-bold mb-2 block">Estado</label>
                                <select id="f_status" class="w-full bg-slate-950 p-2.5 text-[11px] rounded-lg border border-slate-800 text-slate-200" onchange="updateStats()">
                                    <option value="">Cualquier Resultado</option>
                                    <option value="win">W - Ganadas</option>
                                    <option value="loss">L - Perdidas</option>
                                    <option value="pending">P - Pendientes</option>
                                </select>
                            </div>

                            <div class="pt-4 border-t border-slate-800 space-y-3">
                                <p class="text-[10px] text-emerald-500 font-black uppercase">Rangos</p>
                                <div class="filter-row">
                                    <span class="filter-label">Cuota Casa</span>
                                    <input type="number" id="f_oc_min" placeholder="Min" class="filter-mini" oninput="updateStats()">
                                    <input type="number" id="f_oc_max" placeholder="Max" class="filter-mini" oninput="updateStats()">
                                </div>
                            </div>

                            <button onclick="resetFilters()" class="w-full text-[9px] text-slate-500 hover:text-white underline py-2 transition-colors">Limpiar filtros</button>

                            <div class="pt-4 border-t border-slate-800 space-y-2">
                                <button onclick="exportToExcel()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-black rounded-lg uppercase transition-all">
                                    <i class="fa-solid fa-file-excel mr-2"></i>Exportar CSV
                                </button>
                                <button onclick="clearHistory()" class="w-full py-2 bg-transparent text-red-500 hover:bg-red-500/10 text-[10px] font-bold rounded-lg uppercase transition-all">Borrar Historial</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="glass-card p-5 rounded-2xl">
                    <p class="text-[10px] text-slate-500 font-black uppercase mb-4 text-center tracking-widest">Equity Curve (u)</p>
                    <div class="h-[150px]">
                        <canvas id="bankrollChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Historial de Operaciones</h3>
                    <button id="btn-delete-bulk" onclick="deleteSelectedBets()" class="hidden bg-red-500/10 border border-red-500/40 text-red-500 px-3 py-1 rounded-full text-[10px] font-black">
                        ELIMINAR SELECCIONADOS
                    </button>
                </div>
                <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto scroll-custom">
                        <table class="excel-table">
                            <thead>
                                <tr>
                                    <th class="w-8">
                                        <input type="checkbox" id="master-checkbox" onchange="toggleSelectAll(this)" class="select-bet-checkbox">
                                    </th>
                                    <th>Evento / Fecha</th>
                                    <th>Mercado</th>
                                    <th>Prob %</th>
                                    <th>Justa</th>
                                    <th>Casa</th>
                                    <th>VAL %</th>
                                    <th>Edge</th>
                                    <th>Stake</th>
                                    <th>Resolución</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'betags_pre_match'; 
        let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let bChart;

        function cleanName(name) {
            if(!name) return "";
            return name.toString().toLowerCase()
                .replace(/\s+/g, '')
                .replace(/fc|utd|united|city|real|st|de|the/g, '')
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        async function syncResults() {
            let inputId = document.getElementById('sheet_id').value.trim();
            if(!inputId) { alert("Ingresa un ID de Google Sheets publicado."); return; }
            
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sincronizando...';

            try {
                let url = `https://docs.google.com/spreadsheets/d/${inputId}/export?format=csv&gid=0`;
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).map(row => row.split(','));
                
                let updatedCount = 0;
                bets.forEach(pick => {
                    if(pick.status === 'pending') {
                        let teamsPart = pick.teams.includes(':') ? pick.teams.split(':')[1] : pick.teams;
                        let teamsSplit = teamsPart.split(/VS|vs|-/);
                        if(teamsSplit.length < 2) return;

                        const pickLocal = cleanName(teamsSplit[0]);
                        const pickVisita = cleanName(teamsSplit[1]);
                        
                        const match = rows.find(r => {
                            if(r.length < 4) return false;
                            const csvLocal = cleanName(r[1]);
                            const csvVisita = cleanName(r[2]);
                            return (csvLocal.includes(pickLocal) || pickLocal.includes(csvLocal)) && 
                                   (csvVisita.includes(pickVisita) || pickVisita.includes(csvVisita));
                        });

                        if(match && match[3]?.includes('-')) {
                            const scores = match[3].split('-');
                            const gL = parseInt(scores[0]);
                            const gV = parseInt(scores[1]);
                            const market = pick.market.toUpperCase();
                            
                            let isWin = false;
                            if(market.includes("OVER 2.5")) isWin = (gL + gV > 2.5);
                            else if(market.includes("UNDER 2.5")) isWin = (gL + gV < 2.5);
                            else if(market.includes("BTTS YES")) isWin = (gL > 0 && gV > 0);
                            else if(market.includes("BTTS NO")) isWin = !(gL > 0 && gV > 0);
                            else if(market.includes("OVER 0.5 HT")) isWin = (gL + gV > 0); // Simplificado para FT si no hay HT

                            pick.status = isWin ? 'win' : 'loss';
                            pick.profit = isWin ? pick.stake * (pick.odd - 1) : -pick.stake;
                            updatedCount++;
                        }
                    }
                });

                saveAndRefresh();
                alert(`Sincronización finalizada. Se actualizaron ${updatedCount} apuestas.`);
            } catch (error) {
                alert("Error al leer el Sheet. Verifica que esté 'Publicado en la web'.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-sync mr-1"></i> Sincronizar Resultados';
            }
        }

        function updateStats() {
            const leagueSelect = document.getElementById('f_league');
            const leagues = new Set();
            bets.forEach(b => { if (b.teams?.includes(':')) leagues.add(b.teams.split(':')[0].trim()); });
            
            const f_status = document.getElementById('f_status').value;
            const f_league = leagueSelect.value;
            const ocMin = parseFloat(document.getElementById('f_oc_min').value) || -Infinity;
            const ocMax = parseFloat(document.getElementById('f_oc_max').value) || Infinity;

            let filtered = bets.filter(b => {
                const matchS = !f_status || (b.status === f_status);
                const matchL = !f_league || (b.teams && b.teams.startsWith(f_league));
                const odd = Number(b.odd) || 0;
                return matchS && matchL && (odd >= ocMin && odd <= ocMax);
            });

            renderHistory(filtered);

            const resolved = filtered.filter(b => b.status !== 'pending');
            const profit = resolved.reduce((a, b) => a + (Number(b.profit) || 0), 0);
            const staked = resolved.reduce((a, b) => a + (Number(b.stake) || 0), 0);
            const wins = resolved.filter(b => b.status === 'win').length;

            document.getElementById('stat-profit').innerText = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "u";
            document.getElementById('stat-profit').className = profit >= 0 ? "text-xl font-black text-emerald-400" : "text-xl font-black text-red-400";
            document.getElementById('stat-yield').innerText = staked > 0 ? (profit/staked*100).toFixed(1) + "%" : "0%";
            document.getElementById('stat-hit').innerText = resolved.length > 0 ? (wins/resolved.length*100).toFixed(1) + "%" : "0%";
            document.getElementById('stat-count').innerText = filtered.length;

            renderBankrollChart(resolved);
        }

        function renderHistory(data) {
            const tbody = document.getElementById('history-body'); 
            tbody.innerHTML = '';
            data.sort((a,b) => b.id - a.id).forEach(b => {
                const tr = document.createElement('tr');
                tr.className = `row-${b.status}`;
                const probNum = (Number(b.prob) * 100) || 0;
                const fair = b.prob ? (1/b.prob).toFixed(2) : "0.00";
                const edge = parseFloat(b.edge) || 0;

                tr.innerHTML = `
                    <td><input type="checkbox" class="select-bet-checkbox bet-item-checkbox" data-id="${b.id}" onchange="toggleBulkBtn()"></td>
                    <td><div class="font-bold text-slate-100">${b.teams}</div><div class="text-[9px] text-slate-500 uppercase">${b.date}</div></td>
                    <td class="font-bold text-emerald-500">${b.market}</td>
                    <td class="text-slate-400">${probNum.toFixed(1)}%</td>
                    <td class="text-slate-400">${fair}</td>
                    <td class="font-black text-white">${Number(b.odd).toFixed(2)}</td>
                    <td class="font-bold text-blue-400">${(probNum - (1/b.odd*100)).toFixed(1)}%</td>
                    <td class="${edge > 0 ? 'text-emerald-400 font-bold' : 'text-slate-500'}">${edge}%</td>
                    <td class="font-bold">${b.stake}u</td>
                    <td>
                        <div class="flex gap-1">
                            <button onclick="resolve('${b.id}', 'win')" class="btn-action btn-win">W</button>
                            <button onclick="resolve('${b.id}', 'loss')" class="btn-action btn-loss">L</button>
                        </div>
                    </td>
                    <td><button onclick="deleteBet('${b.id}')" class="text-slate-700 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderBankrollChart(resolved) {
            const ctx = document.getElementById('bankrollChart').getContext('2d');
            if(bChart) bChart.destroy();
            let current = 100; let chartData = [100];
            resolved.sort((a,b) => a.id - b.id).forEach(b => { current += Number(b.profit); chartData.push(current); });
            bChart = new Chart(ctx, { 
                type: 'line', 
                data: { labels: chartData.map((_,i)=>i), datasets: [{ data: chartData, borderColor: '#10b981', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0, backgroundColor: 'rgba(16, 185, 129, 0.1)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function resolve(id, status) {
            const idx = bets.findIndex(x => x.id.toString() === id.toString());
            if(idx !== -1) {
                bets[idx].status = status;
                bets[idx].profit = status === 'win' ? bets[idx].stake * (bets[idx].odd - 1) : -bets[idx].stake;
                saveAndRefresh();
            }
        }

        function toggleBulkBtn() {
            const checked = document.querySelectorAll('.bet-item-checkbox:checked').length;
            document.getElementById('btn-delete-bulk').classList.toggle('hidden', checked === 0);
        }

        function toggleSelectAll(master) {
            document.querySelectorAll('.bet-item-checkbox').forEach(cb => cb.checked = master.checked);
            toggleBulkBtn();
        }

        function deleteSelectedBets() {
            const ids = Array.from(document.querySelectorAll('.bet-item-checkbox:checked')).map(cb => cb.getAttribute('data-id'));
            bets = bets.filter(b => !ids.includes(b.id.toString()));
            saveAndRefresh();
        }

        function toggleFilters() { document.getElementById('filter-container').classList.toggle('show'); }
        function deleteBet(id) { bets = bets.filter(x => x.id.toString() !== id.toString()); saveAndRefresh(); }
        function saveAndRefresh() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); updateStats(); }
        function clearHistory() { if(confirm('¿Borrar todo?')) { bets = []; saveAndRefresh(); } }
        function exportToExcel() { 
            const csv = "Fecha,Evento,Mercado,Odd,Stake,Status,Profit\n" + bets.map(b => `${b.date},${b.teams},${b.market},${b.odd},${b.stake},${b.status},${b.profit}`).join("\n");
            window.open('data:text/csv;charset=utf-8,' + escape(csv));
        }

        window.onload = updateStats;
    </script>
</body>
</html>

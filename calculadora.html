<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Calculadora de Poisson</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bet-green: #006341;
            --bet-yellow: #ffeb00;
            --dark-bg: #050d0a;
            --card-bg: #111827;
            --accent-green: #00ff88;
        }
        body { 
            background-color: var(--dark-bg); 
            color: #f8fafc;
            background-image: radial-gradient(circle at top right, rgba(0, 255, 136, 0.05), transparent);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
        input, select {
            background-color: #1f2937 !important;
            color: white !important;
            border: 1px solid #374151 !important;
            border-radius: 0.5rem;
        }
        input:focus { border-color: var(--bet-yellow) !important; outline: none; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .recommendation-box {
            background: linear-gradient(90deg, #1e1b4b, #312e81);
            border: 1px solid #4338ca;
            padding: 15px;
            border-radius: 12px;
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px rgba(67, 56, 202, 0.2); }
            to { box-shadow: 0 0 15px rgba(67, 56, 202, 0.6); }
        }
        .strategy-match {
            background: rgba(16, 185, 129, 0.1) !important;
            border-left: 4px solid #10b981 !important;
        }
        .matrix-cell { padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">CALCULADORA</span>
            </h1>
            <div class="flex items-center gap-4">
                <div class="flex bg-slate-800 p-1 rounded-xl gap-1">
                    <a href="calculadora.html" class="px-4 py-2 rounded-lg text-sm font-bold bg-slate-700 text-bet-yellow">CALCULADORA</a>
                    <a href="analisis.html" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white">ANÁLISIS DE ROI</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE ESTRATÉGICO</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Esperando datos...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-bet-yellow uppercase tracking-tighter mb-4 italic">Configuración de Motor</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Liga</label>
                        <input type="text" id="league_name" class="w-full p-2 text-xs" placeholder="Ej: LaLiga">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Evento</label>
                        <input type="text" id="event_name" class="w-full p-2 text-xs" placeholder="Ej: RMA - FCB">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Línea Over/Under</label>
                    <input type="number" id="ou_line_input" step="0.25" class="w-full p-2 text-xs font-bold text-emerald-400" value="2.5">
                </div>
                <div class="space-y-4">
                    <div class="p-4 bg-slate-800/40 rounded-xl">
                        <p class="text-[10px] font-bold text-blue-400 mb-2 uppercase">Local (Media Goles)</p>
                        <input type="number" id="h_gf" step="0.01" class="w-full p-2 text-center" placeholder="Ej: 1.75">
                    </div>
                    <div class="p-4 bg-slate-800/40 rounded-xl">
                        <p class="text-[10px] font-bold text-orange-400 mb-2 uppercase">Visitante (Media Goles)</p>
                        <input type="number" id="a_gf" step="0.01" class="w-full p-2 text-center" placeholder="Ej: 1.25">
                    </div>
                </div>
                <button onclick="calculate()" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-sm transition-all uppercase tracking-widest">Ejecutar Simulación</button>
            </div>

            <div class="lg:col-span-2 glass-card p-6 rounded-2xl">
                <div class="h-[250px] mb-4">
                    <canvas id="poissonChart"></canvas>
                </div>
                <div id="score-matrix" class="grid grid-cols-6 gap-1 overflow-x-auto"></div>
            </div>
        </div>

        <div class="glass-card mt-6 rounded-2xl overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-slate-500 uppercase text-[10px]">
                    <tr>
                        <th class="p-4">Mercado</th>
                        <th class="p-4">Prob %</th>
                        <th class="p-4">Cuota Justa</th>
                        <th class="p-4">Cuota Mercado</th>
                        <th class="p-4">Edge %</th>
                        <th class="p-4">Stake Sugerido</th>
                        <th class="p-4 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="market-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        const KELLY_FRAC = 0.125;
        const BANKROLL_BASE = 100;
        let bets = JSON.parse(localStorage.getItem('betags_v3_miner')) || [];
        let tg_config = JSON.parse(localStorage.getItem('betags_tg_config')) || { token: "8389950970:AAEdYvy2mcmo5ydUMrR_tOIGR8QCYO1STuU", auto: false };
        let pChart;

        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poissonProb(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function calculate() {
            const h_lambda = parseFloat(document.getElementById('h_gf').value) || 0;
            const a_lambda = parseFloat(document.getElementById('a_gf').value) || 0;
            const ou_line = parseFloat(document.getElementById('ou_line_input').value) || 2.5;
            
            let h_p = [], a_p = [], labels = [];
            for(let i=0; i<=5; i++) { 
                labels.push(i + " G"); 
                h_p.push(poissonProb(i, h_lambda)); 
                a_p.push(poissonProb(i, a_lambda)); 
            }
            renderPoissonChart(labels, h_p, a_p);
            
            let p_over = 0, p_under = 0;
            const matrixContainer = document.getElementById('score-matrix');
            matrixContainer.innerHTML = '';
            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = poissonProb(h, h_lambda) * poissonProb(a, a_lambda);
                    if(h + a > ou_line) p_over += prob;
                    if(h + a < ou_line) p_under += prob;
                    const cell = document.createElement('div'); 
                    cell.className = 'matrix-cell'; 
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 2})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob * 100).toFixed(1)}%`; 
                    matrixContainer.appendChild(cell);
                }
            }
            renderMarketTable([
                { id: 'over', name: `OVER ${ou_line}`, prob: p_over, partner: 'under' },
                { id: 'under', name: `UNDER ${ou_line}`, prob: p_under, partner: 'over' }
            ]);
        }

        function renderMarketTable(data) {
            const table = document.getElementById('market-table');
            table.innerHTML = '';
            data.forEach(m => {
                const fairOdd = (1/m.prob).toFixed(2);
                table.innerHTML += `
                    <tr class="hover:bg-slate-800/30" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-200">${m.name}</td>
                        <td class="p-4 text-emerald-400 font-mono">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fairOdd}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-20 p-1 text-xs" oninput="updateEdge('${m.id}', ${m.prob}, '${m.name}')" id="odd_${m.id}"></td>
                        <td class="p-4 font-bold" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center">
                            <button onclick="registerBet('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600/20 text-emerald-400 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-emerald-600 hover:text-white">FIJAR</button>
                        </td>
                    </tr>`;
            });
        }

        function updateEdge(id, prob, marketName) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const league = document.getElementById('league_name').value || "Desconocida";
            if(odd > 1) {
                const edge = (odd * prob) - 1;
                const bankroll = BANKROLL_BASE + bets.reduce((acc, b) => acc + (b.profit || 0), 0);
                const stake = bankroll * Math.max(0, (edge / (odd - 1)) * KELLY_FRAC);
                
                const edgeEl = document.getElementById('edge_' + id);
                edgeEl.innerText = (edge * 100).toFixed(1) + "%";
                edgeEl.className = edge > 0 ? "p-4 text-emerald-400 font-bold" : "p-4 text-red-500";
                document.getElementById('stake_' + id).innerText = stake > 0 ? "$" + stake.toFixed(2) : "--";

                if(edge > 0.02) checkStrategy(league, marketName, odd);
            }
        }

        function checkStrategy(league, market, odd) {
            const history = JSON.parse(localStorage.getItem('backtesting_data')) || [];
            const assistantBox = document.getElementById('strategy-assistant-box');
            const relevant = history.filter(b => b.liga.toLowerCase() === league.toLowerCase() && b.mercado === market);
            
            if(relevant.length >= 3) {
                const profit = relevant.reduce((a, b) => a + b.profit, 0);
                if(profit > 0) {
                    assistantBox.classList.remove('hidden');
                    document.getElementById('strategy-text').innerHTML = `<span class="text-emerald-400">Patrón detectado: ${league} tiene Yield positivo en este mercado.</span>`;
                    document.getElementById('strategy-signal').innerText = "💎";
                }
            }
        }

        function registerBet(id, market, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value);
            if(!odd) return alert("Ingresa cuota");
            
            const edge = (odd * prob) - 1;
            const bankroll = BANKROLL_BASE + bets.reduce((acc, b) => acc + (b.profit || 0), 0);
            const stake = bankroll * Math.max(0, (edge / (odd - 1)) * KELLY_FRAC);

            const newBet = {
                id: Date.now(),
                league: document.getElementById('league_name').value || "Goles",
                teams: document.getElementById('event_name').value || "Evento",
                date: new Date().toLocaleDateString(),
                market, odd, prob,
                edge: (edge * 100).toFixed(2),
                stake,
                status: 'pending',
                profit: 0,
                isStrategic: !document.getElementById('strategy-assistant-box').classList.contains('hidden')
            };

            bets.unshift(newBet);
            localStorage.setItem('betags_v3_miner', JSON.stringify(bets));
            alert("Pick registrado en el Historial.");
        }

        function renderPoissonChart(labels, home, away) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Local', data: home, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' },
                        { label: 'Visitante', data: away, borderColor: '#f97316', tension: 0.4, fill: true, backgroundColor: 'rgba(249, 115, 22, 0.1)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
            });
        }
    </script>
</body>
</html>

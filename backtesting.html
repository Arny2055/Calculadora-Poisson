<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS - Backtesting & Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark-bg: #030712; --card-bg: #111827; --accent-purple: #8b5cf6; --accent-emerald: #10b981; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .metric-card { border-left: 4px solid var(--accent-purple); padding: 1.25rem; border-radius: 1rem; }
        .insight-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
        .insight-label { color: #94a3b8; font-weight: 500; }
        .insight-value { font-weight: 800; color: #10b981; }
        th { text-transform: uppercase; font-size: 0.7rem; color: #94a3b8; padding: 12px; background: #1f2937; }
        td { padding: 10px; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        select, input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; font-size: 12px; padding: 5px 10px; }
        #insights-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #0f172a; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; border-radius: 20px; border: 1px solid #3b82f6; }
        .engine-header { padding: 10px; border-radius: 8px; text-align: center; font-weight: 900; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; position: relative; }
        .valid-badge { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 2px 6px; border-radius: 4px; font-size: 8px; border: 1px solid rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="min-h-screen">

    <div id="insights-modal">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-xl font-black italic text-white"><i class="fa-solid fa-chart-line mr-2 text-purple-500"></i>ANÁLISIS ESTRATÉGICO PROFUNDO</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="ai-recommendation" class="recommendation-box mb-6">
                <p id="rec-text" class="text-sm font-medium text-white italic">Cargando sugerencias...</p>
                <p id="kelly-advice" class="text-[10px] text-blue-400 font-bold mt-2 uppercase"></p>
            </div>
            <div id="insights-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div><h3 class="text-xs font-black text-purple-400 uppercase mb-4">Mejores Ligas</h3><div id="top-leagues" class="space-y-2"></div></div>
                <div><h3 class="text-xs font-black text-emerald-400 uppercase mb-4">Mejores Mercados</h3><div id="top-markets" class="space-y-2"></div></div>
            </div>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-purple-500/20 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic text-white">BET<span class="text-purple-500">AGS</span> <span class="text-[10px] uppercase text-slate-400 ml-2">Backtesting</span></h1>
            <div class="flex gap-3">
                <button onclick="generateInsights()" class="text-xs bg-purple-600 text-white px-4 py-2 rounded-lg font-black shadow-lg">INSIGHTS</button>
                <a href="roi.html" class="text-xs bg-slate-800 text-white px-4 py-2 rounded-lg font-bold border border-slate-700">GESTIONAR ROI</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-6 space-y-6">
        <div class="glass-card p-4 rounded-2xl border-b-2 border-purple-500">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 items-end">
                <div><label class="text-[10px] font-black text-slate-500 uppercase block mb-1">Mercado</label>
                    <select id="filter-market" class="w-full" onchange="applyFilters()">
                        <option value="all">TODOS</option>
                        <option value="OVER 2.5">OVER 2.5</option>
                        <option value="UNDER 2.5">UNDER 2.5</option>
                        <option value="BTTS YES">BTTS YES</option>
                        <option value="BTTS NO">BTTS NO</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-black text-slate-500 uppercase block mb-1">Cuota Mín.</label><input type="number" id="filter-min-odd" step="0.1" value="1.0" class="w-full" oninput="applyFilters()"></div>
                <div><label class="text-[10px] font-black text-slate-500 uppercase block mb-1">Simular Stake</label><input type="number" id="sim-stake" value="10" class="w-full" oninput="applyFilters()"></div>
                <button onclick="clearBacktest()" class="text-[10px] bg-red-600/20 text-red-400 border border-red-500/30 p-2 rounded uppercase font-black">Borrar Todo</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass-card metric-card"><p class="text-[10px] font-black text-slate-500 uppercase">Profit Real</p><h3 id="stat-profit" class="text-2xl font-black text-white">$0.00</h3></div>
            <div class="glass-card metric-card border-emerald-500"><p class="text-[10px] font-black text-slate-500 uppercase">Yield Real</p><h3 id="stat-yield" class="text-2xl font-black text-emerald-400">0%</h3></div>
            <div class="glass-card metric-card border-orange-500"><p class="text-[10px] font-black text-orange-500 uppercase">Profit Sim.</p><h3 id="stat-sim-profit" class="text-2xl font-black text-orange-400">$0.00</h3></div>
            <div class="glass-card metric-card border-blue-500"><p class="text-[10px] font-black text-slate-500 uppercase">Hit Rate</p><h3 id="stat-winrate" class="text-2xl font-black text-blue-400">0%</h3></div>
        </div>

        <div class="glass-card p-6 rounded-2xl"><canvas id="equityChart" class="h-[300px]"></canvas></div>

        <div class="glass-card p-6 rounded-2xl">
            <h3 class="font-black text-white uppercase text-sm italic mb-4"><i class="fa-solid fa-users-viewfinder mr-2"></i>Rendimiento por Equipo y Mercado</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr><th>Equipo</th><th>Mercado</th><th class="text-center">Muestra</th><th class="text-right">Profit</th><th class="text-right">Yield</th></tr></thead>
                    <tbody id="team-insight-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullData = [];
        let filteredData = [];
        let equityChart;

        function syncWithROI() {
            // Leemos la fuente principal del ROI Lab
            const minerData = JSON.parse(localStorage.getItem('betags_v3_miner')) || [];
            // Solo procesamos apuestas que ya tengan resultado (Win o Loss)
            const resolved = minerData.filter(b => b.status !== 'pending' && b.status !== undefined);
            
            // Mapeo perfecto de campos: de ROI a Backtesting
            fullData = resolved.map(b => ({
                id: b.id,
                fecha: b.date,
                liga: b.league || 'N/A',
                evento: b.teams,
                mercado: b.market,
                cuota: parseFloat(b.odd),
                stake: parseFloat(b.stake),
                resultado: b.status,
                profit: parseFloat(b.profit),
                prob: b.prob || 0,
                edge: b.edge || 0
            }));
        }

        function applyFilters() {
            const market = document.getElementById('filter-market').value;
            const minOdd = parseFloat(document.getElementById('filter-min-odd').value) || 0;
            
            filteredData = fullData.filter(b => 
                (market === 'all' || b.mercado.toUpperCase().includes(market)) && 
                b.cuota >= minOdd
            );
            updateUI();
        }

        function updateUI() {
            renderStats();
            renderEquityChart();
            renderTeamTable();
        }

        function renderStats() {
            const simStake = parseFloat(document.getElementById('sim-stake').value) || 10;
            let tProfit = 0, tStaked = 0, tSimP = 0, tSimS = 0, tWins = 0;

            filteredData.forEach(b => {
                tProfit += b.profit;
                tStaked += b.stake;
                if (b.resultado === 'win') {
                    tWins++;
                    tSimP += (b.cuota - 1) * simStake;
                } else {
                    tSimP -= simStake;
                }
                tSimS += simStake;
            });

            document.getElementById('stat-profit').innerText = `$${tProfit.toFixed(2)}`;
            document.getElementById('stat-yield').innerText = `${(tStaked > 0 ? (tProfit/tStaked)*100 : 0).toFixed(1)}%`;
            document.getElementById('stat-sim-profit').innerText = `$${tSimP.toFixed(2)}`;
            document.getElementById('stat-winrate').innerText = `${(filteredData.length > 0 ? (tWins/filteredData.length)*100 : 0).toFixed(1)}%`;
        }

        function renderEquityChart() {
            const ctx = document.getElementById('equityChart').getContext('2d');
            let current = 0; const points = [0];
            filteredData.forEach(b => { current += b.profit; points.push(current); });
            
            if(equityChart) equityChart.destroy();
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: points.map((_, i) => i),
                    datasets: [{ label: 'Evolución Profit ($)', data: points, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderTeamTable() {
            const tbody = document.getElementById('team-insight-body');
            const teams = {};
            
            filteredData.forEach(b => {
                const parts = b.evento.split(' - ');
                parts.forEach(t => {
                    const key = `${t.trim()}_${b.mercado}`;
                    if(!teams[key]) teams[key] = { name: t.trim(), market: b.mercado, profit: 0, stake: 0, count: 0 };
                    teams[key].profit += b.profit;
                    teams[key].stake += b.stake;
                    teams[key].count++;
                });
            });

            tbody.innerHTML = '';
            Object.values(teams).sort((a,b) => b.profit - a.profit).slice(0, 20).forEach(d => {
                const yieldV = (d.profit / d.stake) * 100;
                tbody.innerHTML += `
                    <tr>
                        <td class="font-bold text-white uppercase">${d.name}</td>
                        <td class="text-slate-400">${d.market}</td>
                        <td class="text-center">${d.count} ${d.count >= 3 ? '<span class="valid-badge">HOT</span>' : ''}</td>
                        <td class="text-right font-bold ${d.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}">$${d.profit.toFixed(2)}</td>
                        <td class="text-right">${yieldV.toFixed(1)}%</td>
                    </tr>
                `;
            });
        }

        function generateInsights() {
            if (fullData.length < 3) return alert("Se necesitan al menos 3 picks resueltos para generar insights.");
            
            const analysis = { leagues: {}, markets: {} };
            fullData.forEach(b => {
                analysis.leagues[b.liga] = (analysis.leagues[b.liga] || 0) + b.profit;
                analysis.markets[b.mercado] = (analysis.markets[b.mercado] || 0) + b.profit;
            });

            const bestMarket = Object.entries(analysis.markets).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('rec-text').innerHTML = `Tu zona de mayor éxito es el mercado <span class="text-yellow-400 font-black">${bestMarket[0]}</span> con un beneficio acumulado de $${bestMarket[1].toFixed(2)}.`;
            
            toggleModal();
        }

        function toggleModal() { const m = document.getElementById('insights-modal'); m.style.display = (m.style.display === 'flex' ? 'none' : 'flex'); }
        function clearBacktest() { if(confirm('¿Borrar todos los datos?')) { localStorage.removeItem('betags_v3_miner'); location.reload(); } }

        window.onload = () => {
            syncWithROI();
            applyFilters();
        };
    </script>
</body>
</html>

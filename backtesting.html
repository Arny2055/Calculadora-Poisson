<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Syndicate Backtester | Dark Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-bg);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 10px 0 0 0;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .main-chart {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-syndicate { background: rgba(56, 189, 248, 0.2); color: var(--accent); }
        .badge-win { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge-loss { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>SyndicateBacktest <small style="color:var(--text-muted); font-size: 0.5em;">v1.0</small></h1>
            <p style="color: var(--text-muted)">Análisis de flujo de dinero profesional y eficiencia de cuotas.</p>
        </div>
        <div class="controls">
            <button onclick="runBacktest()">Ejecutar Simulación</button>
        </div>
    </header>

    <div class="grid-stats">
        <div class="stat-card">
            <h3>ROI Total</h3>
            <p id="roi-val">+12.4%</p>
        </div>
        <div class="stat-card">
            <h3>Win Rate Sindicatos</h3>
            <p id="winrate-val">58.2%</p>
        </div>
        <div class="stat-card">
            <h3>CLV Promedio</h3>
            <p id="clv-val">4.1%</p>
        </div>
        <div class="stat-card">
            <h3>Profit Total</h3>
            <p id="profit-val" style="color: var(--success)">+€4,250</p>
        </div>
    </div>

    <div class="main-chart">
        <canvas id="performanceChart" height="100"></canvas>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Evento</th>
                    <th>Mov. Sindicato</th>
                    <th>Cuota Inicial</th>
                    <th>Cierre Bookie</th>
                    <th>Resultado</th>
                    <th>CLV %</th>
                </tr>
            </thead>
            <tbody id="data-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Simulación de datos de backtesting (Sindicatos vs Bookies)
    const mockData = [
        { event: "Lakers vs Celtics", move: "Steam", open: 1.95, close: 1.82, result: "Win", clv: 6.6 },
        { event: "Man City vs Arsenal", move: "Heavy Money", open: 2.10, close: 2.05, result: "Win", clv: 2.3 },
        { event: "Real Madrid vs Barca", move: "Sharp Action", open: 1.85, close: 1.90, result: "Loss", clv: -2.7 },
        { event: "Djokovic vs Alcaraz", move: "Steam", open: 1.70, close: 1.62, result: "Win", clv: 4.7 },
        { event: "Chiefs vs Eagles", move: "Late Move", open: 1.91, close: 1.85, result: "Win", clv: 3.1 },
        { event: "Bayern vs Dortmund", move: "Sharp Action", open: 1.50, close: 1.44, result: "Win", clv: 4.0 },
    ];

    function runBacktest() {
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = '';
        
        mockData.forEach(item => {
            const row = `
                <tr>
                    <td>${item.event}</td>
                    <td><span class="badge badge-syndicate">${item.move}</span></td>
                    <td>${item.open.toFixed(2)}</td>
                    <td>${item.close.toFixed(2)}</td>
                    <td><span class="badge ${item.result === 'Win' ? 'badge-win' : 'badge-loss'}">${item.result}</span></td>
                    <td style="color: ${item.clv > 0 ? 'var(--success)' : 'var(--danger)'}">${item.clv}%</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                datasets: [{
                    label: 'Crecimiento de Bankroll (Unidades)',
                    data: [0, 5, 3, 8, 12, 11],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });
    }

    // Inicializar al cargar
    window.onload = runBacktest;
</script>

</body>
</html>

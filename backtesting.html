<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Quantum Miner - Optimization Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --entropy-color: #a855f7;
            --laplace-color: #fb7185;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-card h3 { margin: 0; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0 0; font-size: 1.4rem; font-weight: 800; }

        .main-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .insight-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .chart-box, .analysis-box, .insight-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .best-range-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(56, 189, 248, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .range-label { font-size: 0.8rem; color: var(--text-muted); }
        .range-value { font-weight: 800; color: var(--accent); font-size: 1.1rem; }
        .range-profit { color: var(--success); font-family: monospace; }

        button {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
        th { background: rgba(255,255,255,0.02); padding: 12px; color: var(--text-muted); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0">BetAGS <span style="color:var(--accent)">Quantum Optimizer</span></h1>
            <p style="color: var(--text-muted); margin: 5px 0 0 0;">Minería de rangos óptimos y máxima rentabilidad.</p>
        </div>
        <div>
            <button onclick="runBacktest()">Calcular Rangos de Oro</button>
        </div>
    </header>

    <div class="grid-stats">
        <div class="stat-card"><h3>Yield Total</h3><p id="roi-val">0%</p></div>
        <div class="stat-card"><h3>Profit Neto</h3><p id="profit-val">0u</p></div>
        <div class="stat-card"><h3>Kelly Sug.</h3><p id="kelly-val">0%</p></div>
        <div class="stat-card"><h3>Estabilidad L</h3><p id="laplace-val">0.00</p></div>
    </div>

    <div class="main-layout">
        <div class="chart-box">
            <h4 style="margin:0 0 15px 0; font-size:0.8rem; color:var(--accent)">CURVA DE EQUIDAD</h4>
            <canvas id="performanceChart" height="150"></canvas>
        </div>
        
        <div class="insight-card">
            <h4 style="margin:0 0 20px 0; font-size:0.8rem; color:var(--accent)">MEJORES RANGOS DETECTADOS</h4>
            <div id="optimization-results">
                </div>
        </div>
    </div>

    <div class="table-container">
        <table id="main-table">
            <thead>
                <tr><th>Evento</th><th>Prob %</th><th>Cuota Casa</th><th>Cuota Justa</th><th>Edge %</th><th>Stake</th><th>Profit</th></tr>
            </thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>
</div>

<script>
    const BACKTEST_KEY = 'betags_backtesting';
    let pChart;

    // Inyectar datos si no existen
    function injectDemoData() {
        if (!localStorage.getItem(BACKTEST_KEY)) {
            const demoBets = [];
            for(let i=0; i<50; i++) {
                const odd = (Math.random() * 3 + 1.2).toFixed(2);
                const prob = (Math.random() * 50 + 20).toFixed(0);
                const stake = (Math.floor(Math.random() * 5) + 1).toFixed(1);
                const win = Math.random() > 0.45;
                demoBets.push({
                    date: new Date(2025, 0, i+1).toISOString(),
                    teams: "Evento Simulado #" + i,
                    odd: odd,
                    prob: prob,
                    edge: ( (1/odd) * 100 - prob ).toFixed(2), // Edge simplificado
                    stake: stake,
                    profit: win ? (stake * (odd - 1)).toFixed(2) : (-stake).toFixed(2),
                    status: win ? 'win' : 'loss'
                });
            }
            localStorage.setItem(BACKTEST_KEY, JSON.stringify(demoBets));
        }
    }

    function runBacktest() {
        injectDemoData();
        const bets = JSON.parse(localStorage.getItem(BACKTEST_KEY)) || [];
        if (bets.length === 0) return;

        const processedBets = bets.map(b => ({
            ...b,
            fairOdd: (100 / b.prob).toFixed(2),
            edge: ( ( (1/ (100/b.prob)) * b.odd ) - 1 * 100).toFixed(2) // Edge Real
        }));

        const stats = calculateOptimization(processedBets);
        updateUI(stats, processedBets);
        renderChart(processedBets);
        renderTable(processedBets);
    }

    function calculateOptimization(bets) {
        // Función para encontrar el mejor rango numérico
        const findBestRange = (data, key, step) => {
            const buckets = {};
            data.forEach(b => {
                const val = parseFloat(b[key]);
                const bucketLower = Math.floor(val / step) * step;
                const bucketUpper = bucketLower + step;
                const label = `${bucketLower.toFixed(key === 'prob' ? 0 : 1)} - ${bucketUpper.toFixed(key === 'prob' ? 0 : 1)}`;
                buckets[label] = (buckets[label] || 0) + parseFloat(b.profit);
            });
            
            return Object.entries(buckets).reduce((a, b) => b[1] > a[1] ? b : a, ["N/A", -Infinity]);
        };

        const bestProb = findBestRange(bets, 'prob', 10);
        const bestFairOdd = findBestRange(bets, 'fairOdd', 0.5);
        const bestBookieOdd = findBestRange(bets, 'odd', 0.5);
        const bestEdge = findBestRange(bets, 'edge', 5);
        const bestStake = findBestRange(bets, 'stake', 1);

        // Stats Generales
        const totalProfit = bets.reduce((acc, b) => acc + parseFloat(b.profit), 0);
        const totalStaked = bets.reduce((acc, b) => acc + parseFloat(b.stake), 0);

        return {
            totalProfit: totalProfit.toFixed(2),
            yield: ((totalProfit / totalStaked) * 100).toFixed(2),
            ranges: [
                { title: "Mejor Probabilidad", range: bestProb[0] + "%", profit: bestProb[1] },
                { title: "Mejor Cuota Justa", range: " @ " + bestFairOdd[0], profit: bestFairOdd[1] },
                { title: "Mejor Cuota Casa", range: " @ " + bestBookieOdd[0], profit: bestBookieOdd[1] },
                { title: "Mejor Edge", range: bestEdge[0] + "%", profit: bestEdge[1] },
                { title: "Mejor Stake", range: bestStake[0] + " unidades", profit: bestStake[1] }
            ]
        };
    }

    function updateUI(stats, bets) {
        document.getElementById('roi-val').innerText = stats.yield + "%";
        document.getElementById('profit-val').innerText = stats.totalProfit + "u";
        
        const resultsContainer = document.getElementById('optimization-results');
        resultsContainer.innerHTML = stats.ranges.map(r => `
            <div class="best-range-card">
                <div>
                    <div class="range-label">${r.title}</div>
                    <div class="range-value">${r.range}</div>
                </div>
                <div class="range-profit">+${r.profit.toFixed(2)}u</div>
            </div>
        `).join('');
    }

    function renderChart(bets) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (pChart) pChart.destroy();
        let balance = 0;
        const dataPoints = bets.map(b => balance += parseFloat(b.profit));
        
        pChart = new Chart(ctx, { 
            type: 'line', 
            data: { 
                labels: bets.map((_, i) => i + 1), 
                datasets: [{ 
                    data: dataPoints, 
                    borderColor: '#38bdf8', 
                    fill: true, 
                    backgroundColor: 'rgba(56, 189, 248, 0.05)', 
                    tension: 0.3,
                    pointRadius: 2
                }] 
            }, 
            options: { responsive: true, plugins: { legend: { display: false } } } 
        });
    }

    function renderTable(bets) {
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = [...bets].reverse().map(b => `
            <tr>
                <td>${b.teams}</td>
                <td>${b.prob}%</td>
                <td>${b.odd}</td>
                <td style="color:var(--text-muted)">${b.fairOdd}</td>
                <td style="color:var(--accent)">${b.edge}%</td>
                <td>${b.stake}u</td>
                <td style="color:${b.profit>=0?'var(--success)':'var(--danger)'}">${b.profit}u</td>
            </tr>
        `).join('');
    }

    window.onload = runBacktest;
</script>
</body>
</html>

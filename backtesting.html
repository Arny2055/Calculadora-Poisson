<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS v7.5 - The Conscience (ROI Integrated)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #10b981; --bet-yellow: #ffeb00; --dark-bg: #020617; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .stat-card { border-left: 3px solid var(--bet-green); transition: all 0.3s ease; }
        .pulse-blue { animation: pulse-blue-shadow 2s infinite; }
        @keyframes pulse-blue-shadow { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        input, select { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(51, 65, 85, 0.5) !important; color: white !important; }
        .btn-action { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-950">
    <nav class="p-4 bg-slate-900/90 border-b border-blue-500/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20"><i class="fa-solid fa-brain text-white"></i></div>
                <h1 class="text-xl font-bold tracking-tighter uppercase">BetAGS <span class="text-blue-400 italic font-black">Conscience ROI</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="reportToAI()" class="px-3 py-2 text-[10px] bg-blue-600 text-white rounded-lg font-bold">REPORTAR A IA</button>
                <button onclick="exportData()" class="px-4 py-2 text-xs bg-slate-800 text-slate-300 rounded-lg font-bold">EXPORT</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        <div id="conscience-panel" class="mb-8 glass-panel p-6 rounded-3xl border-2 border-blue-500/30 pulse-blue">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="flex-shrink-0 text-center">
                    <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center border border-blue-500/40 mx-auto"><i class="fa-solid fa-microchip text-2xl text-blue-400"></i></div>
                </div>
                <div class="flex-grow">
                    <h2 class="text-xs font-black text-blue-400 uppercase mb-1">Tu Consciencia Analítica dice:</h2>
                    <p id="conscience-text" class="text-lg font-medium text-slate-100 italic">"Analizando..."</p>
                    <div id="conscience-tags" class="flex flex-wrap gap-2 mt-3"></div>
                </div>
                <div class="hidden lg:block text-right">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sugerencia de Inversión</p>
                    <p id="live-kelly-limit" class="text-xl font-black text-white">$0.00</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel p-6 rounded-2xl border border-emerald-500/10">
                    <h3 class="text-sm font-bold uppercase text-emerald-400 mb-6 flex items-center"><i class="fa-solid fa-calculator mr-2"></i> Simulador</h3>
                    <form id="bet-form" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="col-span-1">
                            <label class="text-[10px] text-slate-500 block mb-1">Liga</label>
                            <input type="text" id="bet-strat" placeholder="Ej: Portugal Liga" class="w-full p-2.5 rounded-xl text-sm">
                        </div>
                        <div><label class="text-[10px] text-slate-500 block mb-1">Cuota</label><input type="number" id="bet-odd" step="0.01" class="w-full p-2.5 rounded-xl text-sm"></div>
                        <div><label class="text-[10px] text-slate-500 block mb-1">Stake</label><input type="number" id="bet-stake" step="0.1" class="w-full p-2.5 rounded-xl text-sm"></div>
                        <div><label class="text-[10px] text-slate-500 block mb-1">Resultado</label><select id="bet-status" class="w-full p-2.5 rounded-xl text-sm"><option value="win">WIN</option><option value="loss">LOSS</option></select></div>
                        <div class="col-span-full"><button type="button" onclick="addNewBet()" class="w-full py-3.5 btn-action text-slate-950 font-black rounded-xl uppercase tracking-widest text-sm shadow-xl">Registrar</button></div>
                    </form>
                </div>
                <div class="glass-panel p-6 rounded-2xl"><div class="h-[250px]"><canvas id="mainChart"></canvas></div></div>
                <div class="glass-panel rounded-2xl overflow-hidden">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900/80 text-slate-500 uppercase"><tr><th class="p-4">Liga</th><th class="p-4">Cuota</th><th class="p-4">Stake</th><th class="p-4">Profit</th><th class="p-4"></th></tr></thead>
                        <tbody id="bet-history" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
            <div class="space-y-6">
                <div class="grid grid-cols-1 gap-4">
                    <div class="glass-panel p-5 rounded-2xl stat-card border-l-emerald-500"><p class="text-[10px] text-slate-500 uppercase font-bold">ROI</p><p id="m-roi" class="text-3xl font-black text-emerald-400">0.00%</p></div>
                    <div class="glass-panel p-5 rounded-2xl stat-card border-l-blue-500"><p class="text-[10px] text-slate-500 uppercase font-bold">Yield</p><p id="m-yield" class="text-3xl font-black text-blue-400">0.00%</p></div>
                </div>
                <div class="glass-panel p-6 rounded-2xl border border-yellow-500/20 bg-yellow-500/5">
                    <label class="text-[10px] font-black uppercase text-yellow-500">Banca Actual</label>
                    <input type="number" id="cfg-bank" value="1000" class="w-full p-2 rounded-lg text-sm mb-4">
                    <div class="p-4 bg-slate-900/60 rounded-xl border border-yellow-500/30 text-center"><p class="text-[10px] text-yellow-500 uppercase italic">Máximo Stake</p><p id="kelly-res" class="text-3xl font-black text-white">$0.00</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let bets = JSON.parse(localStorage.getItem('betags_conscience_v7.5')) || [];
        let mainChart;

        function initConscience() {
            ['bet-strat', 'bet-odd', 'bet-stake'].forEach(id => document.getElementById(id).addEventListener('input', analyzeIntention));
            saveAndRefresh();
        }

        function analyzeIntention() {
            const currentStrat = document.getElementById('bet-strat').value.trim().toLowerCase();
            const textEl = document.getElementById('conscience-text');
            const tagsEl = document.getElementById('conscience-tags');
            let advice = "Tu historial es tu guía. Analizando...", tags = ['<span class="px-2 py-1 bg-blue-500 text-[10px] rounded text-white font-bold">ACTIVO</span>'];
            if (currentStrat) {
                const stratBets = bets.filter(b => b.strategy.toLowerCase().includes(currentStrat));
                if (stratBets.length > 0) {
                    const winRate = (stratBets.filter(b => b.status === 'win').length / stratBets.length) * 100;
                    advice = `En "${currentStrat.toUpperCase()}" tienes un WinRate del ${winRate.toFixed(0)}%.`;
                }
            }
            textEl.innerText = `"${advice}"`; tagsEl.innerHTML = tags.join('');
        }

        function calculateMetrics(data) {
            let totalStaked = 0, netProfit = 0, wins = 0;
            data.forEach(b => { totalStaked += b.stake; netProfit += b.profit; if (b.status === 'win') wins++; });
            const yieldPerc = totalStaked > 0 ? (netProfit / totalStaked) * 100 : 0;
            return { netProfit, yieldPerc, winRate: wins / data.length || 0, totalBets: data.length };
        }

        function updateDashboard() {
            const m = calculateMetrics(bets);
            document.getElementById('m-roi').innerText = (m.yieldPerc * 1.5).toFixed(2) + "%";
            document.getElementById('m-yield').innerText = m.yieldPerc.toFixed(2) + "%";
            const bank = parseFloat(document.getElementById('cfg-bank').value) || 1000;
            const safeKelly = (m.winRate > 0.5) ? (bank * 0.05) : (bank * 0.02);
            document.getElementById('kelly-res').innerText = `$${safeKelly.toFixed(2)}`;
            document.getElementById('live-kelly-limit').innerText = `$${safeKelly.toFixed(2)}`;
        }

        function addNewBet() {
            const strat = document.getElementById('bet-strat').value || 'Sin Liga';
            const odd = parseFloat(document.getElementById('bet-odd').value);
            const stake = parseFloat(document.getElementById('bet-stake').value);
            const status = document.getElementById('bet-status').value;
            if (isNaN(odd) || isNaN(stake)) return;
            const profit = status === 'win' ? stake * (odd - 1) : -stake;
            bets.unshift({ id: Date.now(), strategy: strat, odd, stake, profit, status, date: new Date().toLocaleDateString() });
            saveAndRefresh();
        }

        function reportToAI() {
            const m = calculateMetrics(bets);
            const report = {
                tool: "CONSCIENCE_V75",
                winrate: (m.winRate * 100).toFixed(1) + "%",
                yield: m.yieldPerc.toFixed(2) + "%",
                bank: document.getElementById('cfg-bank').value,
                safe_stake: document.getElementById('kelly-res').innerText,
                history_size: bets.length
            };
            navigator.clipboard.writeText("REPORTE_IA:" + JSON.stringify(report));
            alert("Reporte de Consciencia copiado.");
        }

        function saveAndRefresh() { localStorage.setItem('betags_conscience_v7.5', JSON.stringify(bets)); updateDashboard(); updateHistoryTable(); renderChart(); }
        function updateHistoryTable() {
            const tbody = document.getElementById('bet-history'); tbody.innerHTML = '';
            bets.slice(0, 7).forEach(b => {
                tbody.innerHTML += `<tr class="border-b border-slate-800/50"><td class="p-4 font-bold">${b.strategy}</td><td class="p-4 text-center">@${b.odd.toFixed(2)}</td><td class="p-4 text-center">${b.stake}u</td><td class="p-4 text-center font-bold ${b.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}">${b.profit.toFixed(2)}</td><td class="p-4 text-right"><button onclick="deleteBet(${b.id})" class="text-slate-600">×</button></td></tr>`;
            });
        }
        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            let dataPath = [0], current = 0; [...bets].reverse().forEach(b => { current += b.profit; dataPath.push(current); });
            mainChart = new Chart(ctx, { type: 'line', data: { labels: dataPath.map((_, i) => i), datasets: [{ data: dataPath, borderColor: '#10b981', borderWidth: 4, pointRadius: 0, tension: 0.3, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.03)' } } } } });
        }
        function deleteBet(id) { bets = bets.filter(b => b.id !== id); saveAndRefresh(); }
        function exportData() { window.open("data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bets))); }
        window.onload = initConscience;
    </script>
</body>
</html>

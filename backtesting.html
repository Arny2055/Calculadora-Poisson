<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - High Performance Backtesting</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
        }

        .stat-card h3 { margin: 0; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0 0; font-size: 1.4rem; font-weight: 800; }

        .main-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .insight-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .chart-box, .analysis-box, .insight-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        th { background: rgba(255,255,255,0.02); padding: 15px; color: var(--text-muted); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .badge-win { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-loss { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        button {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
        }

        .insight-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .insight-value { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0">BetAGS <span style="color:var(--accent)">Data Miner</span></h1>
            <p style="color: var(--text-muted); margin: 5px 0 0 0;">Patrones, Rangos y Debilidades del Mercado.</p>
        </div>
        <div>
            <button onclick="clearBacktest()" style="background: transparent; color: var(--danger); border: 1px solid var(--danger);">Reset</button>
            <button onclick="runBacktest()">Analizar Patrones</button>
        </div>
    </header>

    <div class="grid-stats">
        <div class="stat-card"><h3>Yield</h3><p id="roi-val">0%</p></div>
        <div class="stat-card"><h3>Hit Rate</h3><p id="winrate-val">0%</p></div>
        <div class="stat-card"><h3>Max Drawdown</h3><p id="mdd-val" style="color:var(--danger)">0u</p></div>
        <div class="stat-card"><h3>Longest Streak</h3><p id="streak-val">0</p></div>
        <div class="stat-card"><h3>Profit Neto</h3><p id="profit-val">0u</p></div>
    </div>

    <div class="main-layout">
        <div class="chart-box">
            <canvas id="performanceChart" height="120"></canvas>
        </div>
        
        <div class="insight-grid">
            <div class="insight-card">
                <h4 style="margin:0 0 10px 0; font-size:0.8rem; color:var(--accent)">MERCADOS TOP</h4>
                <div id="market-insights"></div>
            </div>
            <div class="insight-card">
                <h4 style="margin:0 0 10px 0; font-size:0.8rem; color:var(--accent)">RANGOS DE CUOTA</h4>
                <div id="odd-insights"></div>
            </div>
        </div>
    </div>

    <div class="analysis-box">
        <h3 style="margin:0 0 10px 0; font-size: 1rem;">Diagnóstico Maestro</h3>
        <p id="master-feedback" style="color:var(--text-muted); line-height:1.6;"></p>
    </div>

    <div class="table-container">
        <table id="main-table">
            <thead>
                <tr>
                    <th>Evento</th>
                    <th>Mercado</th>
                    <th>Cuota</th>
                    <th>Stake</th>
                    <th>Resultado</th>
                    <th>Profit</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>
</div>

<script>
    const BACKTEST_KEY = 'betags_backtesting';
    let pChart;

    function runBacktest() {
        const rawData = localStorage.getItem(BACKTEST_KEY);
        const bets = JSON.parse(rawData) || [];
        if (bets.length === 0) return;

        const sortedBets = [...bets].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        processGlobalStats(sortedBets);
        analyzePatterns(sortedBets);
        renderChart(sortedBets);
        renderTable(sortedBets);
    }

    function processGlobalStats(bets) {
        let currentBalance = 0;
        let maxBalance = 0;
        let maxDD = 0;
        let currentStreak = 0;
        let maxStreak = 0;
        let totalProfit = 0;
        let totalStaked = 0;
        let wins = 0;

        bets.forEach(b => {
            const p = Number(b.profit);
            totalProfit += p;
            totalStaked += Number(b.stake);
            if(b.status === 'win') {
                wins++;
                currentStreak++;
            } else {
                currentStreak = 0;
            }
            if(currentStreak > maxStreak) maxStreak = currentStreak;

            currentBalance += p;
            if(currentBalance > maxBalance) maxBalance = currentBalance;
            const dd = maxBalance - currentBalance;
            if(dd > maxDD) maxDD = dd;
        });

        document.getElementById('roi-val').innerText = ((totalProfit/totalStaked)*100).toFixed(2) + "%";
        document.getElementById('winrate-val').innerText = ((wins/bets.length)*100).toFixed(1) + "%";
        document.getElementById('mdd-val').innerText = "-" + maxDD.toFixed(2) + "u";
        document.getElementById('streak-val').innerText = maxStreak;
        document.getElementById('profit-val').innerText = (totalProfit >= 0 ? "+" : "") + totalProfit.toFixed(2) + "u";
        document.getElementById('profit-val').style.color = totalProfit >= 0 ? "var(--success)" : "var(--danger)";
    }

    function analyzePatterns(bets) {
        const markets = {};
        const oddsRange = { 'Baja (<1.5)': 0, 'Media (1.5-2.2)': 0, 'Alta (>2.2)': 0 };
        const oddsProfit = { 'Baja (<1.5)': 0, 'Media (1.5-2.2)': 0, 'Alta (>2.2)': 0 };

        bets.forEach(b => {
            // Mercado
            markets[b.market] = (markets[b.market] || 0) + Number(b.profit);
            
            // Cuotas
            const val = Number(b.odd);
            let range = '';
            if(val < 1.5) range = 'Baja (<1.5)';
            else if(val <= 2.2) range = 'Media (1.5-2.2)';
            else range = 'Alta (>2.2)';
            
            oddsRange[range]++;
            oddsProfit[range] += Number(b.profit);
        });

        // UI Mercados
        const mDiv = document.getElementById('market-insights');
        mDiv.innerHTML = Object.entries(markets)
            .sort((a,b) => b[1] - a[1])
            .map(([k, v]) => `<div class="insight-item"><span>${k}</span><span class="insight-value" style="color:${v>=0?'var(--success)':'var(--danger)'}">${v.toFixed(2)}u</span></div>`)
            .join('');

        // UI Cuotas
        const oDiv = document.getElementById('odd-insights');
        oDiv.innerHTML = Object.entries(oddsProfit)
            .map(([k, v]) => `<div class="insight-item"><span>${k}</span><span class="insight-value" style="color:${v>=0?'var(--success)':'var(--danger)'}">${v.toFixed(2)}u</span></div>`)
            .join('');

        // Master Feedback
        const bestMarket = Object.entries(markets).reduce((a, b) => a[1] > b[1] ? a : b)[0];
        document.getElementById('master-feedback').innerHTML = `Tu "Mina de Oro" actual es el mercado de <strong>${bestMarket}</strong>. 
        Evita dispersar capital en rangos de cuota donde el profit sea negativo. Tu disciplina en las rachas máximas determinará tu supervivencia.`;
    }

    function renderChart(bets) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (pChart) pChart.destroy();
        let balance = 0;
        pChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: bets.map((_, i) => i + 1),
                datasets: [{
                    label: 'Equity',
                    data: bets.map(b => balance += Number(b.profit)),
                    borderColor: '#38bdf8',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.05)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
        });
    }

    function renderTable(bets) {
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = [...bets].reverse().map(b => `
            <tr>
                <td><strong>${b.teams}</strong><br><small>${b.date}</small></td>
                <td>${b.market}</td>
                <td>${b.odd}</td>
                <td>${b.stake}u</td>
                <td><span class="badge ${b.status === 'win' ? 'badge-win' : 'badge-loss'}">${b.status}</span></td>
                <td style="color:${b.profit>=0?'var(--success)':'var(--danger)'}">${b.profit}u</td>
            </tr>
        `).join('');
    }

    function clearBacktest() { if(confirm('¿Borrar historial?')) { localStorage.removeItem(BACKTEST_KEY); location.reload(); } }
    
    window.onload = runBacktest;
</script>
</body>
</html>

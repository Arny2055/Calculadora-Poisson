<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - 1-x.mx Scanner v5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sl-dark: #05070a;
            --sl-card: #0f121a;
            --sl-accent: #00f2ff;
            --sl-green: #00ff88;
            --sl-border: #1e222d;
            --sl-gold: #ffcc00;
        }
        
        body { 
            background-color: var(--sl-dark); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 100%);
        }

        .scorelab-card { 
            background: var(--sl-card); 
            border: 1px solid var(--sl-border); 
            border-radius: 12px;
        }

        .btn-scanner {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .value-pulse {
            border: 2px solid var(--sl-green) !important;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-online { background: var(--sl-green); box-shadow: 0 0 8px var(--sl-green); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="p-4 border-b border-white/5 bg-black/60 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black tracking-tighter uppercase">BETA<span class="text-blue-500">GS</span> 1-X</h1>
                <div class="text-[10px] font-bold bg-slate-800 px-2 py-1 rounded">
                    <span id="status_dot" class="status-dot"></span> <span id="status_text">IDLE</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="scrape1XMx()" class="btn-scanner px-4 py-2 rounded-lg text-xs">
                    <i class="fa-solid fa-bolt mr-2"></i> ESCANEAR 1-X.MX
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="mb-8">
            <h2 class="text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest">Oportunidades Detectadas (Value Live)</h2>
            <div id="radar_container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <div class="col-span-full text-center p-10 scorelab-card text-slate-600 italic">
                    Pulsa el botón de Escanear para buscar cuotas en 1-x.mx
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="scorelab-card p-5">
                    <h3 class="text-xs font-black text-blue-400 mb-4 uppercase">Datos de Poisson</h3>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500">LOCAL GF</label>
                            <input type="number" id="h_gf" step="0.1" class="w-full bg-black/40 border border-white/10 p-2 rounded text-center" value="1.50">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500">LOCAL GC</label>
                            <input type="number" id="h_gc" step="0.1" class="w-full bg-black/40 border border-white/10 p-2 rounded text-center" value="1.10">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500">VISITA GF</label>
                            <input type="number" id="a_gf" step="0.1" class="w-full bg-black/40 border border-white/10 p-2 rounded text-center" value="1.20">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500">VISITA GC</label>
                            <input type="number" id="a_gc" step="0.1" class="w-full bg-black/40 border border-white/10 p-2 rounded text-center" value="1.40">
                        </div>
                    </div>
                    <button onclick="manualCalculate()" class="w-full bg-blue-600 py-3 rounded font-black text-xs hover:bg-blue-500 transition-colors">CALCULAR MANUAL</button>
                </div>
                
                <div class="scorelab-card p-4 h-48">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="scorelab-card overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/5 text-[10px] uppercase font-black text-slate-500">
                            <tr>
                                <th class="p-4">Mercado</th>
                                <th class="p-4">Prob %</th>
                                <th class="p-4">Cuota Justa</th>
                                <th class="p-4">Cuota 1-X</th>
                                <th class="p-4">Edge %</th>
                            </tr>
                        </thead>
                        <tbody id="results_table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let myChart;

        // --- MOTOR DE ESCANEO 1-X.MX ---
        async function scrape1XMx() {
            updateStatus('online', 'CONECTANDO 1-X.MX...');
            
            // Usamos la API de línea de 1xBet adaptada al dominio .mx
            const api_url = "https://1-x.mx/LineFeed/Get1x2MS?sports=1&count=50&lng=es&mode=4&country=1";
            
            try {
                const response = await fetch(api_url);
                const data = await response.json();
                
                if (!data.Value) throw new Error("No data");

                const matches = data.Value.map(m => {
                    const oddW1 = m.E.find(e => e.T === 1)?.V || 0;
                    const oddX = m.E.find(e => e.T === 2)?.V || 0;
                    const oddW2 = m.E.find(e => e.T === 3)?.V || 0;

                    // Lógica de Poisson simplificada para el Radar
                    // (Aquí podrías conectar con tu base de datos de Sheets)
                    const fakeProb = 0.45; // Simulación para el ejemplo
                    const edge = (fakeProb - (1/oddW1)) * 100;

                    return {
                        id: m.I,
                        league: m.LE,
                        home: m.O1,
                        away: m.O2,
                        w1: oddW1,
                        x: oddX,
                        w2: oddW2,
                        edge: edge
                    };
                });

                renderRadar(matches);
                updateStatus('online', 'SCAN COMPLETO');
            } catch (e) {
                console.error(e);
                updateStatus('offline', 'ERROR DE CONEXIÓN');
                alert("Para leer 1-x.mx directamente, activa una extensión de 'CORS Unblock' en tu navegador.");
            }
        }

        function renderRadar(matches) {
            const container = document.getElementById('radar_container');
            container.innerHTML = '';

            matches.forEach(m => {
                const isValue = m.edge > 5; // CONDICIÓN: Si la ventaja es > 5%
                const card = document.createElement('div');
                card.className = `scorelab-card p-3 transition-all cursor-pointer hover:bg-white/5 ${isValue ? 'value-pulse' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[8px] bg-blue-600 px-1 rounded font-bold uppercase">1-X.MX</span>
                        ${isValue ? '<span class="text-[8px] text-green-400 font-black animate-pulse">VALUE 🔥</span>' : ''}
                    </div>
                    <div class="text-[10px] font-bold truncate mb-1">${m.home} vs ${m.away}</div>
                    <div class="flex justify-between mt-3">
                        <div class="text-center">
                            <div class="text-[8px] text-slate-500 font-bold">1</div>
                            <div class="text-xs font-black text-blue-400">${m.w1}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[8px] text-slate-500 font-bold">X</div>
                            <div class="text-xs font-black text-slate-300">${m.x}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[8px] text-slate-500 font-bold">2</div>
                            <div class="text-xs font-black text-blue-400">${m.w2}</div>
                        </div>
                    </div>
                `;
                
                card.onclick = () => {
                    // Cargar en el calculador manual al hacer clic
                    document.getElementById('h_gf').value = 1.6; // Ejemplo
                    manualCalculate(m.w1);
                };
                
                container.appendChild(card);
            });
        }

        // --- MOTOR POISSON ---
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function manualCalculate(marketOdd = null) {
            const hgf = parseFloat(document.getElementById('h_gf').value);
            const hgc = parseFloat(document.getElementById('h_gc').value);
            const agf = parseFloat(document.getElementById('a_gf').value);
            const agc = parseFloat(document.getElementById('a_gc').value);

            const expH = (hgf + agc) / 2;
            const expA = (agf + hgc) / 2;

            let probW1 = 0, probOver25 = 0;
            const distH = [], distA = [];

            for(let i=0; i<6; i++) {
                distH.push(poisson(i, expH));
                distA.push(poisson(i, expA));
            }

            for(let i=0; i<6; i++) {
                for(let j=0; j<6; j++) {
                    let p = distH[i] * distA[j];
                    if(i > j) probW1 += p;
                    if(i + j > 2.5) probOver25 += p;
                }
            }

            updateTable(probW1, probOver25, marketOdd);
            updateChart(distH, distA);
        }

        function updateTable(w1, o25, liveOdd) {
            const tbody = document.getElementById('results_table');
            const cjW1 = (1/w1).toFixed(2);
            const edge = liveOdd ? ((w1 - (1/liveOdd)) * 100).toFixed(1) : '--';
            
            tbody.innerHTML = `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold">Victoria Local (W1)</td>
                    <td class="p-4 text-blue-400 font-mono">${(w1*100).toFixed(1)}%</td>
                    <td class="p-4 text-slate-400 font-mono">${cjW1}</td>
                    <td class="p-4 font-black">${liveOdd || '--'}</td>
                    <td class="p-4 ${edge > 0 ? 'text-green-400' : 'text-red-400'} font-bold">${edge}%</td>
                </tr>
                <tr>
                    <td class="p-4 font-bold">Over 2.5 Goles</td>
                    <td class="p-4 text-blue-400 font-mono">${(o25*100).toFixed(1)}%</td>
                    <td class="p-4 text-slate-400 font-mono">${(1/o25).toFixed(2)}</td>
                    <td class="p-4 font-black">--</td>
                    <td class="p-4">--</td>
                </tr>
            `;
        }

        function updateChart(h, a) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [0,1,2,3,4,5],
                    datasets: [
                        { label: 'Local', data: h, backgroundColor: '#3b82f6' },
                        { label: 'Visita', data: a, backgroundColor: '#00ff88' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateStatus(type, text) {
            const dot = document.getElementById('status_dot');
            dot.className = 'status-dot ' + (type === 'online' ? 'dot-online' : 'bg-red-500');
            document.getElementById('status_text').innerText = text;
        }

        window.onload = () => manualCalculate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Poisson Matchup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; --gold-value: #ffd700; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; font-size: 0.8rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        .matrix-cell { padding: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 9px; border-radius: 4px; }
        
        /* Estilos para el selector de modo */
        .mode-selector { display: flex; background: #111827; border-radius: 8px; padding: 2px; border: 1px solid #374151; }
        .mode-btn { flex: 1; padding: 6px; font-size: 10px; font-weight: 800; border-radius: 6px; transition: all 0.3s; text-align: center; cursor: pointer; color: #4b5563; }
        .mode-btn.active { background: var(--bet-green); color: white; border: 1px solid var(--accent-green); }
        .mode-btn.active-xg { background: #3b82f6; color: white; border: 1px solid #60a5fa; }

        .gold-value-row { background: linear-gradient(90deg, rgba(255, 215, 0, 0.05), rgba(255, 215, 0, 0.15)) !important; border-left: 4px solid var(--gold-value) !important; }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">MATCHUP EDITION</span>
            </h1>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE DE ESTRATEGIA</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Introduce promedios para analizar...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-5 rounded-2xl">
                    <h2 class="text-xs font-bold text-bet-yellow uppercase mb-3"><i class="fa-solid fa-pen-to-square mr-2"></i>Identificación</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="league_name" placeholder="Liga" class="p-2 uppercase font-bold text-emerald-400">
                        <input type="text" id="event_name" placeholder="Evento" class="p-2 uppercase font-bold text-emerald-400">
                    </div>
                </div>

                <div class="glass-card p-5 rounded-2xl border-l-4 border-emerald-500 shadow-lg">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-bold text-emerald-400 uppercase"><i class="fa-solid fa-chart-line mr-2"></i>Configuración</h2>
                        <div class="mode-selector w-32" id="mode-container">
                            <div onclick="setAnalysisMode('GOLES')" id="mode-goles" class="mode-btn active">GOLES</div>
                            <div onclick="setAnalysisMode('XG')" id="mode-xg" class="mode-btn">xG</div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="bg-slate-800/40 p-4 rounded-xl border border-blue-500/20">
                            <label class="text-[9px] font-black text-blue-400 mb-2 uppercase block">Local (A Favor)</label>
                            <input type="number" id="h_gf" step="0.01" class="w-full p-3 text-lg" placeholder="Ej: 1.75">
                        </div>

                        <div class="bg-slate-800/40 p-4 rounded-xl border border-orange-500/20">
                            <label class="text-[9px] font-black text-orange-400 mb-2 uppercase block">Visitante (A Favor)</label>
                            <input type="number" id="a_gf" step="0.01" class="w-full p-3 text-lg" placeholder="Ej: 1.20">
                        </div>
                        
                        <button onclick="calculatePoisson()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all shadow-lg">
                            Calcular Probabilidades
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl h-[250px]"><canvas id="poissonChart"></canvas></div>
                    <div class="glass-card p-4 rounded-2xl overflow-y-auto max-h-[250px] scroll-custom">
                        <h3 class="text-[9px] font-bold text-slate-500 uppercase mb-2">Matriz de Marcador Exacto</h3>
                        <div class="grid grid-cols-6 gap-1" id="score-matrix"></div>
                    </div>
                </div>
                
                <div class="glass-card rounded-2xl overflow-hidden border border-white/5">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900 text-[9px] text-slate-500 uppercase font-bold">
                            <tr>
                                <th class="p-4">Mercado Objetivos</th>
                                <th class="p-4">Prob %</th>
                                <th class="p-4">C. Justa</th>
                                <th class="p-4">C. Casa</th>
                                <th class="p-4">Edge</th>
                                <th class="p-4">Stake</th>
                                <th class="p-4 text-center">ROI Lab</th>
                            </tr>
                        </thead>
                        <tbody id="market-table" class="divide-y divide-slate-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pChart;
        let currentAnalysisMode = 'GOLES';
        const STORAGE_KEY = 'betags_v3_miner';

        // GESTIÓN DE MODO DE ANÁLISIS
        function setAnalysisMode(mode) {
            currentAnalysisMode = mode;
            const btnGoles = document.getElementById('mode-goles');
            const btnXG = document.getElementById('mode-xg');
            
            if(mode === 'GOLES') {
                btnGoles.classList.add('active');
                btnXG.classList.remove('active', 'active-xg');
            } else {
                btnXG.classList.add('active', 'active-xg');
                btnGoles.classList.remove('active');
            }
        }

        // MOTOR POISSON
        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        function poissonProb(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function calculatePoisson() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const lambda_h = val('h_gf');
            const lambda_a = val('a_gf');

            if(lambda_h <= 0 && lambda_a <= 0) return alert("Ingresa los promedios.");

            let p_h = [], p_a = [];
            for(let i=0; i<=5; i++) { 
                p_h.push(poissonProb(i, lambda_h)); 
                p_a.push(poissonProb(i, lambda_a)); 
            }
            
            renderChart(p_h, p_a);
            processMarkets(p_h, p_a);
            updateAssistant(p_h, p_a);
        }

        function processMarkets(p_h, p_a) {
            let p_over = 0, p_under = 0;
            const matrix = document.getElementById('score-matrix'); matrix.innerHTML = '';
            
            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = p_h[h] * p_a[a];
                    if(h + a > 2.5) p_over += prob;
                    if(h + a < 2.5) p_under += prob;
                    
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 4})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob*100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }
            
            const p_btts_yes = (1 - p_h[0]) * (1 - p_a[0]);
            const markets = [
                { id: 'o25', name: 'OVER 2.5 GOLES', prob: p_over },
                { id: 'u25', name: 'UNDER 2.5 GOLES', prob: p_under },
                { id: 'by', name: 'BTTS (SÍ)', prob: p_btts_yes },
                { id: 'bn', name: 'BTTS (NO)', prob: 1 - p_btts_yes }
            ];

            const tbody = document.getElementById('market-table'); tbody.innerHTML = '';
            markets.forEach(m => {
                const fair = (1 / m.prob).toFixed(2);
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40 transition-all duration-500" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-300">${m.name}</td>
                        <td class="p-4 text-emerald-400 font-bold">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-16 p-1 text-center font-bold" oninput="updateEdge('${m.id}', ${m.prob})" id="odd_${m.id}"></td>
                        <td class="p-4 font-black" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center"><button onclick="sendToROI('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600 hover:bg-emerald-500 text-[9px] px-3 py-2 rounded font-black uppercase transition-all">ROI</button></td>
                    </tr>
                `;
            });
        }

        function updateEdge(id, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const edgeEl = document.getElementById('edge_' + id);
            const stakeEl = document.getElementById('stake_' + id);
            const rowEl = document.getElementById('row_' + id);
            if(odd > 1) {
                const edge = (odd * prob) - 1;
                const edgePercent = (edge * 100).toFixed(1);
                edgeEl.innerText = edgePercent + "%";
                rowEl.classList.toggle('gold-value-row', edgePercent >= 8.0);
                edgeEl.style.color = edge > 0 ? "#00ff88" : "#ff4444";
                const kelly = (prob - (1 - prob)/(odd - 1)) * 0.125; 
                stakeEl.innerText = Math.max(0, kelly * 100).toFixed(1) + "%";
            }
        }

        function sendToROI(id, market, prob) {
            const league = document.getElementById('league_name').value.trim() || 'Desconocida';
            const event = document.getElementById('event_name').value.trim() || 'Evento';
            const odd = parseFloat(document.getElementById('odd_' + id).value);
            if(!odd) return alert("⚠️ Introduce la cuota de la casa.");
            
            const newBet = {
                id: Date.now(), 
                date: new Date().toISOString().split('T')[0], 
                // Añadimos la marca del modo de análisis al nombre del evento/liga
                teams: `[${currentAnalysisMode}] ${league}: ${event}`, 
                market: market, 
                prob: prob, 
                odd: odd, 
                edge: document.getElementById('edge_' + id).innerText, 
                stake: parseFloat(document.getElementById('stake_' + id).innerText) || 0, 
                status: 'pending', 
                profit: 0,
                method: currentAnalysisMode // Dato extra guardado
            };
            
            let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            bets.unshift(newBet); 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
            
            const btn = document.querySelector(`#row_${id} button`); 
            btn.innerHTML = '✅'; 
            setTimeout(() => btn.innerHTML = 'ROI', 2000);
        }

        function updateAssistant(p_h, p_a) {
            const box = document.getElementById('strategy-assistant-box'); box.classList.remove('hidden');
            const text = document.getElementById('strategy-text');
            let p_over = 0;
            for(let h=0; h<=5; h++) { for(let a=0; a<=5; a++) { if(h+a > 2.5) p_over += (p_h[h] * p_a[a]); } }
            
            const modeText = currentAnalysisMode === 'XG' ? "Datos basados en Expectativa de Gol (xG)." : "Datos basados en Promedio de Goles.";
            text.innerHTML = `${modeText} <br> <span class="text-xs">${p_over > 0.60 ? "ESCENARIO DINÁMICO: TENDENCIA AL OVER." : (p_over < 0.40 ? "ESCENARIO CERRADO: TENDENCIA AL UNDER." : "MERCADO EN EQUILIBRIO ESTADÍSTICO.")}`;
            document.getElementById('strategy-signal').innerText = p_over > 0.60 ? "🔥" : (p_over < 0.40 ? "🛡️" : "📊");
        }

        function renderChart(h, a) {
            const ctx = document.getElementById('poissonChart').getContext('2d'); if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['0','1','2','3','4','5+'],
                    datasets: [
                        { label: 'Expectativa Local', data: h, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Expectativa Visita', data: a, borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } } }
            });
        }
    </script>
</body>
</html>

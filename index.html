<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor de Partidos - Run-in Analysis</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --dark: #1e293b;
            --light: #f8fafc;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 { text-align: center; color: var(--primary); }

        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background-color: var(--light); }

        .prediction-card {
            background: var(--light);
            padding: 15px;
            border-left: 5px solid var(--primary);
            margin-top: 10px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge-1x2 { background: #dbeafe; color: #1e40af; }
        .badge-ou { background: #fef3c7; color: #92400e; }
        .badge-btts { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Pronosticador de Ligas (Run-in)</h1>
    
    <div class="section">
        <h3>1. Cargar Datos de la Liga</h3>
        <p><small>Pega los datos de tu tabla o selecciona una guardada.</small></p>
        <input type="text" id="leagueName" placeholder="Nombre de la Liga (ej: Eslovenia Prva Liga)">
        <textarea id="rawData" placeholder="Pega aquí los datos de la tabla..."></textarea>
        <div class="controls">
            <button class="btn-primary" onclick="processData()">Procesar y Guardar</button>
            <select id="savedLeagues" onchange="loadLeague()">
                <option value="">-- Ligas Guardadas --</option>
            </select>
        </div>
    </div>

    <div id="predictorSection" class="section" style="display:none;">
        <h3>2. Generar Pronóstico</h3>
        <div class="controls">
            <select id="homeTeam"></select>
            <span>VS</span>
            <select id="awayTeam"></select>
            <button class="btn-success" onclick="generatePrediction()">Calcular 1X2</button>
        </div>
        <div id="result"></div>
    </div>

    <div class="section">
        <h3>Tabla de Referencia</h3>
        <div id="tableContainer"></div>
    </div>
</div>

<script>
    let leagueData = {};

    // Cargar nombres de ligas guardadas al iniciar
    window.onload = () => {
        updateLeagueSelect();
    };

    function processData() {
        const text = document.getElementById('rawData').value;
        const name = document.getElementById('leagueName').value || "Liga Sin Nombre";
        const lines = text.trim().split('\n');
        const teams = [];

        lines.forEach(line => {
            // Regex para capturar nombre y valores numéricos
            const parts = line.split(/\t| {2,}/);
            if(parts.length >= 5) {
                const team = {
                    name: parts[1].trim(),
                    ppg: parseFloat(parts[4]),
                    difficulty: parseFloat(parts[6] || 1.3) // REM: Remaining opponents PPG
                };
                teams.push(team);
            }
        });

        if(teams.length > 0) {
            leagueData[name] = teams;
            localStorage.setItem('savedLeagues', JSON.stringify(leagueData));
            updateLeagueSelect();
            displayTable(teams);
            setupSelectors(teams);
            document.getElementById('predictorSection').style.display = 'block';
            alert("Datos procesados y guardados localmente.");
        }
    }

    function updateLeagueSelect() {
        const stored = localStorage.getItem('savedLeagues');
        if(stored) {
            leagueData = JSON.parse(stored);
            const select = document.getElementById('savedLeagues');
            select.innerHTML = '<option value="">-- Ligas Guardadas --</option>';
            Object.keys(leagueData).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
        }
    }

    function loadLeague() {
        const name = document.getElementById('savedLeagues').value;
        if(name && leagueData[name]) {
            const teams = leagueData[name];
            displayTable(teams);
            setupSelectors(teams);
            document.getElementById('predictorSection').style.display = 'block';
        }
    }

    function setupSelectors(teams) {
        const home = document.getElementById('homeTeam');
        const away = document.getElementById('awayTeam');
        home.innerHTML = '';
        away.innerHTML = '';
        teams.forEach(t => {
            home.innerHTML += `<option value="${t.name}">${t.name}</option>`;
            away.innerHTML += `<option value="${t.name}">${t.name}</option>`;
        });
    }

    function displayTable(teams) {
        let html = '<table><tr><th>Equipo</th><th>PPG</th><th>Dificultad Restante (REM)</th></tr>';
        teams.forEach(t => {
            html += `<tr><td>${t.name}</td><td>${t.ppg}</td><td>${t.difficulty}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('tableContainer').innerHTML = html;
    }

    function generatePrediction() {
        const hName = document.getElementById('homeTeam').value;
        const aName = document.getElementById('awayTeam').value;
        const name = document.getElementById('savedLeagues').value || "actual";
        const teams = leagueData[name] || Object.values(leagueData)[0];

        const home = teams.find(t => t.name === hName);
        const away = teams.find(t => t.name === aName);

        // Algoritmo de predicción simple basado en PPG y dificultad (REM)
        // A mayor REM, el equipo se enfrenta a rivales más difíciles históricamente
        const homePower = home.ppg * (2 - home.difficulty);
        const awayPower = away.ppg * (2 - away.difficulty);
        
        // 1X2
        let trend = "Empate o muy ajustado";
        if(homePower > awayPower + 0.3) trend = "Victoria Local (1)";
        else if(awayPower > homePower + 0.3) trend = "Victoria Visitante (2)";
        else trend = "Empate / Doble Oportunidad (X)";

        // Over/Under 2.5 (Estimación basada en PPG acumulado)
        const totalPPG = home.ppg + away.ppg;
        const ou = totalPPG > 3.2 ? "Over 2.5 Goles" : "Under 2.5 Goles";

        // BTTS (Ambos anotan)
        const btts = (home.ppg > 1.2 && away.ppg > 1.0) ? "Sí" : "No";

        document.getElementById('result').innerHTML = `
            <div class="prediction-card">
                <h4>${hName} vs ${aName}</h4>
                <p><span class="badge badge-1x2">Pronóstico 1X2:</span> <strong>${trend}</strong></p>
                <p><span class="badge badge-ou">Goles:</span> <strong>${ou}</strong></p>
                <p><span class="badge badge-btts">BTTS:</span> <strong>${btts}</strong></p>
                <small>*Basado en el análisis de puntos por partido y dificultad de rivales restantes.</small>
            </div>
        `;
    }
</script>

</body>
</html>

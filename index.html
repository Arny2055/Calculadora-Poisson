<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - Poisson Intelligence v4.5 PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sl-dark: #080a0f;
            --sl-card: #11141d;
            --sl-accent: #00f2ff; /* Cyan BETAGS */
            --sl-green: #00ff88;
            --sl-yellow: #f0db4f;
            --sl-border: #1e222d;
            --sl-gold: #ffcc00;
        }
        
        body { 
            background-color: var(--sl-dark); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--sl-dark) 80%);
            min-height: 100vh;
        }

        .scorelab-card { 
            background: var(--sl-card); 
            border: 1px solid var(--sl-border); 
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        input, select { 
            background-color: #05070a !important; 
            color: white !important; 
            border: 1px solid var(--sl-border) !important; 
            transition: all 0.2s ease; 
        }

        input:focus, select:focus {
            border-color: var(--sl-accent) !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        .btn-primary {
            background: #0ea5e9;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 242, 255, 0.5);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-depth {
            background: #1e293b;
            color: #94a3b8;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid #334155;
        }

        .badge-value {
            background: rgba(0, 255, 136, 0.1);
            color: var(--sl-green);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .led-puck {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }

        .led-active { background: var(--sl-green); box-shadow: 0 0 8px var(--sl-green); }
        .led-loading { background: var(--sl-yellow); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #config_panel {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            z-index: 100;
            width: 320px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .league-filter-box {
            background: #05070a;
            border: 1px solid var(--sl-border);
            max-height: 150px;
            overflow-y: auto;
            border-radius: 6px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <nav class="p-4 border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-8 bg-cyan-500 rounded-full animate-pulse"></div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">BETA<span class="text-cyan-400">GS</span> <span class="text-[10px] text-slate-500 font-normal">v4.5 PRO</span></h1>
                </div>
                <div class="status-indicator ml-2">
                    <div id="status_led" class="led-puck"></div>
                    <span id="status_text" class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Standby</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <select id="market_auto_select" onchange="syncSheet()" class="text-[10px] bg-slate-900 border-none rounded px-2 py-1 text-cyan-400 font-bold">
                    <option value="over05ht">OVER 0.5 HT</option>
                    <option value="over25" selected>OVER 2.5 FT</option>
                    <option value="under25">UNDER 2.5 FT</option>
                    <option value="btts_yes">BTTS YES</option>
                </select>
                <button onclick="toggleConfig()" class="text-[10px] font-black bg-slate-800 text-slate-300 border border-white/10 px-3 py-1 rounded">
                    <i class="fa-solid fa-gear mr-1"></i> IDS
                </button>
                <button onclick="syncSheet()" class="text-[10px] font-black bg-cyan-600/20 text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded">
                    <i class="fa-solid fa-satellite-dish mr-1"></i> SINCRONIZAR
                </button>
            </div>
        </div>
    </nav>

    <div id="config_panel" class="scorelab-card p-4 border-cyan-500/50 shadow-2xl">
        <h3 class="text-[10px] font-black text-cyan-400 uppercase mb-3">Configuración de IDs</h3>
        <div class="space-y-3">
            <div>
                <label class="text-[7px] uppercase text-cyan-500 font-bold">Base de Datos Stats (ID)</label>
                <input type="text" id="id_stats_top" class="w-full p-2 text-[10px] rounded" value="1DYUN8_Gr80v6bpj3T2k9Ga2Bg1ZwHYtO">
            </div>
            <div>
                <label class="text-[7px] uppercase text-slate-500 font-bold">Over 2.5 FT Sheet ID</label>
                <input type="text" id="id_over25" class="w-full p-2 text-[10px] rounded" value="1BfAXMV6EHLEz3CJ2lAZO6spHJUXQ-mh6">
            </div>
            <div class="bg-black/20 p-2 rounded">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Ligas Disponibles</p>
                <div id="league_filter_container" class="league-filter-box"></div>
            </div>
            <button onclick="saveIDs()" class="w-full btn-primary py-2 rounded text-[10px]">Guardar y Recargar</button>
        </div>
    </div>

    <main class="container mx-auto p-4 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="scorelab-card p-3">
                <span class="text-[9px] font-black text-slate-500 uppercase">1. Liga</span>
                <select id="league_select" onchange="filterTeamsByLeague()" class="w-full p-2 mt-1 rounded text-xs"></select>
            </div>
            <div class="scorelab-card p-3">
                <span class="text-[9px] font-black text-slate-500 uppercase">2. Local</span>
                <select id="home_select" class="w-full p-2 mt-1 rounded text-xs"></select>
            </div>
            <div class="scorelab-card p-3">
                <span class="text-[9px] font-black text-slate-500 uppercase">3. Visitante</span>
                <select id="away_select" class="w-full p-2 mt-1 rounded text-xs"></select>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="scorelab-card p-5">
                    <h2 class="text-[10px] font-black text-cyan-500 uppercase mb-4 tracking-widest">Manual Analysis</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="h_gf" step="0.01" placeholder="H GF" class="p-3 rounded-lg text-center">
                            <input type="number" id="h_gc" step="0.01" placeholder="H GC" class="p-3 rounded-lg text-center">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="a_gf" step="0.01" placeholder="A GF" class="p-3 rounded-lg text-center">
                            <input type="number" id="a_gc" step="0.01" placeholder="A GC" class="p-3 rounded-lg text-center">
                        </div>
                        <button onclick="calculate()" class="w-full btn-primary py-3 rounded-lg text-[11px]">Calcular Poisson</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="scorelab-card p-4 border-l-2 border-cyan-500">
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Over 0.5 HT</p>
                        <h3 id="res_ht05" class="text-2xl font-black text-white">0.0%</h3>
                    </div>
                    <div class="scorelab-card p-4 border-l-2 border-green-500">
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Over 2.5 FT</p>
                        <h3 id="res_ft25" class="text-2xl font-black text-white">0.0%</h3>
                    </div>
                    <div class="scorelab-card p-4 border-l-2 border-yellow-500">
                        <p class="text-[9px] font-bold text-slate-500 uppercase">BTTS YES</p>
                        <h3 id="res_btts" class="text-2xl font-black text-white">0.0%</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let database = [];
        let SHEET_IDS = {
            stats_top: '1DYUN8_Gr80v6bpj3T2k9Ga2Bg1ZwHYtO',
            over25: '1BfAXMV6EHLEz3CJ2lAZO6spHJUXQ-mh6'
        };

        function toggleConfig() {
            const p = document.getElementById('config_panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function updateStatus(state, message) {
            const led = document.getElementById('status_led');
            const txt = document.getElementById('status_text');
            led.className = 'led-puck ' + (state === 'loading' ? 'led-loading' : 'led-active');
            txt.innerText = message;
        }

        async function syncSheet() {
            updateStatus('loading', 'Cargando DB...');
            const id = document.getElementById('id_stats_top').value;
            const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`;
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                database = json.table.rows.map(row => ({
                    league: row.c[0]?.v,
                    home: row.c[2]?.v,
                    away: row.c[3]?.v,
                    gl: parseFloat(row.c[4]?.v || 0),
                    gv: parseFloat(row.c[5]?.v || 0)
                })).filter(r => r.league);

                populateLeagues();
                updateStatus('active', 'Sistema Online');
            } catch (e) {
                updateStatus('standby', 'Error de Carga');
                console.error(e);
            }
        }

        function populateLeagues() {
            const select = document.getElementById('league_select');
            const leagues = [...new Set(database.map(d => d.league))].sort();
            select.innerHTML = leagues.map(l => `<option value="${l}">${l}</option>`).join('');
            filterTeamsByLeague();
        }

        function filterTeamsByLeague() {
            const league = document.getElementById('league_select').value;
            const teams = database.filter(d => d.league === league);
            const homeSelect = document.getElementById('home_select');
            const awaySelect = document.getElementById('away_select');
            
            const homeTeams = [...new Set(teams.map(t => t.home))].sort();
            const awayTeams = [...new Set(teams.map(t => t.away))].sort();

            homeSelect.innerHTML = homeTeams.map(t => `<option value="${t}">${t}</option>`).join('');
            awaySelect.innerHTML = awayTeams.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function factorial(n) {
            if (n === 0) return 1;
            let res = 1;
            for (let i = 2; i <= n; i++) res *= i;
            return res;
        }

        function poisson(k, lambda) {
            return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
        }

        function calculate() {
            const h_gf = parseFloat(document.getElementById('h_gf').value) || 0;
            const h_gc = parseFloat(document.getElementById('h_gc').value) || 0;
            const a_gf = parseFloat(document.getElementById('a_gf').value) || 0;
            const a_gc = parseFloat(document.getElementById('a_gc').value) || 0;

            const lambdaH = (h_gf + a_gc) / 2;
            const lambdaA = (a_gf + h_gc) / 2;

            let over25 = 0;
            let btts = 0;
            let probZeroH = poisson(0, lambdaH);
            let probZeroA = poisson(0, lambdaA);

            for(let h=0; h<6; h++) {
                for(let a=0; a<6; a++) {
                    let p = poisson(h, lambdaH) * poisson(a, lambdaA);
                    if(h + a > 2.5) over25 += p;
                    if(h > 0 && a > 0) btts += p;
                }
            }

            document.getElementById('res_ft25').innerText = (over25 * 100).toFixed(1) + '%';
            document.getElementById('res_btts').innerText = (btts * 100).toFixed(1) + '%';
            document.getElementById('res_ht05').innerText = ((1 - (poisson(0, lambdaH/2) * poisson(0, lambdaA/2))) * 100).toFixed(1) + '%';
        }

        function saveIDs() {
            alert("IDs actualizados. Sincronizando...");
            syncSheet();
            toggleConfig();
        }

        // Inicialización
        window.onload = syncSheet;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Poisson de Córners - La Liga</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .selector-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; background: #ecf0f1; padding: 20px; border-radius: 8px; }
        .team-select { flex: 1; display: flex; flex-direction: column; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 16px; }
        label { font-weight: bold; margin-bottom: 5px; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #219150; }
        .results { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 8px; background: #fff; }
        .card h3 { margin-top: 0; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        .prob-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .prob-table th, .prob-table td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        .highlight { font-weight: bold; color: #2980b9; }
        .summary { grid-column: 1 / span 2; text-align: center; font-size: 1.2em; padding: 15px; background: #f9f9f9; border-left: 5px solid #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Calculadora de Córners (Poisson)</h1>
    
    <div class="selector-group">
        <div class="team-select">
            <label for="homeTeam">Equipo Local:</label>
            <select id="homeTeam"></select>
        </div>
        <div class="team-select">
            <label for="awayTeam">Equipo Visitante:</label>
            <select id="awayTeam"></select>
        </div>
    </div>
    
    <button onclick="calculatePoisson()">Calcular Probabilidades</button>

    <div id="output" class="results" style="display:none;">
        <div class="summary" id="predictionSummary"></div>
        
        <div class="card">
            <h3>Córners Local (Probabilidad)</h3>
            <table class="prob-table" id="homeProbTable">
                <thead><tr><th>Córners</th><th>Probabilidad</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="card">
            <h3>Córners Visitante (Probabilidad)</h3>
            <table class="prob-table" id="awayProbTable">
                <thead><tr><th>Córners</th><th>Probabilidad</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Datos proporcionados por el usuario
const homeStats = {
    "Alaves": {gp: 13, for: 5.85, ag: 4.46}, "Athletic Bilbao": {gp: 14, for: 5.43, ag: 3.79},
    "Atletico Madrid": {gp: 14, for: 8.21, ag: 3.43}, "Celta Vigo": {gp: 14, for: 4.71, ag: 4.43},
    "Elche": {gp: 14, for: 4.29, ag: 3.64}, "Espanyol": {gp: 13, for: 4.46, ag: 4.38},
    "FC Barcelona": {gp: 13, for: 8.00, ag: 3.31}, "Getafe": {gp: 14, for: 4.29, ag: 4.21},
    "Girona": {gp: 13, for: 5.08, ag: 4.15}, "Levante": {gp: 14, for: 4.71, ag: 5.29},
    "Mallorca": {gp: 13, for: 3.23, ag: 6.31}, "Osasuna": {gp: 13, for: 3.85, ag: 3.92},
    "Rayo Vallecano": {gp: 13, for: 6.92, ag: 4.62}, "Real Betis": {gp: 13, for: 4.38, ag: 4.62},
    "Real Madrid": {gp: 13, for: 6.85, ag: 3.00}, "Real Oviedo": {gp: 13, for: 4.62, ag: 4.92},
    "Real Sociedad": {gp: 13, for: 5.92, ag: 4.77}, "Sevilla FC": {gp: 14, for: 4.93, ag: 3.43},
    "Valencia": {gp: 14, for: 6.50, ag: 4.43}, "Villarreal": {gp: 14, for: 5.21, ag: 4.43}
};

const awayStats = {
    "Alaves": {gp: 14, for: 4.14, ag: 5.36}, "Athletic Bilbao": {gp: 13, for: 5.08, ag: 4.08},
    "Atletico Madrid": {gp: 13, for: 5.23, ag: 4.15}, "Celta Vigo": {gp: 13, for: 3.54, ag: 5.00},
    "Elche": {gp: 13, for: 3.08, ag: 5.31}, "Espanyol": {gp: 13, for: 4.08, ag: 4.54},
    "FC Barcelona": {gp: 14, for: 6.86, ag: 4.93}, "Getafe": {gp: 13, for: 4.46, ag: 4.77},
    "Girona": {gp: 14, for: 3.43, ag: 6.07}, "Levante": {gp: 13, for: 2.54, ag: 7.69},
    "Mallorca": {gp: 14, for: 3.36, ag: 7.43}, "Osasuna": {gp: 14, for: 2.93, ag: 5.57},
    "Rayo Vallecano": {gp: 14, for: 4.79, ag: 5.36}, "Real Betis": {gp: 14, for: 4.79, ag: 6.00},
    "Real Madrid": {gp: 14, for: 6.29, ag: 4.00}, "Real Oviedo": {gp: 13, for: 3.54, ag: 6.92},
    "Real Sociedad": {gp: 14, for: 5.57, ag: 4.57}, "Sevilla FC": {gp: 13, for: 5.00, ag: 6.00},
    "Valencia": {gp: 13, for: 3.77, ag: 5.15}, "Villarreal": {gp: 13, for: 2.69, ag: 4.46}
};

// Cálculo de Promedios de la Liga
function getLeagueAverages() {
    let homeForSum = 0, homeAgSum = 0, awayForSum = 0, awayAgSum = 0;
    const teams = Object.keys(homeStats);
    teams.forEach(t => {
        homeForSum += homeStats[t].for;
        homeAgSum += homeStats[t].ag;
        awayForSum += awayStats[t].for;
        awayAgSum += awayStats[t].ag;
    });
    const count = teams.length;
    return {
        avgHomeFor: homeForSum / count,
        avgHomeAg: homeAgSum / count,
        avgAwayFor: awayForSum / count,
        avgAwayAg: awayAgSum / count
    };
}

const avg = getLeagueAverages();

// Llenar selectores
const homeSelect = document.getElementById('homeTeam');
const awaySelect = document.getElementById('awayTeam');
Object.keys(homeStats).sort().forEach(team => {
    homeSelect.add(new Option(team, team));
    awaySelect.add(new Option(team, team));
});

function factorial(n) {
    if (n === 0) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}

function calculatePoisson() {
    const homeName = homeSelect.value;
    const awayName = awaySelect.value;

    if (homeName === awayName) {
        alert("Por favor selecciona equipos diferentes.");
        return;
    }

    // Fuerza de Ataque Local = Goles favor local / Promedio favor local liga
    // Fuerza de Defensa Visitante = Goles contra visitante / Promedio contra visitante liga
    const homeAttackForce = homeStats[homeName].for / avg.avgHomeFor;
    const awayDefenseForce = awayStats[awayName].ag / avg.avgAwayAg;
    const expectedHomeCorners = homeAttackForce * awayDefenseForce * avg.avgHomeFor;

    const awayAttackForce = awayStats[awayName].for / avg.avgAwayFor;
    const homeDefenseForce = homeStats[homeName].ag / avg.avgHomeAg;
    const expectedAwayCorners = awayAttackForce * homeDefenseForce * avg.avgAwayFor;

    displayResults(expectedHomeCorners, expectedAwayCorners, homeName, awayName);
}

function displayResults(lambdaHome, lambdaAway, homeName, awayName) {
    document.getElementById('output').style.display = 'grid';
    document.getElementById('predictionSummary').innerHTML = `
        <strong>Expectativa Total: ${(lambdaHome + lambdaAway).toFixed(2)} Córners</strong><br>
        <small>${homeName}: ${lambdaHome.toFixed(2)} | ${awayName}: ${lambdaAway.toFixed(2)}</small>
    `;

    const hTable = document.querySelector('#homeProbTable tbody');
    const aTable = document.querySelector('#awayProbTable tbody');
    hTable.innerHTML = '';
    aTable.innerHTML = '';

    for (let i = 0; i <= 30; i++) {
        const pHome = (poisson(i, lambdaHome) * 100).toFixed(2);
        const pAway = (poisson(i, lambdaAway) * 100).toFixed(2);

        hTable.innerHTML += `<tr><td>${i}</td><td class="${pHome > 10 ? 'highlight' : ''}">${pHome}%</td></tr>`;
        aTable.innerHTML += `<tr><td>${i}</td><td class="${pAway > 10 ? 'highlight' : ''}">${pAway}%</td></tr>`;
    }
}
</script>

</body>
</html>

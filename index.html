<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run-in Analytics Pro - Predictor</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .card { background: white; padding: 25px; border-radius: 12px; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: monospace; font-size: 13px; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; margin-bottom: 10px; width: 100%; box-sizing: border-box; }

        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; color: white; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 11px; }

        .prediction-box { background: #eff6ff; border: 2px solid #dbeafe; padding: 20px; border-radius: 10px; margin-top: 15px; }
        .diff-pos { color: var(--success); font-weight: bold; }
        .diff-neg { color: var(--danger); font-weight: bold; }
        
        .league-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1>⚽ Run-in Analysis Predictor</h1>
        <p>Basado en la metodología de dificultad de oponentes de SoccerSTATS</p>
    </header>

    <div class="grid">
        <div class="card">
            <h3>Cargar/Editar Liga</h3>
            <input type="text" id="leagueName" placeholder="Nombre de la Liga (ej. Premier League)">
            <textarea id="rawData" placeholder="Copia las columnas: Equipo | GP | Pts | PPG | PLD_Opp | REM_Opp | Diff"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-blue" onclick="saveLeague()">Guardar / Actualizar</button>
                <button class="btn btn-red" onclick="clearInputs()">Limpiar</button>
            </div>
            
            <h4 style="margin-top:20px;">Ligas Guardadas</h4>
            <div id="leagueList"></div>
        </div>

        <div class="card" id="predictorUI" style="display:none;">
            <h3>Generar Pronóstico</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr; align-items: center;">
                <div>
                    <label>Local</label>
                    <select id="homeTeam"></select>
                </div>
                <div>
                    <label>Visitante</label>
                    <select id="awayTeam"></select>
                </div>
            </div>
            <button class="btn btn-green" style="width:100%; margin-top:15px;" onclick="calculateAdvancedPrediction()">Calcular Probabilidades</button>
            
            <div id="predictionResult"></div>
        </div>
    </div>

    <div class="card">
        <h3>Análisis de Fuerza de Calendario</h3>
        <div id="tableWrapper" style="overflow-x: auto;">
            <p style="color: #64748b;">No hay datos cargados.</p>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('runInDB')) || {};

    window.onload = renderLeagueList;

    function saveLeague() {
        const name = document.getElementById('leagueName').value.trim();
        const data = document.getElementById('rawData').value.trim();
        
        if (!name || !data) return alert("Faltan datos");

        const lines = data.split('\n');
        const teamList = [];

        lines.forEach(line => {
            const cols = line.split(/\t| {2,}/);
            if (cols.length >= 5) {
                teamList.push({
                    name: cols[1].trim(),
                    ppg: parseFloat(cols[4]),
                    playedOppPPG: parseFloat(cols[5]),
                    remOppPPG: parseFloat(cols[6]),
                    diff: cols[7] ? cols[7].trim() : "0%"
                });
            }
        });

        db[name] = teamList;
        localStorage.setItem('runInDB', JSON.stringify(db));
        renderLeagueList();
        loadLeague(name);
        alert("Liga guardada correctamente");
    }

    function renderLeagueList() {
        const container = document.getElementById('leagueList');
        container.innerHTML = '';
        Object.keys(db).forEach(name => {
            const div = document.createElement('div');
            div.className = 'league-item';
            div.innerHTML = `
                <span><strong>${name}</strong> (${db[name].length} equipos)</span>
                <div>
                    <button class="btn btn-blue" style="padding:5px 10px" onclick="loadLeague('${name}')">Cargar</button>
                    <button class="btn btn-red" style="padding:5px 10px" onclick="deleteLeague('${name}')">✕</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function loadLeague(name) {
        const teams = db[name];
        document.getElementById('leagueName').value = name;
        document.getElementById('predictorUI').style.display = 'block';
        
        // Llenar selectores
        const hSelect = document.getElementById('homeTeam');
        const aSelect = document.getElementById('awayTeam');
        hSelect.innerHTML = aSelect.innerHTML = '';
        
        let tableHtml = `<table><thead><tr><th>Equipo</th><th>PPG</th><th>PLD Opp</th><th>REM Opp</th><th>Diff</th></tr></thead><tbody>`;
        
        teams.forEach(t => {
            hSelect.innerHTML += `<option value="${t.name}">${t.name}</option>`;
            aSelect.innerHTML += `<option value="${t.name}">${t.name}</option>`;
            
            const diffClass = t.diff.includes('+') ? 'diff-pos' : (t.diff.includes('-') ? 'diff-neg' : '');
            tableHtml += `<tr>
                <td><strong>${t.name}</strong></td>
                <td>${t.ppg}</td>
                <td>${t.playedOppPPG}</td>
                <td>${t.remOppPPG}</td>
                <td class="${diffClass}">${t.diff}</td>
            </tr>`;
        });
        
        tableHtml += `</tbody></table>`;
        document.getElementById('tableWrapper').innerHTML = tableHtml;
    }

    function deleteLeague(name) {
        if(confirm(`¿Eliminar ${name}?`)) {
            delete db[name];
            localStorage.setItem('runInDB', JSON.stringify(db));
            renderLeagueList();
            location.reload();
        }
    }

    function calculateAdvancedPrediction() {
        const league = document.getElementById('leagueName').value;
        const hName = document.getElementById('homeTeam').value;
        const aName = document.getElementById('awayTeam').value;
        const teams = db[league];

        const home = teams.find(t => t.name === hName);
        const away = teams.find(t => t.name === aName);

        /**
         * LÓGICA MEJORADA:
         * 1. Ajustamos el PPG base según la dificultad enfrentada (Played Opp PPG).
         * Si un equipo tiene PPG alto contra rivales difíciles, es más fuerte de lo que parece.
         * 2. Consideramos el REM Opp del rival para ver qué tan "acostumbrados" están a la presión.
         */
        
        const homeTrueStrength = home.ppg * (home.playedOppPPG / 1.3); 
        const awayTrueStrength = away.ppg * (away.playedOppPPG / 1.3);

        const diff = homeTrueStrength - awayTrueStrength;
        
        // Probabilidades Estimadas
        let result1X2 = "";
        let color = "";
        
        if (diff > 0.5) { result1X2 = "1 - Local Fuerte"; color = "var(--success)"; }
        else if (diff > 0.15) { result1X2 = "1X - Local Favorito"; color = "#60a5fa"; }
        else if (diff < -0.5) { result1X2 = "2 - Visitante Fuerte"; color = "var(--danger)"; }
        else if (diff < -0.15) { result1X2 = "X2 - Visitante Favorito"; color = "#f87171"; }
        else { result1X2 = "X - Empate Técnico"; color = "#94a3b8"; }

        // Goles (Basado en la suma de PPG y tendencia de dificultad)
        const totalExp = (home.ppg + away.ppg) / 2;
        const ou = totalExp > 1.6 ? "Over 2.5 Goles" : "Under 2.5 Goles";
        const btts = (home.ppg > 1.1 && away.ppg > 1.1) ? "Ambos Anotan: SÍ" : "Ambos Anotan: NO";

        document.getElementById('predictionResult').innerHTML = `
            <div class="prediction-box">
                <h2 style="color:${color}; text-align:center;">${result1X2}</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:0.9em;">
                    <div><strong>Goles:</strong> ${ou}</div>
                    <div><strong>BTTS:</strong> ${btts}</div>
                    <div><strong>Fuerza Local:</strong> ${homeTrueStrength.toFixed(2)}</div>
                    <div><strong>Fuerza Vis:</strong> ${awayTrueStrength.toFixed(2)}</div>
                </div>
            </div>
        `;
    }

    function clearInputs() {
        document.getElementById('leagueName').value = '';
        document.getElementById('rawData').value = '';
    }
</script>

</body>
</html>

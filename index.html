<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor de Mercados Pro - Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .table-sm th { font-size: 0.8rem; }
        .prediction-badge { font-size: 0.9rem; margin-right: 5px; }
        .btn-action { margin-top: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">⚽ Football Market Predictor</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Configuración de Liga</h5>
                <div class="mb-3">
                    <label class="form-label">Nombre de la Liga</label>
                    <input type="text" id="leagueName" class="form-control" placeholder="Ej. Prva Liga Eslovenia">
                </div>
                <button class="btn btn-primary w-100" onclick="saveLeague()">Guardar Liga y Tabla</button>
                <hr>
                <h5>Mis Ligas</h5>
                <div id="leaguesList" class="list-group">
                    </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3">
                <div class="d-flex justify-content-between">
                    <h5>Datos de la Tabla (Al Local)</h5>
                    <button class="btn btn-sm btn-outline-danger" onclick="clearTable()">Limpiar Filas</button>
                </div>
                <p class="text-muted small">Pega o escribe los porcentajes de cada equipo para generar pronósticos.</p>
                <div class="table-responsive">
                    <table class="table table-hover table-sm" id="inputTable">
                        <thead class="table-light">
                            <tr>
                                <th>Equipo</th>
                                <th>GP</th>
                                <th title="Equalize">Eq%</th>
                                <th title="Take Lead">TL%</th>
                                <th title="Inc Lead">IL%</th>
                                <th title="Opp Eq">Opp Eq%</th>
                                <th title="Opp TL">Opp TL%</th>
                                <th title="Opp Inc">Opp Inc%</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
                <button class="btn btn-success btn-sm btn-action" onclick="addRow()">+ Añadir Equipo</button>
            </div>

            <div class="card p-3">
                <h5>Análisis de Mercados Sugeridos</h5>
                <div id="predictionResults" class="row">
                    <p class="text-center text-muted">Añade datos para ver el análisis de mercados.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLeagues = JSON.parse(localStorage.getItem('footballLeagues')) || {};

    // Al cargar la página
    window.onload = () => {
        updateLeaguesList();
        addRow(); // Añade una fila vacía por defecto
    };

    function addRow(data = {}) {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="form-control form-control-sm team-name" value="${data.name || ''}"></td>
            <td><input type="number" class="form-control form-control-sm gp" value="${data.gp || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm eq" value="${data.eq || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm tl" value="${data.tl || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm il" value="${data.il || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm oeq" value="${data.oeq || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm otl" value="${data.otl || 0}"></td>
            <td><input type="number" step="0.1" class="form-control form-control-sm oil" value="${data.oil || 0}"></td>
            <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove(); runAnalysis();">×</button></td>
        `;
        tbody.appendChild(tr);
        
        // Listener para análisis en tiempo real
        tr.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', runAnalysis);
        });
    }

    function runAnalysis() {
        const rows = document.querySelectorAll('#tableBody tr');
        const resultsContainer = document.getElementById('predictionResults');
        resultsContainer.innerHTML = '';

        rows.forEach(row => {
            const name = row.querySelector('.team-name').value;
            const il = parseFloat(row.querySelector('.il').value) || 0;
            const tl = parseFloat(row.querySelector('.tl').value) || 0;
            const eq = parseFloat(row.querySelector('.eq').value) || 0;
            const oil = parseFloat(row.querySelector('.oil').value) || 0;
            const oeq = parseFloat(row.querySelector('.oeq').value) || 0;

            if (!name) return;

            let badges = '';

            // Lógica de Mercados
            if (il > 45) badges += `<span class="badge bg-success prediction-badge">Over 2.5 / +1.5 Goles Equipo</span>`;
            if (tl > 55) badges += `<span class="badge bg-primary prediction-badge">1er Gol: ${name}</span>`;
            if (eq > 45) badges += `<span class="badge bg-warning text-dark prediction-badge">Doble Oportunidad (Resiliencia)</span>`;
            if (oeq > 40) badges += `<span class="badge bg-info text-dark prediction-badge">Ambos Anotan (BTTS)</span>`;
            if (oil > 45) badges += `<span class="badge bg-danger prediction-badge">Hándicap en Contra si empieza perdiendo</span>`;
            if (il < 10 && tl > 0) badges += `<span class="badge bg-secondary prediction-badge">Under 2.5 (No amplia ventaja)</span>`;

            const card = `
                <div class="col-md-6 mb-3">
                    <div class="border p-2 rounded">
                        <strong>${name}</strong><br>
                        ${badges || '<small class="text-muted">Sin tendencias fuertes</small>'}
                    </div>
                </div>
            `;
            resultsContainer.innerHTML += card;
        });
    }

    function saveLeague() {
        const name = document.getElementById('leagueName').value;
        if (!name) return alert("Ponle un nombre a la liga");

        const tableData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            tableData.push({
                name: row.querySelector('.team-name').value,
                gp: row.querySelector('.gp').value,
                eq: row.querySelector('.eq').value,
                tl: row.querySelector('.tl').value,
                il: row.querySelector('.il').value,
                oeq: row.querySelector('.oeq').value,
                otl: row.querySelector('.otl').value,
                oil: row.querySelector('.oil').value
            });
        });

        currentLeagues[name] = tableData;
        localStorage.setItem('footballLeagues', JSON.stringify(currentLeagues));
        updateLeaguesList();
        alert("Liga guardada con éxito");
    }

    function updateLeaguesList() {
        const list = document.getElementById('leaguesList');
        list.innerHTML = '';
        Object.keys(currentLeagues).forEach(league => {
            const btn = document.createElement('button');
            btn.className = "list-group-item list-group-item-action d-flex justify-content-between align-items-center";
            btn.innerHTML = `<span>${league}</span> <span class="badge bg-danger btn-sm" onclick="deleteLeague('${league}', event)">Eliminar</span>`;
            btn.onclick = () => loadLeague(league);
            list.appendChild(btn);
        });
    }

    function loadLeague(name) {
        document.getElementById('leagueName').value = name;
        document.getElementById('tableBody').innerHTML = '';
        currentLeagues[name].forEach(team => addRow(team));
        runAnalysis();
    }

    function deleteLeague(name, event) {
        event.stopPropagation();
        delete currentLeagues[name];
        localStorage.setItem('footballLeagues', JSON.stringify(currentLeagues));
        updateLeaguesList();
    }

    function clearTable() {
        document.getElementById('tableBody').innerHTML = '';
        addRow();
        runAnalysis();
    }
</script>

</body>
</html>

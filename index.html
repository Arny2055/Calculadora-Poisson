<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - Análisis Proporcional Poisson & Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-yellow: #fcc419;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; border: 1px solid var(--border); }
        
        h1 { text-align: center; color: var(--primary); letter-spacing: 2px; margin-bottom: 30px; }
        h1 span { color: var(--accent-yellow); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; display: block; color: var(--primary); text-transform: uppercase; }
        
        textarea { width: 100%; height: 100px; background: #0b0e14; color: var(--accent-green); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.7rem; padding: 10px; box-sizing: border-box; resize: vertical; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: #339af0; transform: translateY(-2px); }
        .btn-save { background: var(--accent-yellow); color: #000; margin-top: 5px; font-size: 0.8rem; padding: 10px; }

        .league-manager { margin-bottom: 15px; display: flex; gap: 10px; align-items: flex-end; }
        .league-manager div { flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-box label { color: var(--accent-yellow); font-size: 0.6rem; }
        .stat-box .val { font-size: 1.2rem; font-weight: 900; color: #fff; }

        .heat-map { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .heat-cell { padding: 12px 5px; text-align: center; border-radius: 6px; font-size: 0.7rem; font-weight: bold; color: #000; transition: 0.3s; }

        .selector-area { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select { width: 100%; padding: 12px; background: #0b0e14; color: white; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }

        .result-panel { display: none; margin-top: 20px; }
        .chart-container { height: 280px; margin-top: 25px; }
        
        .prediction-badge { background: linear-gradient(135deg, rgba(81, 207, 102, 0.1), rgba(77, 171, 247, 0.1)); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        
        input[type="text"] { width:100%; padding:10px; background:#0b0e14; border:1px solid var(--border); color:white; border-radius:8px; box-sizing:border-box; }

        /* NUEVOS ESTILOS REVOLUCIONARIOS */
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .matrix-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .matrix-card h4 { margin: 0 0 10px 0; font-size: 0.8rem; color: var(--primary); }
        .prob-val { font-size: 1.8rem; font-weight: 900; color: var(--accent-green); }
        .score-list { text-align: left; font-size: 0.75rem; margin-top: 10px; }
        .score-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> POISSON LAB v2</h1>
    
    <div class="card">
        <div class="league-manager">
            <div>
                <label>IDENTIFICADOR DE LIGA</label>
                <input type="text" id="leagueName" placeholder="Ej: Liga MX 2026">
            </div>
            <div style="flex-grow: 0;">
                <label>CARGAR GUARDADA</label>
                <select id="savedLeagues" onchange="loadSelectedLeague()"></select>
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>Standings Local (GP, GF, GA)</label>
                <textarea id="homeTable" placeholder="Copia columnas: Equipo GP...GF GA"></textarea>
            </div>
            <div>
                <label>Standings Visita (GP, GF, GA)</label>
                <textarea id="awayTable" placeholder="Copia columnas: Equipo GP...GF GA"></textarea>
            </div>
            <div>
                <label>Minutos Local (Tendencia)</label>
                <textarea id="localData" placeholder="Equipo 0-15...76-90"></textarea>
            </div>
            <div>
                <label>Minutos Visita (Tendencia)</label>
                <textarea id="visitaData" placeholder="Equipo 0-15...76-90"></textarea>
            </div>
        </div>
        <button class="btn btn-calc" onclick="processAllData()">Sincronizar Datos Base</button>
        <button class="btn btn-save" onclick="saveLeague()">💾 Guardar Liga</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="selector-area">
            <div><label>LOCAL</label><select id="selectHome"></select></div>
            <div><label>VISITANTE</label><select id="selectAway"></select></div>
        </div>
        <button class="btn btn-calc" style="background: var(--accent-green);" onclick="analyzeMatch()">Ejecutar Análisis Poisson & Matrix</button>
    </div>

    <div id="results" class="result-panel">
        <div class="card">
            <h3 id="matchTitle" style="text-align: center; margin-top: 0; color: var(--accent-yellow); text-transform: uppercase;"></h3>
            
            <div class="stats-grid">
                <div class="stat-box"><label>ATK LOCAL</label><div class="val" id="fzaAtkL">1.00</div></div>
                <div class="stat-box"><label>DEF LOCAL</label><div class="val" id="fzaDefL">1.00</div></div>
                <div class="stat-box"><label>ATK VISITA</label><div class="val" id="fzaAtkV">1.00</div></div>
                <div class="stat-box"><label>DEF VISITA</label><div class="val" id="fzaDefV">1.00</div></div>
            </div>

            <div class="matrix-grid">
                <div class="matrix-card">
                    <h4>GANA LOCAL (1)</h4>
                    <div class="prob-val" id="probHome">0%</div>
                    <div class="score-list" id="scoresHome"></div>
                </div>
                <div class="matrix-card">
                    <h4>EMPATE (X)</h4>
                    <div class="prob-val" id="probDraw" style="color: var(--accent-yellow);">0%</div>
                    <div class="score-list" id="scoresDraw"></div>
                </div>
                <div class="matrix-card">
                    <h4>GANA VISITA (2)</h4>
                    <div class="prob-val" id="probAway" style="color: var(--accent-red);">0%</div>
                    <div class="score-list" id="scoresAway"></div>
                </div>
            </div>

            <div style="margin-top:25px; text-align:center; font-size:0.75rem; color:var(--primary); font-weight: bold;">INTENSIDAD DE GOL POR TRAMO AJUSTADA</div>
            <div class="heat-map" id="heatMap"></div>

            <div class="prediction-badge">
                <div style="font-size: 0.8rem; color: var(--accent-green); font-weight: bold;">xG TOTAL PROYECTADO</div>
                <div id="finalXg" style="font-size: 3rem; font-weight: 900; color: #fff;">0.00</div>
                <div id="topTramo" style="font-size: 0.8rem; margin-top: 5px; color: var(--text-white);"></div>
            </div>

            <div class="chart-container">
                <canvas id="minuteChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let database = { homeMin: {}, awayMin: {}, homeTable: {}, awayTable: {} };
let leagueAvg = { homeGf: 0, homeGa: 0, awayGf: 0, awayGa: 0 };
let myChart = null;

window.onload = updateLeagueList;

// Función matemática de Poisson
function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}

function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function parseTable(text) {
    const lines = text.trim().split('\n');
    const teams = {};
    let totalGf = 0, totalGa = 0, totalGp = 0;

    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length < 5) return;

        let name, gp, gf, ga;
        if (!isNaN(parts[0])) {
            name = parts[1].trim();
            gp = parseInt(parts[2]);
            gf = parseInt(parts[6]);
            ga = parseInt(parts[7]);
        } else {
            name = parts[0].trim();
            gp = parseInt(parts[1]);
            gf = parseInt(parts[5]);
            ga = parseInt(parts[6]);
        }

        if (name && !isNaN(gp) && gp > 0) {
            teams[name] = { gp, gf, ga, avgGf: gf/gp, avgGa: ga/gp };
            totalGf += gf; totalGa += ga; totalGp += gp;
        }
    });

    return { teams, avgGf: totalGf / totalGp || 0, avgGa: totalGa / totalGp || 0 };
}

function parseMinuteData(text) {
    const lines = text.trim().split('\n');
    const result = {};
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length >= 7) {
            const name = parts[0].trim();
            const intervals = parts.slice(1, 7).map(item => {
                const [g, r] = item.split('-').map(Number);
                return { g: g || 0, r: r || 0 };
            });
            result[name] = intervals;
        }
    });
    return result;
}

function processAllData() {
    const resH = parseTable(document.getElementById('homeTable').value);
    const resV = parseTable(document.getElementById('awayTable').value);
    
    database.homeTable = resH.teams;
    database.awayTable = resV.teams;
    database.homeMin = parseMinuteData(document.getElementById('localData').value);
    database.awayMin = parseMinuteData(document.getElementById('visitaData').value);

    leagueAvg.homeGf = resH.avgGf;
    leagueAvg.homeGa = resH.avgGa;
    leagueAvg.awayGf = resV.avgGf;
    leagueAvg.awayGa = resV.avgGa;

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";

    Object.keys(database.homeTable).sort().forEach(n => sH.add(new Option(n, n)));
    Object.keys(database.awayTable).sort().forEach(n => sV.add(new Option(n, n)));

    if(Object.keys(database.homeTable).length > 0) {
        document.getElementById('selectionArea').style.display = 'block';
    }
}

function analyzeMatch() {
    const homeName = document.getElementById('selectHome').value;
    const awayName = document.getElementById('selectAway').value;
    
    const hT = database.homeTable[homeName];
    const vT = database.awayTable[awayName];
    const hM = database.homeMin[homeName];
    const vM = database.awayMin[awayName];

    if (!hT || !vT || !hM || !vM) return;

    // Fuerzas
    const fzaAtkL = hT.avgGf / leagueAvg.homeGf;
    const fzaDefL = hT.avgGa / leagueAvg.homeGa;
    const fzaAtkV = vT.avgGf / leagueAvg.awayGf;
    const fzaDefV = vT.avgGa / leagueAvg.awayGa;

    document.getElementById('fzaAtkL').innerText = fzaAtkL.toFixed(2);
    document.getElementById('fzaDefL').innerText = fzaDefL.toFixed(2);
    document.getElementById('fzaAtkV').innerText = fzaAtkV.toFixed(2);
    document.getElementById('fzaDefV').innerText = fzaDefV.toFixed(2);

    const lambdaL = fzaAtkL * fzaDefV * leagueAvg.homeGf;
    const lambdaV = fzaAtkV * fzaDefL * leagueAvg.awayGf;

    // --- CÁLCULO DE MATRIX DE MARCADORES (REVOLUCIONARIO) ---
    let probMatrix = [];
    let pHome = 0, pDraw = 0, pAway = 0;
    let scores = [];

    for (let i = 0; i <= 5; i++) {
        for (let j = 0; j <= 5; j++) {
            const pI = poisson(i, lambdaL);
            const pJ = poisson(j, lambdaV);
            const prob = pI * pJ;

            if (i > j) pHome += prob;
            else if (i === j) pDraw += prob;
            else pAway += prob;

            scores.push({ score: `${i}-${j}`, prob, type: i > j ? 'H' : (i === j ? 'D' : 'A') });
        }
    }

    // Actualizar UI de Probabilidades
    document.getElementById('probHome').innerText = (pHome * 100).toFixed(1) + "%";
    document.getElementById('probDraw').innerText = (pDraw * 100).toFixed(1) + "%";
    document.getElementById('probAway').innerText = (pAway * 100).toFixed(1) + "%";

    // Mostrar Top 3 marcadores por categoría
    const updateScores = (id, type) => {
        const filtered = scores.filter(s => s.type === type).sort((a, b) => b.prob - a.prob).slice(0, 3);
        document.getElementById(id).innerHTML = filtered.map(s => 
            `<div class="score-item"><span>${s.score}</span><span>${(s.prob * 100).toFixed(1)}%</span></div>`
        ).join('');
    };
    updateScores('scoresHome', 'H');
    updateScores('scoresDraw', 'D');
    updateScores('scoresAway', 'A');

    // --- TRAMOS DE TIEMPO ---
    const labels = ["0-15'", "16-30'", "31-45'", "46-60'", "61-75'", "76-90'"];
    let tramoWeights = [];
    let totalHistoricalRaw = 0;

    labels.forEach((_, i) => {
        const weight = (hM[i].g + hM[i].r + vM[i].g + vM[i].r);
        tramoWeights.push(weight);
        totalHistoricalRaw += weight;
    });

    const heatMap = document.getElementById('heatMap');
    heatMap.innerHTML = "";
    let xG_Timeline = [];
    let prob_Timeline = [];

    labels.forEach((label, i) => {
        const tramoFraction = totalHistoricalRaw > 0 ? (tramoWeights[i] / totalHistoricalRaw) : (1/6);
        const tramoXG = (lambdaL + lambdaV) * tramoFraction;
        const probGoal = (1 - Math.exp(-tramoXG)) * 100;

        xG_Timeline.push(tramoXG.toFixed(2));
        prob_Timeline.push(probGoal.toFixed(1));

        const cell = document.createElement('div');
        cell.className = 'heat-cell';
        cell.innerHTML = `${label}<br>${probGoal.toFixed(0)}%`;
        const intensity = Math.min(probGoal / 60, 1);
        cell.style.background = `rgba(81, 207, 102, ${0.2 + intensity * 0.8})`;
        heatMap.appendChild(cell);
    });

    document.getElementById('matchTitle').innerText = `${homeName} vs ${awayName}`;
    document.getElementById('finalXg').innerText = (lambdaL + lambdaV).toFixed(2);
    
    const maxIdx = prob_Timeline.indexOf(Math.max(...prob_Timeline.map(Number)).toFixed(1));
    document.getElementById('topTramo').innerText = `TRAMO CRÍTICO: ${labels[maxIdx]} (${prob_Timeline[maxIdx]}% prob. gol)`;

    renderChart(labels, xG_Timeline);
    document.getElementById('results').style.display = 'block';
}

function renderChart(labels, data) {
    const ctx = document.getElementById('minuteChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Curva de Presión xG',
                data: data,
                borderColor: '#4dabf7',
                backgroundColor: 'rgba(77, 171, 247, 0.1)',
                fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fcc419'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, grid: { color: '#2c3440' }, ticks: { color: '#868e96' } },
                x: { grid: { display: false }, ticks: { color: '#868e96' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function saveLeague() {
    const name = document.getElementById('leagueName').value.trim();
    if(!name) return alert("Nombre de liga vacío.");
    const data = {
        name,
        hT: document.getElementById('homeTable').value,
        vT: document.getElementById('awayTable').value,
        hM: document.getElementById('localData').value,
        vM: document.getElementById('visitaData').value
    };
    localStorage.setItem('league_psn_' + name, JSON.stringify(data));
    updateLeagueList();
    alert("Liga guardada.");
}

function updateLeagueList() {
    const selector = document.getElementById('savedLeagues');
    selector.innerHTML = '<option value="">-- Seleccionar --</option>';
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('league_psn_')) {
            selector.add(new Option(key.replace('league_psn_', ''), key));
        }
    }
}

function loadSelectedLeague() {
    const key = document.getElementById('savedLeagues').value;
    if(!key) return;
    const data = JSON.parse(localStorage.getItem(key));
    document.getElementById('leagueName').value = data.name;
    document.getElementById('homeTable').value = data.hT;
    document.getElementById('awayTable').value = data.vT;
    document.getElementById('localData').value = data.hM;
    document.getElementById('visitaData').value = data.vM;
    processAllData();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Data Hub - API Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-blue-800 p-6 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold flex items-center gap-2">
                <i class="fas fa-futbol"></i> Football Hub 2026
            </h1>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="api-key" value="ef70b39965b14c3eadce9041d1ab2a56" 
                       class="bg-blue-900 border border-blue-700 rounded px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Tu API Key">
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="flex flex-wrap gap-4 mb-8 justify-center">
            <button onclick="fetchCompetitions()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-trophy mr-2"></i>Competiciones
            </button>
            <button onclick="fetchMatches('TODAY')" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-clock mr-2"></i>Partidos de Hoy
            </button>
            <button onclick="fetchMatches('LIVE')" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-broadcast-tower mr-2"></i>En Vivo
            </button>
        </div>

        <div id="loader" class="hidden flex justify-center my-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500">
                <i class="fas fa-search fa-4x mb-4"></i>
                <p class="text-xl">Selecciona una opción para empezar a visualizar datos</p>
            </div>
        </div>
    </main>

    <footer class="text-center p-8 text-gray-500 border-t border-gray-800 mt-10">
        Powered by <a href="https://www.football-data.org/" target="_blank" class="text-blue-400">Football-Data.org</a> API
    </footer>

    <script>
        const API_BASE = 'https://api.football-data.org/v4';

        async function apiRequest(endpoint) {
            const apiKey = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            loader.classList.remove('hidden');
            content.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    headers: { 'X-Auth-Token': apiKey }
                });
                
                if (!response.ok) throw new Error(`Error: ${response.status}`);
                
                const data = await response.json();
                loader.classList.add('hidden');
                return data;
            } catch (error) {
                loader.classList.add('hidden');
                content.innerHTML = `
                    <div class="col-span-full bg-red-900/50 border border-red-500 p-4 rounded text-center text-red-200">
                        Error al conectar con la API: ${error.message}. <br>
                        Verifica que tu API Key sea correcta o que no hayas excedido el límite de peticiones.
                    </div>`;
                return null;
            }
        }

        async function fetchCompetitions() {
            const data = await apiRequest('competitions');
            if (!data) return;

            const content = document.getElementById('content');
            data.competitions.forEach(league => {
                const card = `
                    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 hover:border-blue-500 transition-all shadow-lg">
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${league.emblem || 'https://via.placeholder.com/50'}" alt="${league.name}" class="w-12 h-12 object-contain">
                            <h3 class="text-xl font-bold">${league.name}</h3>
                        </div>
                        <p class="text-gray-400 mb-2"><i class="fas fa-globe mr-2"></i>${league.area.name}</p>
                        <p class="text-sm text-gray-500">Código: ${league.code}</p>
                        <button onclick="fetchStandings('${league.code}')" class="mt-4 w-full bg-blue-700 hover:bg-blue-600 py-2 rounded font-medium">
                            Ver Clasificación
                        </button>
                    </div>`;
                content.innerHTML += card;
            });
        }

        async function fetchMatches(status) {
            let endpoint = 'matches';
            if (status === 'LIVE') endpoint += '?status=IN_PLAY';
            
            const data = await apiRequest(endpoint);
            if (!data) return;

            const content = document.getElementById('content');
            if (data.matches.length === 0) {
                content.innerHTML = '<p class="col-span-full text-center text-gray-400">No hay partidos programados en este momento.</p>';
                return;
            }

            data.matches.forEach(match => {
                const card = `
                    <div class="bg-gray-800 rounded-lg p-4 border-l-4 ${match.status === 'IN_PLAY' ? 'border-red-500' : 'border-blue-500'}">
                        <div class="text-xs text-gray-400 mb-2 flex justify-between">
                            <span>${match.competition.name}</span>
                            <span class="font-bold">${match.status}</span>
                        </div>
                        <div class="flex justify-between items-center text-lg">
                            <div class="flex-1 text-right pr-4">${match.homeTeam.shortName}</div>
                            <div class="bg-gray-700 px-3 py-1 rounded font-mono text-xl">
                                ${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}
                            </div>
                            <div class="flex-1 text-left pl-4">${match.awayTeam.shortName}</div>
                        </div>
                    </div>`;
                content.innerHTML += card;
            });
        }

        async function fetchStandings(code) {
            const data = await apiRequest(`competitions/${code}/standings`);
            if (!data) return;

            const content = document.getElementById('content');
            content.classList.remove('grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3');
            content.classList.add('grid-cols-1');

            const standing = data.standings[0].table;
            let tableHtml = `
                <div class="bg-gray-800 rounded-lg overflow-x-auto shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="p-4">Pos</th>
                                <th class="p-4">Equipo</th>
                                <th class="p-4">PJ</th>
                                <th class="p-4">G</th>
                                <th class="p-4">E</th>
                                <th class="p-4">P</th>
                                <th class="p-4">Pts</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${standing.map(team => `
                                <tr class="border-t border-gray-700 hover:bg-gray-700/50">
                                    <td class="p-4 font-bold">${team.position}</td>
                                    <td class="p-4 flex items-center gap-3">
                                        <img src="${team.team.crest}" class="w-6 h-6">
                                        ${team.team.name}
                                    </td>
                                    <td class="p-4">${team.playedGames}</td>
                                    <td class="p-4">${team.won}</td>
                                    <td class="p-4">${team.draw}</td>
                                    <td class="p-4">${team.lost}</td>
                                    <td class="p-4 font-bold text-blue-400">${team.points}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <button onclick="fetchCompetitions()" class="mt-6 text-blue-400 hover:underline">
                    <i class="fas fa-arrow-left mr-2"></i>Volver a Competiciones
                </button>
            `;
            content.innerHTML = tableHtml;
        }
    </script>
</body>
</html>

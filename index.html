<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Data Hub - v2.0 Corregida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-blue-800 p-6 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold flex items-center gap-2">
                <i class="fas fa-futbol"></i> Football Hub 2026
            </h1>
            <div class="flex flex-col gap-1 w-full md:w-auto">
                <input type="password" id="api-key" value="ef70b39965b14c3eadce9041d1ab2a56" 
                       class="bg-blue-900 border border-blue-700 rounded px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Tu API Key">
                <span class="text-xs text-blue-200 opacity-70 italic">* Usando Proxy CORS para evitar bloqueos</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="flex flex-wrap gap-4 mb-8 justify-center">
            <button onclick="fetchCompetitions()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-trophy mr-2"></i>Competiciones
            </button>
            <button onclick="fetchMatches('TODAY')" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-clock mr-2"></i>Partidos de Hoy
            </button>
            <button onclick="fetchMatches('LIVE')" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-full transition-all font-semibold">
                <i class="fas fa-broadcast-tower mr-2"></i>En Vivo
            </button>
        </div>

        <div id="loader" class="hidden flex justify-center my-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500">
                <i class="fas fa-search fa-4x mb-4"></i>
                <p class="text-xl">Selecciona una opción para empezar</p>
            </div>
        </div>
    </main>

    <script>
        // Usamos un proxy de CORS público para evitar el error 'Failed to fetch'
        const PROXY_URL = 'https://corsproxy.io/?'; 
        const API_BASE = 'https://api.football-data.org/v4';

        async function apiRequest(endpoint) {
            const apiKey = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            loader.classList.remove('hidden');
            
            // Construimos la URL pasando por el proxy
            const targetUrl = `${API_BASE}/${endpoint}`;
            const finalUrl = PROXY_URL + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(finalUrl, {
                    method: 'GET',
                    headers: { 
                        'X-Auth-Token': apiKey,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.status === 429) {
                    throw new Error("Límite de peticiones excedido (máximo 10 por minuto). Espera un poco.");
                }

                if (!response.ok) throw new Error(`Error de servidor: ${response.status}`);
                
                const data = await response.json();
                loader.classList.add('hidden');
                return data;
            } catch (error) {
                loader.classList.add('hidden');
                content.innerHTML = `
                    <div class="col-span-full bg-red-900/50 border border-red-500 p-6 rounded text-center">
                        <i class="fas fa-exclamation-triangle text-3xl mb-3 text-red-400"></i>
                        <p class="text-red-200 font-bold">${error.message}</p>
                        <p class="text-sm text-red-300 mt-2">Nota: Si el error persiste, la API podría estar limitando el acceso desde proxies públicos.</p>
                    </div>`;
                return null;
            }
        }

        async function fetchCompetitions() {
            const data = await apiRequest('competitions');
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = '';

            // Filtrar solo las competiciones que permite el plan gratuito
            const freeTierCodes = ['WC', 'CL', 'BL1', 'DED', 'SA', 'PL', 'FL1', 'ELC', 'PPL', 'EC', 'CLI'];
            const availableLeagues = data.competitions.filter(c => freeTierCodes.includes(c.code));

            availableLeagues.forEach(league => {
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 hover:border-blue-500 transition-all shadow-lg group">
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${league.emblem || 'https://via.placeholder.com/50'}" alt="${league.name}" class="w-12 h-12 object-contain group-hover:scale-110 transition-transform">
                            <h3 class="text-xl font-bold">${league.name}</h3>
                        </div>
                        <p class="text-gray-400 mb-2"><i class="fas fa-globe mr-2"></i>${league.area.name}</p>
                        <button onclick="fetchStandings('${league.code}')" class="mt-4 w-full bg-blue-700 hover:bg-blue-600 py-2 rounded font-medium transition-colors">
                            Ver Tabla de Posiciones
                        </button>
                    </div>`;
            });
        }

        async function fetchMatches(status) {
            let endpoint = 'matches';
            if (status === 'LIVE') endpoint += '?status=IN_PLAY';
            
            const data = await apiRequest(endpoint);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = '';

            if (!data.matches || data.matches.length === 0) {
                content.innerHTML = '<div class="col-span-full text-center p-10 bg-gray-800 rounded">No hay partidos activos en este momento.</div>';
                return;
            }

            data.matches.forEach(match => {
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-lg p-4 border-l-4 ${match.status === 'IN_PLAY' ? 'border-red-500 animate-pulse' : 'border-blue-500'}">
                        <div class="text-xs text-gray-400 mb-3 flex justify-between uppercase tracking-wider">
                            <span>${match.competition.name}</span>
                            <span class="${match.status === 'IN_PLAY' ? 'text-red-400 font-bold' : ''}">${match.status}</span>
                        </div>
                        <div class="flex justify-between items-center gap-2">
                            <div class="flex-1 text-center">
                                <p class="font-bold text-sm">${match.homeTeam.shortName}</p>
                            </div>
                            <div class="bg-black/50 px-4 py-2 rounded text-xl font-mono font-bold text-yellow-400">
                                ${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}
                            </div>
                            <div class="flex-1 text-center">
                                <p class="font-bold text-sm">${match.awayTeam.shortName}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function fetchStandings(code) {
            const data = await apiRequest(`competitions/${code}/standings`);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "block overflow-hidden w-full";
            
            const tableData = data.standings[0].table;
            content.innerHTML = `
                <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
                    <div class="p-4 bg-gray-700 flex justify-between items-center">
                        <h2 class="text-xl font-bold">${data.competition.name} - Clasificación</h2>
                        <button onclick="fetchCompetitions()" class="text-sm bg-gray-600 px-3 py-1 rounded hover:bg-gray-500">Volver</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-900/50 text-gray-400">
                                <tr>
                                    <th class="p-4 text-left">#</th>
                                    <th class="p-4 text-left">Club</th>
                                    <th class="p-4 text-center">PJ</th>
                                    <th class="p-4 text-center">G</th>
                                    <th class="p-4 text-center">E</th>
                                    <th class="p-4 text-center">P</th>
                                    <th class="p-4 text-center font-bold text-white">PTS</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableData.map(t => `
                                    <tr class="border-t border-gray-700 hover:bg-white/5 transition-colors">
                                        <td class="p-4">${t.position}</td>
                                        <td class="p-4 flex items-center gap-3 font-semibold">
                                            <img src="${t.team.crest}" class="w-6 h-6 object-contain">
                                            ${t.team.name}
                                        </td>
                                        <td class="p-4 text-center">${t.playedGames}</td>
                                        <td class="p-4 text-center">${t.won}</td>
                                        <td class="p-4 text-center">${t.draw}</td>
                                        <td class="p-4 text-center">${t.lost}</td>
                                        <td class="p-4 text-center font-bold text-blue-400">${t.points}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>

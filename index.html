<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - Minute-by-Minute & Global Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-yellow: #fcc419;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        h1 { text-align: center; color: var(--primary); letter-spacing: 2px; }
        h1 span { color: var(--accent-yellow); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; height: 120px; background: #0b0e14; color: var(--accent-green); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: #339af0; }
        .btn-save { background: var(--accent-yellow); color: #000; margin-top: 5px; font-size: 0.8rem; padding: 10px; }

        .league-manager { margin-bottom: 15px; display: flex; gap: 10px; align-items: flex-end; }
        .league-manager div { flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-box label { font-size: 0.65rem; color: var(--accent-yellow); display: block; margin-bottom: 5px; }
        .stat-box .val { font-size: 1.1rem; font-weight: bold; color: var(--text-white); }

        .heat-map { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .heat-cell { padding: 15px 5px; text-align: center; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: black; }

        .selector-area { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select { width: 100%; padding: 12px; background: #0b0e14; color: white; border: 1px solid var(--border); border-radius: 8px; }

        .result-panel { display: none; margin-top: 20px; }
        .chart-container { height: 300px; margin-top: 20px; }
        
        .prediction-badge { background: rgba(81, 207, 102, 0.1); border: 1px solid var(--accent-green); padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> MINUTE LAB</h1>
    
    <div class="card">
        <div class="league-manager">
            <div>
                <label>NOMBRE DE LA LIGA / ARCHIVO</label>
                <input type="text" id="leagueName" placeholder="Ej: Liga MX 2024" style="width:100%; padding:10px; background:#0b0e14; border:1px solid var(--border); color:white; border-radius:8px; box-sizing:border-box;">
            </div>
            <div style="flex-grow: 0;">
                <label>LIGAS GUARDADAS</label>
                <select id="savedLeagues" onchange="loadSelectedLeague()" style="padding:9px;"></select>
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>TABLA GENERAL LOCAL (Standings)</label>
                <textarea id="homeTable" placeholder="Pega tabla: Equipo, GP, W, D, L, GF, GA..."></textarea>
            </div>
            <div>
                <label>TABLA GENERAL VISITA (Standings)</label>
                <textarea id="awayTable" placeholder="Pega tabla: Equipo, GP, W, D, L, GF, GA..."></textarea>
            </div>
            <div>
                <label>MINUTOS LOCAL (Tramos 15')</label>
                <textarea id="localData" placeholder="Equipo	0-15	16-30..."></textarea>
            </div>
            <div>
                <label>MINUTOS VISITA (Tramos 15')</label>
                <textarea id="visitaData" placeholder="Equipo	0-15	16-30..."></textarea>
            </div>
        </div>
        <button class="btn btn-calc" onclick="processAllData()">PROCESAR Y SINCRONIZAR DATOS</button>
        <button class="btn btn-save" onclick="saveLeague()">💾 GUARDAR ESTA CONFIGURACIÓN</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="selector-area">
            <div><label>LOCAL</label><select id="selectHome"></select></div>
            <div><label>VISITANTE</label><select id="selectAway"></select></div>
        </div>
        <button class="btn btn-calc" style="background: var(--accent-green);" onclick="analyzeMatch()">ANALIZAR ENCUENTRO INTEGRAL</button>
    </div>

    <div id="results" class="result-panel">
        <div class="card">
            <h3 id="matchTitle" style="text-align: center; margin-top: 0; color: var(--accent-yellow);"></h3>
            
            <div class="stats-grid">
                <div class="stat-box"><label>FZA. ATAQUE (L)</label><div class="val" id="fzaAtkL">0.00</div></div>
                <div class="stat-box"><label>FZA. DEFENSA (L)</label><div class="val" id="fzaDefL">0.00</div></div>
                <div class="stat-box"><label>FZA. ATAQUE (V)</label><div class="val" id="fzaAtkV">0.00</div></div>
                <div class="stat-box"><label>FZA. DEFENSA (V)</label><div class="val" id="fzaDefV">0.00</div></div>
            </div>

            <div style="margin-top:20px; text-align:center; font-size:0.8rem; color:var(--primary);">🔥 PROBABILIDAD DE GOL CRUZADA POR TRAMO</div>
            <div class="heat-map" id="heatMap"></div>

            <div class="prediction-badge">
                <div style="font-size: 0.8rem; color: var(--accent-green);">PROYECCIÓN FINAL xG (AJUSTADO)</div>
                <div id="finalXg" style="font-size: 2.5rem; font-weight: 900;">0.00</div>
                <div id="topTramo" style="font-size: 0.75rem; margin-top: 5px;"></div>
            </div>

            <div class="chart-container">
                <canvas id="minuteChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let database = { homeMin: {}, awayMin: {}, homeTable: {}, awayTable: {} };
let leagueAvg = { homeGf: 0, homeGa: 0, awayGf: 0, awayGa: 0 };
let myChart = null;

window.onload = updateLeagueList;

function parseTable(text) {
    const lines = text.trim().split('\n');
    const data = {};
    let totalGf = 0, totalGa = 0, totalGp = 0;

    lines.forEach(line => {
        const p = line.split(/\t|\s{2,}/);
        // Formato esperado: Rank(opcional) Equipo GP W D L GF GA...
        // Buscamos el nombre y los valores numéricos
        let name = "", gp, gf, ga;
        
        if (!isNaN(p[0])) { // Si empieza con número (ranking)
            name = p[1].trim();
            gp = parseInt(p[2]);
            gf = parseInt(p[6]);
            ga = parseInt(p[7]);
        } else {
            name = p[0].trim();
            gp = parseInt(p[1]);
            gf = parseInt(p[5]);
            ga = parseInt(p[6]);
        }

        if(name && !isNaN(gf)) {
            data[name] = { gp, gf, ga, avgGf: gf/gp, avgGa: ga/gp };
            totalGf += gf; totalGa += ga; totalGp += gp;
        }
    });

    return { teams: data, leagueAvgGf: totalGf / totalGp, leagueAvgGa: totalGa / totalGp };
}

function parseMinuteData(text) {
    if(!text) return {};
    const lines = text.trim().split('\n');
    const result = {};
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length >= 7) {
            const name = parts[0].trim();
            const intervals = parts.slice(1, 7).map(item => {
                const [g, r] = item.split('-').map(Number);
                return { g: g || 0, r: r || 0 };
            });
            result[name] = intervals;
        }
    });
    return result;
}

function processAllData() {
    const hT = document.getElementById('homeTable').value;
    const vT = document.getElementById('awayTable').value;
    const hM = document.getElementById('localData').value;
    const vM = document.getElementById('visitaData').value;

    const resH = parseTable(hT);
    const resV = parseTable(vT);
    
    database.homeTable = resH.teams;
    database.awayTable = resV.teams;
    database.homeMin = parseMinuteData(hM);
    database.awayMin = parseMinuteData(vM);

    leagueAvg.homeGf = resH.leagueAvgGf;
    leagueAvg.homeGa = resH.leagueAvgGa;
    leagueAvg.awayGf = resV.leagueAvgGf;
    leagueAvg.awayGa = resV.leagueAvgGa;

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";

    Object.keys(database.homeTable).sort().forEach(n => sH.add(new Option(n, n)));
    Object.keys(database.awayTable).sort().forEach(n => sV.add(new Option(n, n)));

    document.getElementById('selectionArea').style.display = 'block';
}

function analyzeMatch() {
    const homeName = document.getElementById('selectHome').value;
    const awayName = document.getElementById('selectAway').value;
    
    const hT = database.homeTable[homeName];
    const vT = database.awayTable[awayName];
    const hM = database.homeMin[homeName];
    const vM = database.awayMin[awayName];

    if (!hT || !vT || !hM || !vM) {
        alert("Faltan datos de minutos para uno de los equipos seleccionados.");
        return;
    }

    // Cálculos de Fuerza
    const fzaAtkL = hT.avgGf / leagueAvg.homeGf;
    const fzaDefL = hT.avgGa / leagueAvg.homeGa;
    const fzaAtkV = vT.avgGf / leagueAvg.awayGf;
    const fzaDefV = vT.avgGa / leagueAvg.awayGa;

    document.getElementById('fzaAtkL').innerText = fzaAtkL.toFixed(2);
    document.getElementById('fzaDefL').innerText = fzaDefL.toFixed(2);
    document.getElementById('fzaAtkV').innerText = fzaAtkV.toFixed(2);
    document.getElementById('fzaDefV').innerText = fzaDefV.toFixed(2);

    // Expectativa de goles base (Poisson simplificado por tramos)
    const expBaseL = fzaAtkL * fzaDefV * leagueAvg.homeGf;
    const expBaseV = fzaAtkV * fzaDefL * leagueAvg.awayGf;

    let xG_Timeline = [];
    let prob_Timeline = [];
    let totalAdjustedXG = 0;
    const labels = ["0-15'", "16-30'", "31-45'", "46-60'", "61-75'", "76-90'"];

    const heatMap = document.getElementById('heatMap');
    heatMap.innerHTML = "";

    labels.forEach((label, i) => {
        // Combinamos la fuerza general con el peso del tramo específico
        const tramoWeightL = (hM[i].g + vM[i].r) / 2;
        const tramoWeightV = (vM[i].g + hM[i].r) / 2;
        
        // Ajuste: La fuerza de ataque influye sobre el promedio de goles en ese tramo
        const adjL = (expBaseL / 1.5) * tramoWeightL;
        const adjV = (expBaseV / 1.5) * tramoWeightV;
        const combinedXG = adjL + adjV;
        
        totalAdjustedXG += combinedXG;
        xG_Timeline.push(combinedXG.toFixed(2));

        const probGoal = (1 - Math.exp(-combinedXG)) * 100;
        prob_Timeline.push(probGoal.toFixed(1));

        const cell = document.createElement('div');
        cell.className = 'heat-cell';
        cell.innerHTML = `${label}<br>${probGoal.toFixed(0)}%`;
        cell.style.background = `rgba(81, 207, 102, ${Math.min(probGoal/100 + 0.2, 1)})`;
        heatMap.appendChild(cell);
    });

    document.getElementById('matchTitle').innerText = `${homeName} vs ${awayName}`;
    document.getElementById('finalXg').innerText = totalAdjustedXG.toFixed(2);
    
    const maxIndex = prob_Timeline.indexOf(Math.max(...prob_Timeline.map(Number)).toFixed(1));
    document.getElementById('topTramo').innerText = `TRAMO CRÍTICO: ${labels[maxIndex]} (${prob_Timeline[maxIndex]}% prob.)`;

    renderChart(labels, xG_Timeline);
    document.getElementById('results').style.display = 'block';
}

function saveLeague() {
    const name = document.getElementById('leagueName').value.trim();
    if(!name) { alert("Nombre de liga requerido."); return; }

    const data = {
        name,
        hTable: document.getElementById('homeTable').value,
        vTable: document.getElementById('awayTable').value,
        hMin: document.getElementById('localData').value,
        vMin: document.getElementById('visitaData').value
    };

    localStorage.setItem('league_' + name, JSON.stringify(data));
    updateLeagueList();
    alert("Datos guardados.");
}

function updateLeagueList() {
    const selector = document.getElementById('savedLeagues');
    selector.innerHTML = '<option value="">-- Seleccionar --</option>';
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('league_')) {
            selector.add(new Option(key.replace('league_', ''), key));
        }
    }
}

function loadSelectedLeague() {
    const key = document.getElementById('savedLeagues').value;
    if(!key) return;
    const data = JSON.parse(localStorage.getItem(key));
    document.getElementById('leagueName').value = data.name;
    document.getElementById('homeTable').value = data.hTable;
    document.getElementById('awayTable').value = data.vTable;
    document.getElementById('localData').value = data.hMin;
    document.getElementById('visitaData').value = data.vMin;
    processAllData();
}

function renderChart(labels, data) {
    const ctx = document.getElementById('minuteChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Intensidad xG Ajustada',
                data: data,
                borderColor: '#4dabf7',
                backgroundColor: 'rgba(77, 171, 247, 0.2)',
                fill: true, tension: 0.4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, 
            scales: { y: { beginAtZero: true, grid: { color: '#2c3440' } }, x: { grid: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });
}
</script>
</body>
</html>

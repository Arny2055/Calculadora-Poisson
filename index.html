<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football PRO - Anti-429 Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-ready { color: #10b981; }
        .status-wait { color: #f59e0b; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-200 min-h-screen font-sans">

    <header class="p-5 glass sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter flex items-center gap-2">
                <i class="fas fa-shield-virus text-blue-500"></i> API<span class="text-blue-500">SHIELD</span>
            </h1>
            
            <div class="flex flex-col items-end gap-2">
                <div class="flex gap-2">
                    <input type="password" id="api-key" value="b87bae2028d2da2ee28c5d36a60f3ab8"
                           class="bg-black/50 border border-blue-900 rounded-lg px-4 py-2 text-xs w-64 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <button onclick="saveApiKey()" class="bg-blue-600 hover:bg-blue-500 px-4 rounded-lg transition-all active:scale-90">
                        <i class="fas fa-save"></i>
                    </button>
                </div>
                <div id="api-status" class="text-[10px] font-mono flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span id="status-text" class="status-ready uppercase tracking-widest text-emerald-400">Sistema Listo (Caché Activo)</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-10">
            <button onclick="fetchLeagueData(39, 'Premier League')" class="bg-gray-800 hover:bg-blue-900 p-3 rounded-xl border border-gray-700 text-xs font-bold transition-all">PREMIER LEAGUE</button>
            <button onclick="fetchLeagueData(140, 'La Liga')" class="bg-gray-800 hover:bg-blue-900 p-3 rounded-xl border border-gray-700 text-xs font-bold transition-all">LA LIGA</button>
            <button onclick="fetchLeagueData(135, 'Serie A')" class="bg-gray-800 hover:bg-blue-900 p-3 rounded-xl border border-gray-700 text-xs font-bold transition-all">SERIE A</button>
            <button onclick="fetchLeagueData(78, 'Bundesliga')" class="bg-gray-800 hover:bg-blue-900 p-3 rounded-xl border border-gray-700 text-xs font-bold transition-all">BUNDESLIGA</button>
            <button onclick="fetchMatches('live')" class="bg-red-900/40 hover:bg-red-800 p-3 rounded-xl border border-red-700 text-xs font-bold transition-all text-red-400">EN VIVO</button>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center my-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-500 h-12 w-12 mb-4"></div>
            <p class="text-xs text-blue-400 font-mono tracking-widest animate-pulse">LLAMANDO A SATÉLITE...</p>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 border-2 border-dashed border-gray-800 rounded-3xl">
                <i class="fas fa-hand-pointer text-5xl mb-4"></i>
                <p class="text-xl">Selecciona una liga para ver datos reales</p>
                <p class="text-xs mt-2 uppercase font-mono">Los datos se guardan por 10 minutos para proteger tu cuota</p>
            </div>
        </div>
    </main>

    <script>
        const API_HOST = 'api-football-v1.p.rapidapi.com';
        const API_BASE = 'https://api-football-v1.p.rapidapi.com/v3';

        // Guardar API Key
        function saveApiKey() {
            localStorage.setItem('fb_api_key_v3', document.getElementById('api-key').value);
            alert('Configuración guardada.');
        }

        // Lógica de Petición con Caché Inteligente
        async function apiRequest(endpoint) {
            const apiKey = document.getElementById('api-key').value;
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('loader');

            // 1. Revisar Caché en LocalStorage (Válido por 10 minutos)
            const cacheKey = `cache_${endpoint}`;
            const cachedData = localStorage.getItem(cacheKey);
            const cacheTime = localStorage.getItem(`${cacheKey}_time`);
            const now = new Date().getTime();

            if (cachedData && cacheTime && (now - cacheTime < 600000)) { // 10 min
                console.log("Cargando desde almacenamiento local:", endpoint);
                return JSON.parse(cachedData);
            }

            // 2. Si no hay caché, hacer petición real
            loader.classList.remove('hidden');
            statusText.innerText = "Sincronizando con Servidor...";
            statusText.className = "status-wait text-amber-500 uppercase";

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'GET',
                    headers: { 'x-rapidapi-key': apiKey, 'x-rapidapi-host': API_HOST }
                });

                if (response.status === 429) {
                    throw new Error("LÍMITE ALCANZADO (429). Espera 60 segundos.");
                }

                if (!response.ok) throw new Error("Fallo de conexión remota");

                const data = await response.json();
                
                // Guardar en caché
                localStorage.setItem(cacheKey, JSON.stringify(data.response));
                localStorage.setItem(`${cacheKey}_time`, now.toString());

                setTimeout(() => {
                    statusText.innerText = "Sistema Listo (Caché Activo)";
                    statusText.className = "status-ready text-emerald-400 uppercase";
                }, 2000);

                loader.classList.add('hidden');
                return data.response;

            } catch (error) {
                loader.classList.add('hidden');
                statusText.innerText = "Error de Señal";
                statusText.className = "text-red-500 uppercase";
                showError(error.message);
                return null;
            }
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="col-span-full bg-red-950/40 border border-red-500/50 p-10 rounded-3xl text-center">
                    <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">Bloqueo por Frecuencia</h3>
                    <p class="text-red-300 font-mono text-xs">${msg}</p>
                    <p class="mt-4 text-[10px] text-gray-500">Tu plan de RapidAPI solo permite pocas peticiones por minuto. Espera un momento.</p>
                </div>`;
        }

        async function fetchLeagueData(id, name) {
            const data = await apiRequest(`standings?league=${id}&season=2025`);
            if (!data) return;

            const table = data[0].league.standings[0];
            const content = document.getElementById('content');
            content.className = "block w-full overflow-hidden";
            
            content.innerHTML = `
                <div class="bg-gray-800/50 rounded-2xl border border-gray-700 overflow-hidden shadow-2xl">
                    <div class="p-6 bg-gradient-to-r from-blue-900/30 to-transparent flex justify-between items-center border-b border-gray-700">
                        <h2 class="text-xl font-black uppercase italic">${name}</h2>
                        <span class="text-[10px] bg-blue-600 px-2 py-1 rounded">TEMPORADA 2025</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-black/40 text-gray-400 text-[10px] uppercase">
                                <tr>
                                    <th class="p-4 text-left">Pos</th>
                                    <th class="p-4 text-left">Club</th>
                                    <th class="p-4 text-center">PJ</th>
                                    <th class="p-4 text-center">G</th>
                                    <th class="p-4 text-center">PTS</th>
                                    <th class="p-4 text-center">Últimos 5</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700/50">
                                ${table.map(t => `
                                    <tr class="hover:bg-white/5 transition-colors">
                                        <td class="p-4 font-mono font-bold text-blue-400">${t.rank}</td>
                                        <td class="p-4 flex items-center gap-3">
                                            <img src="${t.team.logo}" class="w-6 h-6">
                                            <span class="font-bold whitespace-nowrap">${t.team.name}</span>
                                        </td>
                                        <td class="p-4 text-center font-mono text-gray-400">${t.all.played}</td>
                                        <td class="p-4 text-center text-emerald-400 font-mono">${t.all.win}</td>
                                        <td class="p-4 text-center font-black">${t.points}</td>
                                        <td class="p-4">
                                            <div class="flex justify-center gap-1">
                                                ${t.form ? t.form.split('').map(f => `
                                                    <span class="w-4 h-4 rounded-[2px] text-[8px] flex items-center justify-center font-bold ${f === 'W' ? 'bg-emerald-500' : f === 'L' ? 'bg-red-500' : 'bg-gray-500'}">${f}</span>
                                                `).join('') : '-'}
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        async function fetchMatches(type) {
            const data = await apiRequest('fixtures?live=all');
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = data.length === 0 
                ? '<div class="col-span-full text-center py-20 opacity-50">No hay partidos en vivo ahora mismo.</div>'
                : data.map(item => `
                    <div class="bg-gray-800/80 p-5 rounded-2xl border-l-4 border-red-500 shadow-lg">
                        <div class="flex justify-between text-[10px] text-gray-500 mb-4 font-bold uppercase">
                            <span>${item.league.name}</span>
                            <span class="text-red-500 animate-pulse">${item.fixture.status.elapsed}'</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="text-center w-1/3">
                                <img src="${item.teams.home.logo}" class="w-10 h-10 mx-auto mb-2">
                                <p class="text-[10px] font-bold truncate">${item.teams.home.name}</p>
                            </div>
                            <div class="text-2xl font-black font-mono w-1/3 text-center">
                                ${item.goals.home}:${item.goals.away}
                            </div>
                            <div class="text-center w-1/3">
                                <img src="${item.teams.away.logo}" class="w-10 h-10 mx-auto mb-2">
                                <p class="text-[10px] font-bold truncate">${item.teams.away.name}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
        }
    </script>
</body>
</html>

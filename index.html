<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Data Hub PRO - API-FOOTBALL v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans custom-scrollbar">

    <header class="bg-gradient-to-r from-blue-900 to-blue-800 p-6 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-extrabold flex items-center gap-2 tracking-tight">
                <i class="fas fa-chart-line text-blue-400"></i> FOOTBALL<span class="text-blue-400">ULTRA</span>
            </h1>
            <div class="flex flex-col gap-1 w-full md:w-auto">
                <div class="flex gap-2">
                    <input type="password" id="api-key" value="b87bae2028d2da2ee28c5d36a60f3ab8"
                           class="bg-blue-950 border border-blue-700 rounded px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all text-sm"
                           placeholder="Tu API Key de RapidAPI">
                    <button onclick="saveApiKey()" class="bg-blue-600 px-3 rounded hover:bg-blue-500 shadow-lg"><i class="fas fa-save"></i></button>
                </div>
                <span class="text-[10px] text-blue-200 opacity-70 italic uppercase tracking-widest text-right">* Motor: API-Football v3 (RapidAPI)</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="bg-gray-800/50 p-4 rounded-2xl mb-8 border border-gray-700 backdrop-blur-sm">
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="fetchCompetitions()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm">
                    <i class="fas fa-trophy"></i> Ligas Populares
                </button>
                <button onclick="fetchMatches('live')" class="bg-red-600 hover:bg-red-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm animate-pulse">
                    <i class="fas fa-satellite-dish"></i> En Vivo
                </button>
                <div class="flex items-center bg-gray-700 rounded-xl px-3 border border-gray-600">
                    <i class="fas fa-search-plus mr-2 text-gray-400"></i>
                    <input type="date" id="date-picker" onchange="fetchByDate(this.value)" class="bg-transparent text-sm focus:outline-none py-2 uppercase font-mono">
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center my-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-500 h-16 w-16 mb-4"></div>
            <p class="text-blue-400 animate-pulse font-mono">EXTRAYENDO DATOS PRO...</p>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500 border-2 border-dashed border-gray-800 rounded-3xl">
                <i class="fas fa-terminal fa-4x mb-4 opacity-20"></i>
                <p class="text-xl font-light italic">Esperando comando para la API v3...</p>
            </div>
        </div>
    </main>

    <script>
        // Nota: API-Football en RapidAPI no suele requerir proxy CORS si se usa desde cliente, 
        // pero lo mantenemos como capa de seguridad si hay fallos de red.
        const API_HOST = 'api-football-v1.p.rapidapi.com';
        const API_BASE = 'https://api-football-v1.p.rapidapi.com/v3';

        window.onload = () => {
            const savedKey = localStorage.getItem('fb_api_key_v3');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };

        function saveApiKey() {
            const key = document.getElementById('api-key').value;
            localStorage.setItem('fb_api_key_v3', key);
            alert('API Key de RapidAPI guardada.');
        }

        async function apiRequest(endpoint) {
            const apiKey = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-key': apiKey,
                        'x-rapidapi-host': API_HOST
                    }
                });
                
                if (!response.ok) throw new Error(`Error: ${response.status} - Verifica tu suscripción en RapidAPI`);
                
                const data = await response.json();
                loader.classList.add('hidden');

                if (data.errors && Object.keys(data.errors).length > 0) {
                    throw new Error(JSON.stringify(data.errors));
                }

                return data.response;
            } catch (error) {
                loader.classList.add('hidden');
                content.innerHTML = `
                    <div class="col-span-full bg-red-950/30 border border-red-500/50 p-8 rounded-3xl text-center">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-500"></i>
                        <p class="text-red-400 font-mono text-sm">${error.message}</p>
                    </div>`;
                return null;
            }
        }

        async function fetchCompetitions() {
            // En API-Football v3, listamos ligas principales filtrando por IDs conocidos para el plan gratuito/demo
            // IDs comunes: 39 (PL), 140 (La Liga), 135 (Serie A), 78 (Bundesliga), 61 (Ligue 1)
            const leagueIds = [39, 140, 135, 78, 61, 2, 3, 848]; 
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            for (let id of leagueIds) {
                const data = await apiRequest(`leagues?id=${id}`);
                if (!data) continue;
                
                const item = data[0];
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 hover:border-blue-500 transition-all shadow-xl group">
                        <div class="flex items-center gap-4 mb-6">
                            <img src="${item.league.logo}" class="w-14 h-14 object-contain">
                            <div>
                                <h3 class="text-xl font-bold leading-tight">${item.league.name}</h3>
                                <span class="text-xs text-blue-400 font-mono">${item.country.name}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="fetchStandings(${item.league.id})" class="bg-blue-700/20 hover:bg-blue-600 text-blue-400 hover:text-white p-2 rounded-lg text-xs font-bold transition-all border border-blue-700/50">
                                TABLA
                            </button>
                            <button onclick="fetchMatches('league=${item.league.id}&season=2025')" class="bg-gray-700/50 hover:bg-gray-600 p-2 rounded-lg text-xs font-bold transition-all">
                                PARTIDOS
                            </button>
                        </div>
                    </div>`;
            }
        }

        async function fetchMatches(query) {
            const endpoint = query === 'live' ? 'fixtures?live=all' : `fixtures?${query}`;
            const data = await apiRequest(endpoint);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = '';

            if (data.length === 0) {
                content.innerHTML = '<div class="col-span-full text-center p-20 bg-gray-800 rounded-3xl border border-gray-700 italic">No hay partidos disponibles.</div>';
                return;
            }

            data.forEach(item => {
                const f = item.fixture;
                const goals = item.goals;
                const status = f.status.short;
                
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-2xl p-5 border-t-4 ${status === '1H' || status === '2H' ? 'border-red-500 animate-pulse' : 'border-gray-700'} shadow-xl">
                        <div class="flex justify-between text-[10px] text-gray-500 mb-4 font-bold uppercase">
                            <span>${item.league.name}</span>
                            <span class="${status === 'FT' ? 'text-gray-400' : 'text-emerald-400'}">${f.status.long}</span>
                        </div>
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex-1 text-center">
                                <img src="${item.teams.home.logo}" class="w-10 h-10 mx-auto mb-2">
                                <p class="text-xs font-bold truncate">${item.teams.home.name}</p>
                            </div>
                            <div class="flex flex-col items-center px-4">
                                <div class="text-2xl font-black font-mono text-white">
                                    ${goals.home ?? 0} : ${goals.away ?? 0}
                                </div>
                                <span class="text-[10px] text-blue-400 font-bold">${f.status.elapsed ?? 0}'</span>
                            </div>
                            <div class="flex-1 text-center">
                                <img src="${item.teams.away.logo}" class="w-10 h-10 mx-auto mb-2">
                                <p class="text-xs font-bold truncate">${item.teams.away.name}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function fetchByDate(date) {
            await fetchMatches(`date=${date}`);
        }

        async function fetchStandings(leagueId) {
            const data = await apiRequest(`standings?league=${leagueId}&season=2025`);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "block w-full";
            
            const leagueData = data[0].league;
            const table = leagueData.standings[0];

            content.innerHTML = `
                <div class="bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700">
                    <div class="p-6 bg-gray-750 flex justify-between items-center border-b border-gray-700">
                        <div class="flex items-center gap-3">
                            <img src="${leagueData.logo}" class="w-10">
                            <h2 class="text-2xl font-black uppercase">${leagueData.name}</h2>
                        </div>
                        <button onclick="fetchCompetitions()" class="bg-gray-700 p-2 rounded-full hover:bg-gray-600"><i class="fas fa-times px-2"></i></button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-black/20 text-gray-400">
                                <tr class="uppercase text-[10px] tracking-widest">
                                    <th class="p-4 text-left">#</th>
                                    <th class="p-4 text-left">Equipo</th>
                                    <th class="p-4 text-center">PJ</th>
                                    <th class="p-4 text-center">G</th>
                                    <th class="p-4 text-center">PTS</th>
                                    <th class="p-4 text-center">Forma</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${table.map(t => `
                                    <tr class="border-t border-gray-700 hover:bg-white/5 transition-colors">
                                        <td class="p-4 font-bold text-blue-400">${t.rank}</td>
                                        <td class="p-4 flex items-center gap-3">
                                            <img src="${t.team.logo}" class="w-6 h-6">
                                            <span class="font-bold">${t.team.name}</span>
                                        </td>
                                        <td class="p-4 text-center">${t.all.played}</td>
                                        <td class="p-4 text-center">${t.all.win}</td>
                                        <td class="p-4 text-center font-black text-white">${t.points}</td>
                                        <td class="p-4 text-center">
                                            <div class="flex justify-center gap-1">
                                                ${t.form ? t.form.split('').map(f => `
                                                    <span class="w-4 h-4 rounded-sm text-[8px] flex items-center justify-center font-bold ${f === 'W' ? 'bg-green-600' : f === 'L' ? 'bg-red-600' : 'bg-gray-600'}">${f}</span>
                                                `).join('') : '-'}
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>

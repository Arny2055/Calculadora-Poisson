<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - Poisson & Pattern Analysis v4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-yellow: #fcc419;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        h1 { text-align: center; color: var(--primary); letter-spacing: 2px; margin-bottom: 30px; }
        h1 span { color: var(--accent-yellow); }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; display: block; color: var(--primary); text-transform: uppercase; }
        
        textarea { width: 100%; height: 100px; background: #0b0e14; color: var(--accent-green); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.7rem; padding: 10px; box-sizing: border-box; resize: vertical; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: #339af0; transform: translateY(-2px); }
        .btn-save { background: var(--accent-yellow); color: #000; margin-top: 5px; font-size: 0.8rem; padding: 10px; }

        .league-manager { margin-bottom: 15px; display: flex; gap: 10px; align-items: flex-end; }
        .league-manager div { flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-box label { color: var(--accent-yellow); font-size: 0.6rem; }
        .stat-box .val { font-size: 1.1rem; font-weight: 900; color: #fff; }

        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .matrix-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .matrix-card h4 { margin: 0 0 10px 0; font-size: 0.8rem; color: var(--primary); }
        .prob-val { font-size: 1.8rem; font-weight: 900; color: var(--accent-green); }
        .score-list { text-align: left; font-size: 0.75rem; margin-top: 10px; }
        .score-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .heat-map { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .heat-cell { padding: 12px 5px; text-align: center; border-radius: 6px; font-size: 0.7rem; font-weight: bold; color: #000; }

        .selector-area { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select { width: 100%; padding: 12px; background: #0b0e14; color: white; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }

        .result-panel { display: none; margin-top: 20px; }
        .chart-container { height: 220px; margin-top: 25px; }
        
        .prediction-badge { background: linear-gradient(135deg, rgba(81, 207, 102, 0.1), rgba(77, 171, 247, 0.1)); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; gap: 10px; }
        
        input[type="text"] { width:100%; padding:10px; background:#0b0e14; border:1px solid var(--border); color:white; border-radius:8px; box-sizing:border-box; }

        .half-label { font-size: 0.6rem; color: var(--primary); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .status-badge { font-size: 0.65rem; font-weight: 900; padding: 4px 8px; border-radius: 5px; display: inline-block; margin-top: 5px; }
        .status-yes { background: var(--accent-green); color: #000; }
        .status-no { background: rgba(255,255,255,0.1); color: var(--text-white); }

        /* NUEVA SECCIÓN DE PATRONES */
        .pattern-analysis { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pattern-box { background: rgba(77, 171, 247, 0.05); border: 1px dashed var(--border); padding: 12px; border-radius: 10px; }
        .pattern-title { font-size: 0.65rem; color: var(--accent-yellow); font-weight: bold; margin-bottom: 5px; }
        .pattern-desc { font-size: 0.75rem; color: #fff; line-height: 1.3; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> PATTERN LAB v4</h1>
    
    <div class="card">
        <div class="league-manager">
            <div>
                <label>IDENTIFICADOR DE LIGA</label>
                <input type="text" id="leagueName" placeholder="Ej: Premier League 2026">
            </div>
            <div style="flex-grow: 0;">
                <label>CARGAR GUARDADA</label>
                <select id="savedLeagues" onchange="loadSelectedLeague()"></select>
            </div>
        </div>

        <div class="grid-inputs">
            <div><label>Standings Local</label><textarea id="homeTable"></textarea></div>
            <div><label>Standings Visita</label><textarea id="awayTable"></textarea></div>
            <div><label>Run-in Analysis</label><textarea id="runInData"></textarea></div>
            <div><label>Minutos Local</label><textarea id="localData"></textarea></div>
            <div><label>Minutos Visita</label><textarea id="visitaData"></textarea></div>
        </div>
        <button class="btn btn-calc" onclick="processAllData()">Sincronizar Datos Base</button>
        <button class="btn btn-save" onclick="saveLeague()">💾 Guardar Liga (Todo)</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="selector-area">
            <div><label>LOCAL</label><select id="selectHome"></select></div>
            <div><label>VISITANTE</label><select id="selectAway"></select></div>
        </div>
        <button class="btn btn-calc" style="background: var(--accent-green);" onclick="analyzeMatch()">Ejecutar Análisis de Patrones</button>
    </div>

    <div id="results" class="result-panel">
        <div class="card">
            <h3 id="matchTitle" style="text-align: center; margin: 0; color: var(--accent-yellow); text-transform: uppercase;"></h3>
            
            <div class="stats-grid">
                <div class="stat-box"><label>ATK L</label><div class="val" id="fzaAtkL">1.00</div></div>
                <div class="stat-box"><label>DEF L</label><div class="val" id="fzaDefL">1.00</div></div>
                <div class="stat-box"><label>ATK V</label><div class="val" id="fzaAtkV">1.00</div></div>
                <div class="stat-box"><label>DEF V</label><div class="val" id="fzaDefV">1.00</div></div>
                <div class="stat-box"><label>RUN-IN</label><div class="val" id="runInAdj" style="color:var(--accent-yellow)">0%</div></div>
            </div>

            <div class="matrix-grid">
                <div class="matrix-card"><h4>LOCAL (1)</h4><div class="prob-val" id="probHome">0%</div><div class="score-list" id="scoresHome"></div></div>
                <div class="matrix-card"><h4>EMPATE (X)</h4><div class="prob-val" id="probDraw" style="color: var(--accent-yellow);">0%</div><div class="score-list" id="scoresDraw"></div></div>
                <div class="matrix-card"><h4>VISITA (2)</h4><div class="prob-val" id="probAway" style="color: var(--accent-red);">0%</div><div class="score-list" id="scoresAway"></div></div>
            </div>

            <div class="prediction-badge">
                <div>
                    <div class="half-label" style="color: var(--accent-green);">AMBOS MARCAN</div>
                    <div id="bttsProb" style="font-size: 1.5rem; font-weight: 900; color: #fff;">0%</div>
                    <div id="bttsStatus" class="status-badge">...</div>
                </div>
                <div>
                    <div class="half-label">DOBLE OPORTUNIDAD</div>
                    <div id="dcVal" style="font-size: 1rem; font-weight: 800; color: var(--accent-yellow);">...</div>
                    <div id="dcProb" style="font-size: 0.6rem; opacity: 0.8;">0%</div>
                </div>
                <div style="border-left: 1px solid var(--border);">
                    <div class="half-label">OVER 0.5 HT</div>
                    <div id="htRecommendation" class="status-badge">...</div>
                    <div id="htProb" style="font-size: 0.55rem; margin-top: 5px; color: var(--accent-green);">0%</div>
                </div>
                <div style="border-left: 1px solid var(--border);">
                    <div class="half-label">OVER 1.5 FT</div>
                    <div id="ftRecommendation" class="status-badge">...</div>
                    <div id="ftProb" style="font-size: 0.55rem; margin-top: 5px; color: var(--accent-green);">0%</div>
                </div>
            </div>

            <div class="pattern-analysis">
                <div class="pattern-box">
                    <div class="pattern-title">🛡️ ANÁLISIS DE PORTERÍA A CERO</div>
                    <div class="pattern-desc" id="cleanSheetDesc">...</div>
                </div>
                <div class="pattern-box">
                    <div class="pattern-title">⚡ ALERTA LATE GOAL (75'+)</div>
                    <div class="pattern-desc" id="lateGoalDesc">...</div>
                </div>
                <div class="pattern-box">
                    <div class="pattern-title">📈 COMPORTAMIENTO LOCAL</div>
                    <div class="pattern-desc" id="localPattern">...</div>
                </div>
                <div class="pattern-box">
                    <div class="pattern-title">📉 COMPORTAMIENTO VISITA</div>
                    <div class="pattern-desc" id="awayPattern">...</div>
                </div>
            </div>

            <div class="heat-map" id="heatMap"></div>
            <div class="chart-container"><canvas id="minuteChart"></canvas></div>
        </div>
    </div>
</div>

<script>
let database = { homeMin: {}, awayMin: {}, homeTable: {}, awayTable: {}, runIn: {} };
let leagueAvg = { homeGf: 0, homeGa: 0, awayGf: 0, awayGa: 0 };
let myChart = null;

window.onload = updateLeagueList;

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}

function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function parseTable(text) {
    const lines = text.trim().split('\n');
    const teams = {};
    let totalGf = 0, totalGa = 0, totalGp = 0;
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length < 5) return;
        let name, gp, gf, ga;
        if (!isNaN(parts[0])) { name = parts[1].trim(); gp = parseInt(parts[2]); gf = parseInt(parts[6]); ga = parseInt(parts[7]); }
        else { name = parts[0].trim(); gp = parseInt(parts[1]); gf = parseInt(parts[5]); ga = parseInt(parts[6]); }
        if (name && !isNaN(gp) && gp > 0) {
            teams[name] = { gp, gf, ga, avgGf: gf/gp, avgGa: ga/gp };
            totalGf += gf; totalGa += ga; totalGp += gp;
        }
    });
    return { teams, avgGf: totalGf / totalGp || 0, avgGa: totalGa / totalGp || 0 };
}

function parseRunInData(text) {
    const lines = text.trim().split('\n');
    const result = {};
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length >= 7) {
            const name = parts[1].trim();
            const diffStr = parts[parts.length - 1];
            const diffVal = parseFloat(diffStr.replace('%', '')) || 0;
            result[name] = { diff: diffVal };
        }
    });
    return result;
}

function parseMinuteData(text) {
    const lines = text.trim().split('\n');
    const result = {};
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length >= 7) {
            const name = parts[0].trim();
            const intervals = parts.slice(1, 7).map(item => {
                const [g, r] = item.split('-').map(Number);
                return { g: g || 0, r: r || 0 };
            });
            result[name] = intervals;
        }
    });
    return result;
}

function processAllData() {
    database.homeTable = parseTable(document.getElementById('homeTable').value).teams;
    database.awayTable = parseTable(document.getElementById('awayTable').value).teams;
    database.runIn = parseRunInData(document.getElementById('runInData').value);
    database.homeMin = parseMinuteData(document.getElementById('localData').value);
    database.awayMin = parseMinuteData(document.getElementById('visitaData').value);

    const resH = parseTable(document.getElementById('homeTable').value);
    leagueAvg.homeGf = resH.avgGf; leagueAvg.homeGa = resH.avgGa;
    leagueAvg.awayGf = parseTable(document.getElementById('awayTable').value).avgGf;
    leagueAvg.awayGa = parseTable(document.getElementById('awayTable').value).avgGa;

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";
    Object.keys(database.homeTable).sort().forEach(n => sH.add(new Option(n, n)));
    Object.keys(database.awayTable).sort().forEach(n => sV.add(new Option(n, n)));

    if(Object.keys(database.homeTable).length > 0) document.getElementById('selectionArea').style.display = 'block';
}

function analyzeMatch() {
    const homeName = document.getElementById('selectHome').value;
    const awayName = document.getElementById('selectAway').value;
    const hT = database.homeTable[homeName];
    const vT = database.awayTable[awayName];
    const hM = database.homeMin[homeName];
    const vM = database.awayMin[awayName];
    const runH = database.runIn[homeName] || { diff: 0 };
    const runV = database.runIn[awayName] || { diff: 0 };

    if (!hT || !vT || !hM || !vM) return;

    let fzaAtkL = hT.avgGf / leagueAvg.homeGf;
    let fzaDefL = hT.avgGa / leagueAvg.homeGa;
    let fzaAtkV = vT.avgGf / leagueAvg.awayGf;
    let fzaDefV = vT.avgGa / leagueAvg.awayGa;

    const lambdaL = (fzaAtkL * fzaDefV * leagueAvg.homeGf) * (1 + (runH.diff / 500)); 
    const lambdaV = (fzaAtkV * fzaDefL * leagueAvg.awayGf) * (1 + (runV.diff / 500));

    document.getElementById('fzaAtkL').innerText = fzaAtkL.toFixed(2);
    document.getElementById('fzaDefL').innerText = fzaDefL.toFixed(2);
    document.getElementById('fzaAtkV').innerText = fzaAtkV.toFixed(2);
    document.getElementById('fzaDefV').innerText = fzaDefV.toFixed(2);
    document.getElementById('runInAdj').innerText = (runH.diff - runV.diff).toFixed(1) + "%";

    let pHome = 0, pDraw = 0, pAway = 0;
    let scores = [];
    for (let i = 0; i <= 5; i++) {
        for (let j = 0; j <= 5; j++) {
            const prob = poisson(i, lambdaL) * poisson(j, lambdaV);
            if (i > j) pHome += prob; else if (i === j) pDraw += prob; else pAway += prob;
            scores.push({ score: `${i}-${j}`, prob, type: i > j ? 'H' : (i === j ? 'D' : 'A') });
        }
    }

    document.getElementById('probHome').innerText = (pHome * 100).toFixed(1) + "%";
    document.getElementById('probDraw').innerText = (pDraw * 100).toFixed(1) + "%";
    document.getElementById('probAway').innerText = (pAway * 100).toFixed(1) + "%";

    const updateScores = (id, type) => {
        const filtered = scores.filter(s => s.type === type).sort((a, b) => b.prob - a.prob).slice(0, 3);
        document.getElementById(id).innerHTML = filtered.map(s => 
            `<div class="score-item"><span>${s.score}</span><span>${(s.prob * 100).toFixed(1)}%</span></div>`
        ).join('');
    };
    updateScores('scoresHome', 'H'); updateScores('scoresDraw', 'D'); updateScores('scoresAway', 'A');

    // EXPLOTACIÓN DE MINUTOS
    const labels = ["0-15'", "16-30'", "31-45'", "46-60'", "61-75'", "76-90'"];
    let xG_Timeline = [];
    let hG_Total = hM.reduce((a, b) => a + b.g, 0);
    let vG_Total = vM.reduce((a, b) => a + b.g, 0);

    labels.forEach((_, i) => {
        let weightL = hG_Total > 0 ? (hM[i].g / hG_Total) : 1/6;
        let weightV = vG_Total > 0 ? (vM[i].g / vG_Total) : 1/6;
        let tramoXG = (lambdaL * weightL) + (lambdaV * weightV);
        xG_Timeline.push(tramoXG.toFixed(2));
    });

    // 1. Ambos Marcan (BTTS)
    const probBTTS = (1 - poisson(0, lambdaL)) * (1 - poisson(0, lambdaV)) * 100;
    document.getElementById('bttsProb').innerText = probBTTS.toFixed(1) + "%";
    document.getElementById('bttsStatus').innerText = probBTTS >= 58 ? "SÍ" : "DUDOSO";
    document.getElementById('bttsStatus').className = "status-badge " + (probBTTS >= 58 ? "status-yes" : "status-no");

    // 2. Doble Oportunidad
    const dc1X = (pHome + pDraw) * 100;
    const dcX2 = (pAway + pDraw) * 100;
    document.getElementById('dcVal').innerText = dc1X >= dcX2 ? "1X" : "X2";
    document.getElementById('dcProb').innerText = (dc1X >= dcX2 ? dc1X : dcX2).toFixed(1) + "%";

    // 3. Patrones de Equipo (Lógica de Tramos)
    const getPattern = (mData) => {
        let firstHalf = mData[0].g + mData[1].g + mData[2].g;
        let secondHalf = mData[3].g + mData[4].g + mData[5].g;
        if (secondHalf > firstHalf * 1.5) return "DIESEL (Explota al final)";
        if (firstHalf > secondHalf * 1.5) return "SPRINTER (Inicio agresivo)";
        return "EQUILIBRADO";
    };
    document.getElementById('localPattern').innerText = getPattern(hM);
    document.getElementById('awayPattern').innerText = getPattern(vM);

    // 4. Alerta Late Goal
    const lateProb = (1 - Math.exp(-xG_Timeline[5])) * 100;
    document.getElementById('lateGoalDesc').innerText = lateProb >= 35 ? 
        `ALTA (${lateProb.toFixed(0)}%). El rival suele ceder espacios al final.` : 
        `Baja (${lateProb.toFixed(0)}%). Juego cerrado en el cierre.`;

    // 5. Portería a Cero
    const csL = poisson(0, lambdaV) * 100;
    const csV = poisson(0, lambdaL) * 100;
    document.getElementById('cleanSheetDesc').innerText = `L: ${csL.toFixed(1)}% | V: ${csV.toFixed(1)}%`;

    // Over HT y FT
    const xG_HT = parseFloat(xG_Timeline[0]) + parseFloat(xG_Timeline[1]) + parseFloat(xG_Timeline[2]);
    const pHT = (1 - Math.exp(-xG_HT)) * 100;
    document.getElementById('htProb').innerText = pHT.toFixed(1) + "%";
    document.getElementById('htRecommendation').innerText = pHT >= 68 ? "SÍ" : "NO";
    document.getElementById('htRecommendation').className = "status-badge " + (pHT >= 68 ? "status-yes" : "status-no");

    const pFT15 = (1 - (poisson(0, lambdaL + lambdaV) + poisson(1, lambdaL + lambdaV))) * 100;
    document.getElementById('ftProb').innerText = pFT15.toFixed(1) + "%";
    document.getElementById('ftRecommendation').innerText = pFT15 >= 75 ? "SÍ" : "RIESGO";
    document.getElementById('ftRecommendation').className = "status-badge " + (pFT15 >= 75 ? "status-yes" : "status-no");

    const heatMap = document.getElementById('heatMap'); heatMap.innerHTML = "";
    xG_Timeline.forEach((xg, i) => {
        const p = (1 - Math.exp(-xg)) * 100;
        const cell = document.createElement('div'); cell.className = 'heat-cell';
        cell.innerHTML = `${labels[i]}<br>${p.toFixed(0)}%`;
        cell.style.background = `rgba(81, 207, 102, ${0.1 + (p/100)})`;
        heatMap.appendChild(cell);
    });

    document.getElementById('matchTitle').innerText = `${homeName} vs ${awayName}`;
    renderChart(labels, xG_Timeline);
    document.getElementById('results').style.display = 'block';
}

function renderChart(labels, data) {
    const ctx = document.getElementById('minuteChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'xG por Tramo', data: data,
                borderColor: '#4dabf7', backgroundColor: 'rgba(77, 171, 247, 0.1)',
                fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fcc419'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function saveLeague() {
    const name = document.getElementById('leagueName').value.trim();
    if(!name) return alert("Nombre de liga vacío.");
    const data = {
        name,
        hT: document.getElementById('homeTable').value,
        vT: document.getElementById('awayTable').value,
        rI: document.getElementById('runInData').value,
        hM: document.getElementById('localData').value,
        vM: document.getElementById('visitaData').value
    };
    localStorage.setItem('league_psn_v3_' + name, JSON.stringify(data));
    updateLeagueList();
    alert("Liga guardada con éxito.");
}

function updateLeagueList() {
    const selector = document.getElementById('savedLeagues');
    selector.innerHTML = '<option value="">-- Seleccionar --</option>';
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('league_psn_v3_')) {
            selector.add(new Option(key.replace('league_psn_v3_', ''), key));
        }
    }
}

function loadSelectedLeague() {
    const key = document.getElementById('savedLeagues').value;
    if(!key) return;
    const data = JSON.parse(localStorage.getItem(key));
    document.getElementById('leagueName').value = data.name;
    document.getElementById('homeTable').value = data.hT;
    document.getElementById('awayTable').value = data.vT;
    document.getElementById('runInData').value = data.rI || "";
    document.getElementById('localData').value = data.hM;
    document.getElementById('visitaData').value = data.vM;
    processAllData();
}
</script>
</body>
</html>

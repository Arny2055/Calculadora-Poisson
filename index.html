<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Poisson Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; font-size: 0.8rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        .matrix-cell { padding: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 9px; border-radius: 4px; }
        .value-positive { color: #00ff88; font-weight: bold; }
        .value-negative { color: #ff4444; }
        .best-market-row { background: rgba(255, 235, 0, 0.07) !important; box-shadow: inset 4px 0 0 0 var(--bet-yellow); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">POISSON ELITE</span>
            </h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1">
                <a href="index.html" class="px-4 py-2 rounded-lg text-xs font-bold bg-slate-700 text-bet-yellow">POISSON</a>
                <a href="roi.html" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white">ROI LAB</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE DE VALOR</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Analizando...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-5 rounded-2xl">
                    <h2 class="text-xs font-bold text-bet-yellow uppercase mb-3">Identificación</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="league_name" placeholder="Liga (Ej: Premier)" class="p-2">
                        <input type="text" id="event_name" placeholder="Evento (Ej: Arsenal vs Fulham)" class="p-2">
                    </div>
                </div>

                <div class="glass-card p-5 rounded-2xl border-l-4 border-blue-500">
                    <h2 class="text-xs font-bold text-blue-400 uppercase mb-3">Promedios de la Liga</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[8px] text-slate-500 font-bold uppercase">Goles Local Prom.</label>
                            <input type="number" id="l_avg_h" step="0.01" class="w-full p-2" value="1.78">
                        </div>
                        <div>
                            <label class="text-[8px] text-slate-500 font-bold uppercase">Goles Visita Prom.</label>
                            <input type="number" id="l_avg_a" step="0.01" class="w-full p-2" value="1.25">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-5 rounded-2xl border-l-4 border-emerald-500">
                    <h2 class="text-xs font-bold text-emerald-400 uppercase mb-3">Estadísticas Equipos</h2>
                    <div class="space-y-3">
                        <div class="bg-slate-800/40 p-3 rounded-lg">
                            <p class="text-[9px] font-black text-slate-400 mb-2 uppercase">Local (Home)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="h_gf" step="0.01" class="p-2" placeholder="Marcados">
                                <input type="number" id="h_ga" step="0.01" class="p-2" placeholder="Recibidos">
                            </div>
                        </div>
                        <div class="bg-slate-800/40 p-3 rounded-lg">
                            <p class="text-[9px] font-black text-slate-400 mb-2 uppercase">Visitante (Away)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="a_gf" step="0.01" class="p-2" placeholder="Marcados">
                                <input type="number" id="a_ga" step="0.01" class="p-2" placeholder="Recibidos">
                            </div>
                        </div>
                        <button onclick="calculatePoisson()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">Ejecutar Simulación</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl h-[250px]">
                        <canvas id="poissonChart"></canvas>
                    </div>
                    <div class="glass-card p-4 rounded-2xl overflow-y-auto max-h-[250px]">
                        <h3 class="text-[9px] font-bold text-slate-500 uppercase mb-2">Matriz de Goles</h3>
                        <div class="grid grid-cols-6 gap-1" id="score-matrix"></div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900 text-[9px] text-slate-500 uppercase font-bold">
                            <tr>
                                <th class="p-4">Mercado</th>
                                <th class="p-4">Prob %</th>
                                <th class="p-4">C. Justa</th>
                                <th class="p-4">C. Casa</th>
                                <th class="p-4">Edge</th>
                                <th class="p-4">Stake</th>
                                <th class="p-4 text-center">ROI</th>
                            </tr>
                        </thead>
                        <tbody id="market-table" class="divide-y divide-slate-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pChart;
        const STORAGE_KEY = 'betags_v3_miner';

        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        function poissonProb(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function calculatePoisson() {
            const l_avg_h = parseFloat(document.getElementById('l_avg_h').value) || 1.78;
            const l_avg_a = parseFloat(document.getElementById('l_avg_a').value) || 1.25;
            const h_gf = parseFloat(document.getElementById('h_gf').value) || 0;
            const h_ga = parseFloat(document.getElementById('h_ga').value) || 0;
            const a_gf = parseFloat(document.getElementById('a_gf').value) || 0;
            const a_ga = parseFloat(document.getElementById('a_ga').value) || 0;

            // Fórmulas del informe: Fuerza = Promedio Equipo / Promedio Liga
            const h_attack = h_gf / l_avg_h;
            const a_defense = a_ga / l_avg_h; // Goles recibidos vs promedio anotados local
            const a_attack = a_gf / l_avg_a;
            const h_defense = h_ga / l_avg_a;

            const lambda_h = h_attack * a_defense * l_avg_h;
            const lambda_a = a_attack * h_defense * l_avg_a;

            let p_h = [], p_a = [];
            for(let i=0; i<=5; i++) {
                p_h.push(poissonProb(i, lambda_h));
                p_a.push(poissonProb(i, lambda_a));
            }

            renderChart(p_h, p_a);
            processMarkets(p_h, p_a);
        }

        function processMarkets(p_h, p_a) {
            let p_over = 0, p_under = 0;
            const matrix = document.getElementById('score-matrix');
            matrix.innerHTML = '';

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = p_h[h] * p_a[a];
                    if(h + a > 2.5) p_over += prob;
                    if(h + a < 2.5) p_under += prob;

                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 4})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob*100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }

            const p_btts_yes = (1 - p_h[0]) * (1 - p_a[0]);
            
            const markets = [
                { id: 'o25', name: 'OVER 2.5 GOLES', prob: p_over },
                { id: 'u25', name: 'UNDER 2.5 GOLES', prob: p_under },
                { id: 'by', name: 'BTTS (SÍ)', prob: p_btts_yes },
                { id: 'bn', name: 'BTTS (NO)', prob: 1 - p_btts_yes }
            ];

            const tbody = document.getElementById('market-table');
            tbody.innerHTML = '';
            markets.forEach(m => {
                const fair = (1 / m.prob).toFixed(2);
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-300">${m.name}</td>
                        <td class="p-4 text-emerald-400 font-bold">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-16 p-1 text-center" oninput="updateEdge('${m.id}', ${m.prob})" id="odd_${m.id}"></td>
                        <td class="p-4 font-bold" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center">
                            <button onclick="sendToROI('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600 hover:bg-emerald-500 text-[9px] px-3 py-1 rounded font-black uppercase transition-all">Enviar a ROI</button>
                        </td>
                    </tr>
                `;
            });
            updateAssistant(p_over, p_btts_yes);
        }

        function updateEdge(id, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const edgeEl = document.getElementById('edge_' + id);
            const stakeEl = document.getElementById('stake_' + id);

            if(odd > 1) {
                const edge = (odd * prob) - 1;
                edgeEl.innerText = (edge * 100).toFixed(1) + "%";
                edgeEl.className = edge > 0 ? "p-4 value-positive" : "p-4 value-negative";
                
                if(edge > 0) {
                    const kelly = (prob - (1 - prob)/(odd - 1)) * 0.125; // Fracción 1/8
                    stakeEl.innerText = Math.max(0, kelly * 100).toFixed(1) + "%";
                } else { stakeEl.innerText = "0%"; }
            }
        }

        function sendToROI(id, market, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value);
            if(!odd || odd <= 1) return alert("❌ Ingresa la cuota de la casa.");

            const league = document.getElementById('league_name').value || "Liga";
            const event = document.getElementById('event_name').value || "Evento";
            const edge = document.getElementById('edge_' + id).innerText;
            const stake = parseFloat(document.getElementById('stake_' + id).innerText) || 0;

            const newBet = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                teams: `${league.toUpperCase()}: ${event}`,
                market: market,
                prob: prob,
                fair_odd: (1/prob).toFixed(2),
                odd: odd,
                edge: edge,
                stake: stake,
                status: 'pending',
                profit: 0
            };

            let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            bets.unshift(newBet);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));

            // Feedback visual en el botón
            const btn = document.querySelector(`#row_${id} button`);
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ ENVIADO";
            btn.classList.replace('bg-emerald-600', 'bg-blue-600');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');
            }, 2000);
        }

        function updateAssistant(p_over, p_btts) {
            const box = document.getElementById('strategy-assistant-box');
            const text = document.getElementById('strategy-text');
            const signal = document.getElementById('strategy-signal');
            box.classList.remove('hidden');

            if(p_over > 0.62) {
                text.innerText = "ALTA PROBABILIDAD DE OVER 2.5. PARTIDO ABIERTO.";
                signal.innerText = "🔥";
            } else if (p_over < 0.38) {
                text.innerText = "TENDENCIA A POCOS GOLES. ANALIZAR UNDER 2.5.";
                signal.innerText = "🛡️";
            } else {
                text.innerText = "PARTIDO EQUILIBRADO. REVISA EL EDGE DE LAS CUOTAS.";
                signal.innerText = "⚖️";
            }
        }

        function renderChart(h, a) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['0', '1', '2', '3', '4', '5+'],
                    datasets: [
                        { label: 'Local', data: h, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Visita', data: a, borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }
    </script>
</body>
</html>

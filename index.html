<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Calculadora de Poisson</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; }
        .matrix-cell { padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 10px; }
        .best-market-row { background: rgba(255, 235, 0, 0.07) !important; box-shadow: inset 4px 0 0 0 var(--bet-yellow); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">BET<span class="text-bet-yellow">AGS</span></h1>
            <button onclick="sendAnalysisToAI()" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold">ENVIAR ANÁLISIS A IA</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-bet-yellow uppercase mb-4">Motor de Goles</h2>
                <div class="space-y-4">
                    <input type="text" id="event_name" class="w-full p-2 text-xs" placeholder="Equipo Local vs Visitante">
                    <div class="p-4 bg-slate-800/40 rounded-xl"><label class="text-[9px] text-slate-500 uppercase font-bold">Local xG</label><input type="number" id="h_gf" step="0.01" class="w-full p-2 text-center text-xl font-bold" placeholder="1.75"></div>
                    <div class="p-4 bg-slate-800/40 rounded-xl"><label class="text-[9px] text-slate-500 uppercase font-bold">Visitante xG</label><input type="number" id="a_gf" step="0.01" class="w-full p-2 text-center text-xl font-bold" placeholder="1.25"></div>
                    <button onclick="calculate()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-sm tracking-widest shadow-lg">Ejecutar Simulación</button>
                </div>
            </div>
            <div class="lg:col-span-2 glass-card p-6 rounded-2xl">
                <div class="h-[250px]"><canvas id="poissonChart"></canvas></div>
                <div class="mt-4 grid grid-cols-6 gap-1" id="score-matrix"></div>
            </div>
        </div>

        <div class="glass-card rounded-2xl mt-6 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-[10px] tracking-wider"><tr><th class="p-4 text-emerald-400">Mercado</th><th class="p-4">Prob %</th><th class="p-4">Justa</th><th class="p-4">Casa</th><th class="p-4">Edge</th><th class="p-4">Stake</th><th class="p-4"></th></tr></thead>
                <tbody id="market-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let pChart;
        function factorial(n) { if (n === 0) return 1; let res = 1; for (let i = 2; i <= n; i++) res *= i; return res; }
        function poissonProb(k, l) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function calculate() {
            const h_l = parseFloat(document.getElementById('h_gf').value) || 0;
            const a_l = parseFloat(document.getElementById('a_gf').value) || 0;
            let h_p = [], a_p = [], labels = [], p_over = 0;
            const matrix = document.getElementById('score-matrix'); matrix.innerHTML = '';

            for(let i=0; i<=5; i++) { labels.push(i + "G"); h_p.push(poissonProb(i, h_l)); a_p.push(poissonProb(i, a_l)); }
            renderPoissonChart(labels, h_p, a_p);

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = poissonProb(h, h_l) * poissonProb(a, a_l);
                    if(h + a > 2.5) p_over += prob;
                    const cell = document.createElement('div'); cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 2})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob * 100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }
            renderMarketTable([{ name: 'OVER 2.5', prob: p_over }, { name: 'UNDER 2.5', prob: 1-p_over }]);
        }

        function renderPoissonChart(labels, home, away) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Local', data: home, borderColor: '#3b82f6', fill: true }, { label: 'Visitante', data: away, borderColor: '#f97316', fill: true }] }, options: { responsive: true, maintainAspectRatio: false } });
        }

        function renderMarketTable(data) {
            const table = document.getElementById('market-table'); table.innerHTML = '';
            data.forEach(m => {
                table.innerHTML += `<tr class="market-row"><td class="p-4 font-bold">${m.name}</td><td class="p-4 text-emerald-400">${(m.prob * 100).toFixed(1)}%</td><td class="p-4">${(1/m.prob).toFixed(2)}</td><td class="p-4"><input type="number" class="w-20 p-1 text-xs" oninput="updateEdge(this, ${m.prob})"></td><td class="p-4 edge-val">--</td><td class="p-4 stake-val">--</td><td class="p-4"><button class="bg-emerald-600 px-3 py-1 rounded">FIX</button></td></tr>`;
            });
        }

        function updateEdge(el, prob) {
            const odd = parseFloat(el.value);
            const row = el.closest('tr');
            if(odd > 1) {
                const edge = (odd * prob) - 1;
                row.querySelector('.edge-val').innerText = (edge * 100).toFixed(1) + "%";
                row.querySelector('.stake-val').innerText = Math.max(0, edge * 5).toFixed(1) + "%";
            }
        }

        function sendAnalysisToAI() {
            const analysis = {
                tool: "POISSON_PRO",
                match: document.getElementById('event_name').value || "Desconocido",
                local_xg: document.getElementById('h_gf').value,
                away_xg: document.getElementById('a_gf').value,
                over25_prob: document.querySelector('.market-row')?.innerText.split('\n')[1] || "0%"
            };
            navigator.clipboard.writeText("ANALISIS_IA:" + JSON.stringify(analysis));
            alert("Análisis de Poisson copiado. ¡Envíamelo para darte mi veredicto!");
        }
    </script>
</body>
</html>

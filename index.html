<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Calculadora de Poisson</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        .strategy-match { background: rgba(16, 185, 129, 0.2) !important; border: 2px solid #10b981 !important; }
        .matrix-cell { padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">CALCULATOR</span>
            </h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1">
                <a href="index.html" class="px-4 py-2 rounded-lg text-sm font-bold bg-slate-700 text-bet-yellow">CALCULADORA</a>
                <a href="roi.html" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white">ANÁLISIS ROI</a>
                <a href="config.html" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white"><i class="fa-solid fa-robot"></i></a>
                <a href="backtesting.html" class="px-4 py-2 rounded-lg text-sm font-bold bg-purple-600/20 text-purple-400 border border-purple-500/30">LAB</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE ESTRATÉGICO</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Esperando datos...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-bet-yellow uppercase mb-4 italic underline decoration-emerald-500">Motor de Goles</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="league_name" class="w-full p-2 text-xs" placeholder="Liga">
                        <input type="text" id="event_name" class="w-full p-2 text-xs" placeholder="Evento">
                    </div>
                    <input type="number" id="ou_line_input" step="0.25" class="w-full p-2 text-xs font-bold text-emerald-400" value="2.5">
                    <div class="p-4 bg-slate-800/40 rounded-xl">
                        <label class="text-[9px] text-slate-500 block">Media Goles Local</label>
                        <input type="number" id="h_gf" step="0.01" class="w-full p-2 text-center" placeholder="1.75">
                    </div>
                    <div class="p-4 bg-slate-800/40 rounded-xl">
                        <label class="text-[9px] text-slate-500 block">Media Goles Visitante</label>
                        <input type="number" id="a_gf" step="0.01" class="w-full p-2 text-center" placeholder="1.25">
                    </div>
                    <button onclick="calculate()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-sm uppercase tracking-widest">Ejecutar Simulación</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card p-6 rounded-2xl">
                <div class="h-[250px]"><canvas id="poissonChart"></canvas></div>
                <div class="mt-4 grid grid-cols-6 gap-1" id="score-matrix"></div>
            </div>
        </div>

        <div class="glass-card rounded-2xl mt-6 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-slate-500 uppercase text-[10px]">
                    <tr>
                        <th class="p-4">Mercado</th><th class="p-4">Prob %</th><th class="p-4">Cuota Justa</th><th class="p-4">Mercado</th><th class="p-4">Edge %</th><th class="p-4">Stake</th><th class="p-4 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="market-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let bets = JSON.parse(localStorage.getItem('betags_v3_miner')) || [];
        let pChart;

        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poissonProb(k, l) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function calculate() {
            const h_l = parseFloat(document.getElementById('h_gf').value) || 0;
            const a_l = parseFloat(document.getElementById('a_gf').value) || 0;
            const line = parseFloat(document.getElementById('ou_line_input').value) || 2.5;
            
            let h_p = [], a_p = [], labels = [], p_over = 0, p_under = 0;
            const matrix = document.getElementById('score-matrix'); matrix.innerHTML = '';

            for(let i=0; i<=5; i++) {
                labels.push(i + "G"); h_p.push(poissonProb(i, h_l)); a_p.push(poissonProb(i, a_l));
            }
            renderPoissonChart(labels, h_p, a_p);

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = poissonProb(h, h_l) * poissonProb(a, a_l);
                    if(h + a > line) p_over += prob;
                    if(h + a < line) p_under += prob;
                    const cell = document.createElement('div'); cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 2})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob * 100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }
            renderMarketTable([{id:'over', name:`OVER ${line}`, prob:p_over, partner:'under'}, {id:'under', name:`UNDER ${line}`, prob:p_under, partner:'over'}]);
        }

        function renderPoissonChart(labels, home, away) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [
                { label: 'Local', data: home, borderColor: '#3b82f6', tension: 0.4 },
                { label: 'Visitante', data: away, borderColor: '#f97316', tension: 0.4 }
            ]}, options: { responsive: true, maintainAspectRatio: false }});
        }

        function renderMarketTable(data) {
            const table = document.getElementById('market-table'); table.innerHTML = '';
            data.forEach(m => {
                const fair = (1/m.prob).toFixed(2);
                table.innerHTML += `
                    <tr class="hover:bg-slate-800/30" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-200">${m.name}</td>
                        <td class="p-4 text-emerald-400">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-16 p-1 text-xs" oninput="updateEdge('${m.id}', ${m.prob}, '${m.name}')" id="odd_${m.id}"></td>
                        <td class="p-4 font-bold" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center"><button onclick="registerBet('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600 px-3 py-1 rounded-lg text-[10px] font-black">FIJAR</button></td>
                    </tr>`;
            });
        }

        function updateEdge(id, prob, marketName) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            if(odd > 1) {
                const edge = (odd * prob) - 1;
                const stake = (100 * (edge / (odd - 1)) * 0.125); // Simplified Kelly
                document.getElementById('edge_' + id).innerText = (edge * 100).toFixed(1) + "%";
                document.getElementById('stake_' + id).innerText = stake > 0 ? "$" + stake.toFixed(2) : "--";
            }
        }

        function registerBet(id, market, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value);
            if(!odd) return alert("Ingresa cuota");
            const stake = parseFloat(document.getElementById('stake_' + id).innerText.replace('$','')) || 0;
            const newBet = { id: Date.now(), league: document.getElementById('league_name').value || "LIGA", teams: document.getElementById('event_name').value || "EVENTO", market, odd, prob, stake, status: 'pending', profit: 0, date: new Date().toLocaleDateString('es-ES') };
            bets.unshift(newBet);
            localStorage.setItem('betags_v3_miner', JSON.stringify(bets));
            alert("Registrado en ROI.");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - xG & Poisson Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-yellow: #fcc419;
            --accent-blue: #339af0;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); text-align: center; letter-spacing: 2px; font-weight: 900; margin-bottom: 5px; }
        h1 span { color: var(--accent-yellow); }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 25px; display: block; }

        .section-title { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        textarea { width: 100%; height: 120px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #51cf66; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; resize: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        select, input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; background: #0b0e14; color: white; border: 1px solid var(--border); outline: none; cursor: pointer; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; background: linear-gradient(135deg, #4dabf7, #228be6); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reset { background: linear-gradient(135deg, #343a40, #212529); color: #adb5bd; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(77, 171, 247, 0.4); }
        .btn-reset:hover { background: #c92a2a; color: white; border-color: #c92a2a; }

        .xg-display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .xg-box { background: rgba(77, 171, 247, 0.05); border: 1px solid var(--primary); border-radius: 12px; padding: 15px; text-align: center; }
        .xg-box label { font-size: 0.65rem; color: var(--primary); font-weight: 800; display: block; margin-bottom: 5px; }
        .xg-box .val { font-size: 1.8rem; font-weight: 900; color: var(--text-white); }
        
        .delta-badge { font-size: 0.7rem; padding: 5px; border-radius: 6px; font-weight: bold; background: #0b0e14; border: 1px solid var(--border); margin-top: 5px; display: inline-block; }
        .delta-pos { color: var(--accent-green); border-color: var(--accent-green); }
        .delta-neg { color: var(--accent-red); border-color: var(--accent-red); }

        #results { display: none; }
        .prob-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .prob-box { background: var(--bg-dark); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .prob-box span { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .prob-box .val { font-size: 1.3rem; font-weight: 900; color: var(--accent-green); display: block; margin-top: 5px; }
        
        .value-check-container { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed var(--border); }
        .value-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; align-items: end; }
        .value-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-top: 10px; }
        .has-value { background: var(--accent-green); color: black; }
        .no-value { background: var(--accent-red); color: white; }

        .chart-container { height: 250px; margin-top: 25px; }

        .insight-box { margin-top: 15px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 0.75rem; line-height: 1.5; color: var(--text-muted); border-left: 4px solid var(--accent-yellow); }
        .insight-box b { color: var(--primary); text-transform: uppercase; font-size: 0.7rem; }
        .efficiency-tag { font-size: 0.6rem; text-transform: uppercase; color: var(--accent-yellow); font-weight: bold; display: block; margin-top: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> ENGINE AI</h1>
    <span class="subtitle">Análisis Cuántico de Probabilidades xG v2.6</span>

    <div class="card">
        <div class="section-title"><span>🏠</span> TABLA LOCAL (HOME STATS)</div>
        <textarea id="homeTableInput" placeholder="Pega aquí la tabla avanzada de locales..." oninput="saveToStorage()"></textarea>
        
        <div class="section-title" style="margin-top: 15px;"><span>🚀</span> TABLA VISITANTE (AWAY STATS)</div>
        <textarea id="awayTableInput" placeholder="Pega aquí la tabla avanzada de visitantes..." oninput="saveToStorage()"></textarea>

        <div class="btn-group">
            <button class="btn" onclick="parseTables()">PROCESAR DATOS DE LIGA</button>
            <button class="btn btn-reset" onclick="clearData()">RESET</button>
        </div>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="section-title"><span>⚔️</span> CONFIGURACIÓN DEL MATCH</div>
        <div class="selector-grid">
            <div>
                <label style="font-size: 0.6rem;">LOCAL</label>
                <select id="selectHome"></select>
            </div>
            <div>
                <label style="font-size: 0.6rem;">VISITANTE</label>
                <select id="selectAway"></select>
            </div>
        </div>
        
        <div class="value-check-container">
            <div class="section-title"><span>💰</span> OPTIMIZADOR DE CUOTAS (VALUE)</div>
            <div class="value-grid">
                <div>
                    <select id="valueMarket">
                        <option value="winL">Gana Local</option>
                        <option value="draw">Empate</option>
                        <option value="winV">Gana Visita</option>
                        <option value="o25">Over 2.5</option>
                        <option value="u25">Under 2.5</option>
                        <option value="btts">Ambos Marcan</option>
                    </select>
                </div>
                <div>
                    <input type="number" id="bookieOdd" step="0.01" placeholder="Cuota">
                </div>
            </div>
        </div>

        <button class="btn" style="background: var(--accent-yellow); color: black; width: 100%; margin-top: 20px;" onclick="calculateAIAnalysis()">CALCULAR PROBABILIDAD IA</button>
    </div>

    <div id="results" class="card">
        <div class="section-title"><span>📊</span> PREDICCIÓN CIENTÍFICA</div>
        
        <div class="xg-display-grid">
            <div class="xg-box">
                <label>LAMBDA PROYECTADO (L)</label>
                <div class="val" id="val_xgL">0.00</div>
                <div id="deltaL_badge" class="delta-badge"></div>
                <span id="effL" class="efficiency-tag"></span>
            </div>
            <div class="xg-box">
                <label>LAMBDA PROYECTADO (V)</label>
                <div class="val" id="val_xgV">0.00</div>
                <div id="deltaV_badge" class="delta-badge"></div>
                <span id="effV" class="efficiency-tag"></span>
            </div>
        </div>

        <div class="insight-box" id="aiInsight"></div>

        <div class="prob-card">
            <div class="prob-box"><span>LOCAL</span><span class="val" id="pWinL">0%</span></div>
            <div class="prob-box"><span>EMPATE</span><span class="val" id="pDraw">0%</span></div>
            <div class="prob-box"><span>VISITA</span><span class="val" id="pWinV">0%</span></div>
        </div>

        <div class="prob-card">
            <div class="prob-box"><span>OVER 2.5</span><span class="val" id="pO25">0%</span></div>
            <div class="prob-box"><span>AMBOS MARCAN</span><span class="val" id="pBTTS">0%</span></div>
            <div class="prob-box"><span>UNDER 2.5</span><span class="val" id="pU25">0%</span></div>
        </div>

        <div id="valueAnalysisResult" style="text-align: center; margin-top: 15px; display: none;">
            <div id="valueBadge" class="value-badge"></div>
            <p id="valueDetail" style="font-size: 0.8rem; margin-top: 5px; color: var(--text-muted);"></p>
        </div>

        <div class="chart-container">
            <canvas id="poissonChart"></canvas>
        </div>
    </div>
</div>

<script>
let homeTeamsData = [], awayTeamsData = [];
let chartInstance = null;
let currentProbs = {};

window.onload = function() {
    if(localStorage.getItem('betags_home_v2')) document.getElementById('homeTableInput').value = localStorage.getItem('betags_home_v2');
    if(localStorage.getItem('betags_away_v2')) document.getElementById('awayTableInput').value = localStorage.getItem('betags_away_v2');
};

function saveToStorage() {
    localStorage.setItem('betags_home_v2', document.getElementById('homeTableInput').value);
    localStorage.setItem('betags_away_v2', document.getElementById('awayTableInput').value);
}

function clearData() {
    localStorage.clear();
    location.reload();
}

function parseTableData(text) {
    const lines = text.trim().split('\n');
    let data = [];
    lines.forEach(line => {
        const p = line.trim().split(/\t|\s\s+/);
        if (p.length >= 6) {
            const name = p[0].replace(/^\d+\.\s*/, "").trim();
            const xG = parseFloat(p[1]);
            const goles = parseFloat(p[2]);
            const xGDif = parseFloat(p[3]);
            const tiros = parseFloat(p[4]);
            const xGperShot = parseFloat(p[5]);
            if(!isNaN(xG)) {
                data.push({ name, xG, goles, xGDif, tiros, xGperShot, avgXG: xG/19, avgG: goles/19 });
            }
        }
    });
    return data;
}

function parseTables() {
    saveToStorage();
    homeTeamsData = parseTableData(document.getElementById('homeTableInput').value);
    awayTeamsData = parseTableData(document.getElementById('awayTableInput').value);

    if(homeTeamsData.length === 0 || awayTeamsData.length === 0) {
        alert("Formato inválido. Asegúrate de copiar las 6 columnas solicitadas.");
        return;
    }

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";
    homeTeamsData.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => sH.add(new Option(t.name, t.name)));
    awayTeamsData.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => sV.add(new Option(t.name, t.name)));
    document.getElementById('selectionArea').style.display = 'block';
}

function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poisson(k, l) { return (Math.exp(-l) * Math.pow(l, k)) / factorial(k); }

function calculateAIAnalysis() {
    const h = homeTeamsData.find(t => t.name === document.getElementById('selectHome').value);
    const v = awayTeamsData.find(t => t.name === document.getElementById('selectAway').value);

    // 1. CÁLCULO DE LAMBDA BASADO EN xG (EXPECTATIVA PURA)
    let lL = h.avgXG;
    let lV = v.avgXG;

    // 2. AJUSTE POR REGRESIÓN (Z-SCORE ANALYTICS)
    // El modelo detecta si la diferencia entre xG y Goles es insostenible
    const regressHome = (h.xGDif / 19) * 0.35;
    const regressAway = (v.xGDif / 19) * 0.35;
    lL -= regressHome; // Si xGDif es +, el equipo está sobre-rindiendo, se ajusta a la baja.
    lV -= regressAway;

    // 3. AJUSTE POR CALIDAD DE PELIGRO (xG per Shot)
    // Coeficiente de eficiencia: compara la calidad de tiro del equipo vs promedio (0.10)
    const effL = h.xGperShot / 0.10;
    const effV = v.xGperShot / 0.10;
    lL *= (0.85 + (effL * 0.15));
    lV *= (0.85 + (effV * 0.15));

    // UI Updates
    document.getElementById('val_xgL').innerText = lL.toFixed(2);
    document.getElementById('val_xgV').innerText = lV.toFixed(2);
    document.getElementById('effL').innerText = `Eff: ${(effL*100).toFixed(0)}%`;
    document.getElementById('effV').innerText = `Eff: ${(effV*100).toFixed(0)}%`;

    // 4. CÁLCULO DE PROBABILIDADES
    let pL = 0, pV = 0, pX = 0, pO25 = 0, pBTTS = 0;
    let probL = [], probV = [];
    for(let i=0; i<=8; i++) {
        probL[i] = poisson(i, lL);
        probV[i] = poisson(i, lV);
    }

    for(let i=0; i<=8; i++) {
        for(let j=0; j<=8; j++) {
            let p = probL[i] * probV[j];
            if(i > j) pL += p; else if(i < j) pV += p; else pX += p;
            if(i + j > 2.5) pO25 += p;
            if(i > 0 && j > 0) pBTTS += p;
        }
    }

    currentProbs = { winL: pL, draw: pX, winV: pV, o25: pO25, u25: 1-pO25, btts: pBTTS };

    // Update UI Labels
    document.getElementById('pWinL').innerText = (pL*100).toFixed(1) + "%";
    document.getElementById('pWinV').innerText = (pV*100).toFixed(1) + "%";
    document.getElementById('pDraw').innerText = (pX*100).toFixed(1) + "%";
    document.getElementById('pO25').innerText = (pO25*100).toFixed(1) + "%";
    document.getElementById('pU25').innerText = ((1-pO25)*100).toFixed(1) + "%";
    document.getElementById('pBTTS').innerText = (pBTTS*100).toFixed(1) + "%";

    // 5. INTELIGENCIA DE INSIGHTS (Lógica Bayesiana)
    let insights = "";
    if(h.xGDif < -5) insights += `<b>Detección de Valor:</b> ${h.name} tiene una racha de mala suerte masiva (-${Math.abs(h.xGDif).toFixed(1)} xG). La IA proyecta una corrección al alza en goles.<br>`;
    if(v.xGperShot > 0.13) insights += `<b>Alta Peligrosidad:</b> ${v.name} genera tiros de muy alta calidad. Probabilidad de gol por llegada superior al promedio.<br>`;
    if(pO25 > 0.60 && pBTTS > 0.55) insights += `<b>Alerta de Mercado:</b> Patrón de partido abierto detectado. Probabilidad de Over/BTTS convergente.`;
    
    document.getElementById('aiInsight').innerHTML = insights || "Datos estables. No se detectan anomalías estadísticas significativas.";

    checkValue();
    document.getElementById('results').style.display = 'block';
    renderChart(probL.slice(0,6), probV.slice(0,6));
}

function checkValue() {
    const odd = parseFloat(document.getElementById('bookieOdd').value);
    const market = document.getElementById('valueMarket').value;
    const analysisArea = document.getElementById('valueAnalysisResult');
    if (isNaN(odd) || odd <= 1) { analysisArea.style.display = 'none'; return; }

    const prob = currentProbs[market];
    const fairOdd = 1 / prob;
    const value = (prob * odd) - 1;
    analysisArea.style.display = 'block';
    const badge = document.getElementById('valueBadge');
    
    if (value > 0.05) {
        badge.innerText = `VALOR IA: +${(value*100).toFixed(1)}%`;
        badge.className = "value-badge has-value";
        document.getElementById('valueDetail').innerText = `Cuota mínima rentable: ${fairOdd.toFixed(2)}`;
    } else {
        badge.innerText = `SIN VALOR (EDGE NEGATIVO)`;
        badge.className = "value-badge no-value";
        document.getElementById('valueDetail').innerText = `Tu cuota (${odd}) es menor a la cuota justa IA (${fairOdd.toFixed(2)})`;
    }
}

function renderChart(l, v) {
    const ctx = document.getElementById('poissonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0', '1', '2', '3', '4', '5'],
            datasets: [
                { label: 'Local', data: l, backgroundColor: '#4dabf7' },
                { label: 'Visita', data: v, backgroundColor: '#fcc419' }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, grid: { color: '#2c3440' } } }
        }
    });
}
</script>
</body>
</html>

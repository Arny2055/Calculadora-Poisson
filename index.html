<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Data Hub PRO - Anti-429</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans custom-scrollbar">

    <header class="bg-gradient-to-r from-blue-900 to-blue-800 p-6 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-extrabold flex items-center gap-2 tracking-tight">
                <i class="fas fa-shield-alt text-blue-400"></i> FOOTBALL<span class="text-blue-400">SAFE</span>
            </h1>
            <div class="flex flex-col gap-1 w-full md:w-auto text-right">
                <div class="flex gap-2">
                    <input type="password" id="api-key" value="b87bae2028d2da2ee28c5d36a60f3ab8"
                           class="bg-blue-950 border border-blue-700 rounded px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all text-sm"
                           placeholder="Tu API Key de RapidAPI">
                    <button onclick="saveApiKey()" class="bg-blue-600 px-3 rounded hover:bg-blue-500 shadow-lg"><i class="fas fa-save"></i></button>
                </div>
                <span id="rate-info" class="text-[10px] text-emerald-400 font-mono">ESTADO: LISTO PARA PETICIÓN</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="bg-gray-800/50 p-4 rounded-2xl mb-8 border border-gray-700 backdrop-blur-sm">
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="fetchCompetitions()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm">
                    <i class="fas fa-trophy"></i> Ligas Populares
                </button>
                <button onclick="fetchMatches('live')" class="bg-red-600 hover:bg-red-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm">
                    <i class="fas fa-satellite-dish"></i> En Vivo
                </button>
                <div class="flex items-center bg-gray-700 rounded-xl px-3 border border-gray-600">
                    <i class="fas fa-calendar-alt mr-2 text-gray-400"></i>
                    <input type="date" id="date-picker" onchange="fetchByDate(this.value)" class="bg-transparent text-sm focus:outline-none py-2 uppercase font-mono">
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center my-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-500 h-16 w-16 mb-4"></div>
            <p id="loader-text" class="text-blue-400 animate-pulse font-mono text-xs uppercase tracking-widest">Sincronizando...</p>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        const API_HOST = 'api-football-v1.p.rapidapi.com';
        const API_BASE = 'https://api-football-v1.p.rapidapi.com/v3';
        
        // Cache simple para evitar peticiones repetidas
        const CACHE = {};

        async function apiRequest(endpoint) {
            if (CACHE[endpoint]) {
                console.log("Cargando desde Cache:", endpoint);
                return CACHE[endpoint];
            }

            const apiKey = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const rateInfo = document.getElementById('rate-info');
            
            loader.classList.remove('hidden');
            rateInfo.innerText = "PETICIÓN EN CURSO...";
            rateInfo.classList.replace('text-emerald-400', 'text-amber-400');

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'GET',
                    headers: { 'x-rapidapi-key': apiKey, 'x-rapidapi-host': API_HOST }
                });
                
                if (response.status === 429) {
                    throw new Error("LÍMITE EXCEDIDO: Espera 1 minuto y vuelve a intentar.");
                }
                
                if (!response.ok) throw new Error("Error de conexión");
                
                const data = await response.json();
                
                // Guardar en cache
                CACHE[endpoint] = data.response;
                
                setTimeout(() => {
                    rateInfo.innerText = "LISTO PARA PETICIÓN";
                    rateInfo.classList.replace('text-amber-400', 'text-emerald-400');
                }, 2000);

                loader.classList.add('hidden');
                return data.response;
            } catch (error) {
                loader.classList.add('hidden');
                rateInfo.innerText = "ERROR DE SEÑAL";
                rateInfo.classList.replace('text-amber-400', 'text-red-500');
                showErrorMessage(error.message);
                return null;
            }
        }

        function showErrorMessage(msg) {
            document.getElementById('content').innerHTML = `
                <div class="col-span-full bg-red-900/20 border border-red-500/30 p-10 rounded-3xl text-center">
                    <i class="fas fa-clock text-4xl mb-4 text-red-500"></i>
                    <h3 class="text-xl font-bold text-white mb-2 uppercase">Límite de API alcanzado</h3>
                    <p class="text-red-400 font-mono text-sm">${msg}</p>
                    <p class="mt-4 text-xs text-gray-500 italic">RapidAPI Free permite 10 peticiones/min. Por favor, no hagas clics consecutivos.</p>
                </div>`;
        }

        async function fetchCompetitions() {
            const leagueIds = [39, 140, 135, 78, 61]; 
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            for (let id of leagueIds) {
                const data = await apiRequest(`leagues?id=${id}`);
                if (data) renderLeague(data[0]);
                // Espera 1.5 segundos entre cada liga para evitar el error 429
                await new Promise(resolve => setTimeout(resolve, 1500));
            }
        }

        function renderLeague(item) {
            const content = document.getElementById('content');
            content.innerHTML += `
                <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 hover:border-blue-500 transition-all shadow-xl">
                    <div class="flex items-center gap-4 mb-6">
                        <img src="${item.league.logo}" class="w-12 h-12 object-contain">
                        <div>
                            <h3 class="text-lg font-bold">${item.league.name}</h3>
                            <span class="text-[10px] text-blue-400 font-mono uppercase">${item.country.name}</span>
                        </div>
                    </div>
                    <button onclick="fetchStandings(${item.league.id})" class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white p-2 rounded-lg text-xs font-bold transition-all border border-blue-600/30">
                        VER CLASIFICACIÓN
                    </button>
                </div>`;
        }

        async function fetchMatches(query) {
            const endpoint = query === 'live' ? 'fixtures?live=all' : `fixtures?${query}`;
            const data = await apiRequest(endpoint);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = data.length === 0 
                ? '<div class="col-span-full text-center p-20 opacity-50 italic">No hay partidos ahora.</div>'
                : data.map(item => renderMatchCard(item)).join('');
        }

        function renderMatchCard(item) {
            return `
                <div class="bg-gray-800 rounded-2xl p-5 border-l-4 ${item.fixture.status.short === 'NS' ? 'border-gray-600' : 'border-emerald-500'} shadow-xl">
                    <div class="flex justify-between text-[9px] text-gray-500 mb-3 font-bold uppercase">
                        <span>${item.league.name}</span>
                        <span>${item.fixture.status.long}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="text-center w-1/3">
                            <img src="${item.teams.home.logo}" class="w-8 h-8 mx-auto mb-1">
                            <p class="text-[10px] font-bold truncate">${item.teams.home.name}</p>
                        </div>
                        <div class="text-xl font-black font-mono w-1/3 text-center">
                            ${item.goals.home ?? 0}:${item.goals.away ?? 0}
                        </div>
                        <div class="text-center w-1/3">
                            <img src="${item.teams.away.logo}" class="w-8 h-8 mx-auto mb-1">
                            <p class="text-[10px] font-bold truncate">${item.teams.away.name}</p>
                        </div>
                    </div>
                </div>`;
        }

        async function fetchByDate(date) { await fetchMatches(`date=${date}`); }
        
        async function fetchStandings(leagueId) {
            const data = await apiRequest(`standings?league=${leagueId}&season=2025`);
            if (!data) return;
            const table = data[0].league.standings[0];
            const content = document.getElementById('content');
            content.className = "block w-full";
            content.innerHTML = `
                <div class="bg-gray-800 rounded-3xl overflow-hidden border border-gray-700">
                    <div class="p-4 bg-gray-750 flex justify-between items-center border-b border-gray-700">
                        <h2 class="font-black uppercase tracking-tighter">Tabla de Posiciones</h2>
                        <button onclick="document.getElementById('content').innerHTML=''; fetchCompetitions();" class="text-xs bg-gray-700 px-3 py-1 rounded">Cerrar</button>
                    </div>
                    <table class="w-full text-[11px]">
                        <tr class="bg-black/20 text-gray-500 uppercase"><th class="p-3">Pos</th><th class="p-3 text-left">Equipo</th><th class="p-3">PTS</th></tr>
                        ${table.map(t => `
                            <tr class="border-t border-gray-700">
                                <td class="p-3 text-center font-bold text-blue-400">${t.rank}</td>
                                <td class="p-3 flex items-center gap-2"><img src="${t.team.logo}" class="w-4 h-4"> ${t.team.name}</td>
                                <td class="p-3 text-center font-black">${t.points}</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
        }

        function saveApiKey() {
            localStorage.setItem('fb_api_key_v3', document.getElementById('api-key').value);
            alert('Configuración guardada.');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Poisson Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; font-size: 0.8rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        .matrix-cell { padding: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 9px; border-radius: 4px; }
        .value-positive { color: #00ff88; font-weight: bold; }
        .value-negative { color: #ff4444; }
        .best-market-row { background: rgba(255, 235, 0, 0.07) !important; box-shadow: inset 4px 0 0 0 var(--bet-yellow); }
        .suggested-badge { background: var(--bet-yellow); color: black; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; margin-left: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">POISSON ELITE</span>
            </h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1 text-[10px]">
                <span class="px-3 py-1 text-emerald-400 font-bold uppercase"><i class="fa-solid fa-shield-halved mr-1"></i> Solo Mercados O/U 2.5 & BTTS</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE DE VALOR</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Analizando probabilidades...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-sm font-bold text-bet-yellow uppercase mb-4 flex justify-between">
                        <span><i class="fa-solid fa-database mr-2"></i>Datos de Liga</span>
                        <span class="text-[10px] text-slate-500">Temporada Actual</span>
                    </h2>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="text-[8px] text-slate-400 uppercase font-bold">Prom. Gol Local</label>
                            <input type="number" id="l_avg_h" step="0.01" class="w-full p-2" placeholder="Ej: 1.78">
                        </div>
                        <div>
                            <label class="text-[8px] text-slate-400 uppercase font-bold">Prom. Gol Visita</label>
                            <input type="number" id="l_avg_a" step="0.01" class="w-full p-2" placeholder="Ej: 1.25">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl border-t-4 border-emerald-500">
                    <h2 class="text-sm font-bold text-white uppercase mb-4 italic">Análisis por Equipos</h2>
                    <div class="space-y-4">
                        <div class="p-4 bg-slate-800/40 rounded-xl">
                            <p class="text-[10px] text-blue-400 font-black mb-2 uppercase">Local (Home)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="h_gf" step="0.01" class="p-2" placeholder="Goles Marcados">
                                <input type="number" id="h_ga" step="0.01" class="p-2" placeholder="Goles Recibidos">
                            </div>
                        </div>
                        <div class="p-4 bg-slate-800/40 rounded-xl">
                            <p class="text-[10px] text-orange-400 font-black mb-2 uppercase">Visitante (Away)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="a_gf" step="0.01" class="p-2" placeholder="Goles Marcados">
                                <input type="number" id="a_ga" step="0.01" class="p-2" placeholder="Goles Recibidos">
                            </div>
                        </div>
                        <button onclick="calculatePoisson()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg">Calcular Probabilidades</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl h-[300px]">
                        <canvas id="poissonChart"></canvas>
                    </div>
                    <div class="glass-card p-4 rounded-2xl">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-2">Matriz Probabilística (Marcador Exacto)</h3>
                        <div class="grid grid-cols-6 gap-1" id="score-matrix">
                            </div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden border border-white/5">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900 text-slate-500 uppercase text-[9px] tracking-wider">
                            <tr>
                                <th class="p-4 text-emerald-400">Mercado (O/U & BTTS)</th>
                                <th class="p-4">Prob %</th>
                                <th class="p-4">Cuota Justa</th>
                                <th class="p-4">Cuota Casa</th>
                                <th class="p-4">Edge</th>
                                <th class="p-4 text-center">Stake</th>
                            </tr>
                        </thead>
                        <tbody id="market-table" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pChart;

        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        
        function poissonProb(k, lambda) {
            return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
        }

        function calculatePoisson() {
            // Datos de Liga
            const l_avg_h = parseFloat(document.getElementById('l_avg_h').value) || 1.5;
            const l_avg_a = parseFloat(document.getElementById('l_avg_a').value) || 1.2;

            // Datos Equipos
            const h_gf = parseFloat(document.getElementById('h_gf').value) || 0;
            const h_ga = parseFloat(document.getElementById('h_ga').value) || 0;
            const a_gf = parseFloat(document.getElementById('a_gf').value) || 0;
            const a_ga = parseFloat(document.getElementById('a_ga').value) || 0;

            // 1. Calcular Fuerzas de Ataque y Defensa (Según tu informe)
            const h_attack = h_gf / l_avg_h;
            const a_defense = a_ga / l_avg_a;
            const a_attack = a_gf / l_avg_a;
            const h_defense = h_ga / l_avg_h;

            // 2. Determinar Lambda (Media Esperada de Goles)
            const lambda_h = h_attack * a_defense * l_avg_h;
            const lambda_a = a_attack * h_defense * l_avg_a;

            // 3. Generar Probabilidades
            let prob_h = [], prob_a = [];
            for(let i=0; i<=5; i++) {
                prob_h.push(poissonProb(i, lambda_h));
                prob_a.push(poissonProb(i, lambda_a));
            }

            renderChart(prob_h, prob_a);
            processMarkets(prob_h, prob_a, lambda_h, lambda_a);
        }

        function processMarkets(prob_h, prob_a, lambda_h, lambda_a) {
            let p_over25 = 0, p_under25 = 0;
            let p_btts_yes = 0, p_btts_no = 0;
            const matrix = document.getElementById('score-matrix');
            matrix.innerHTML = '';

            // Probabilidad BTTS
            const h_no_score = prob_h[0];
            const a_no_score = prob_a[0];
            p_btts_yes = (1 - h_no_score) * (1 - a_no_score);
            p_btts_no = 1 - p_btts_yes;

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const p_score = prob_h[h] * prob_a[a];
                    if(h + a > 2.5) p_over25 += p_score;
                    if(h + a < 2.5) p_under25 += p_score;

                    // Dibujar Matriz
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    const intensity = Math.min(p_score * 5, 1);
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${intensity})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(p_score*100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }

            const markets = [
                { id: 'o25', name: 'OVER 2.5 GOLES', prob: p_over25 },
                { id: 'u25', name: 'UNDER 2.5 GOLES', prob: p_under25 },
                { id: 'by', name: 'BTTS (SÍ)', prob: p_btts_yes },
                { id: 'bn', name: 'BTTS (NO)', prob: p_btts_no }
            ];

            renderTable(markets);
            updateAssistant(p_over25, p_btts_yes);
        }

        function renderTable(data) {
            const tbody = document.getElementById('market-table');
            tbody.innerHTML = '';
            data.forEach(m => {
                const fair = (1 / m.prob).toFixed(2);
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/30 market-row" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-200">${m.name}</td>
                        <td class="p-4 text-emerald-400">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-16 p-1 text-center" oninput="updateEdge('${m.id}', ${m.prob})" id="odd_${m.id}"></td>
                        <td class="p-4 font-bold" id="edge_${m.id}">--</td>
                        <td class="p-4 text-center font-black text-bet-yellow" id="stake_${m.id}">--</td>
                    </tr>
                `;
            });
        }

        function updateEdge(id, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const edgeEl = document.getElementById('edge_' + id);
            const stakeEl = document.getElementById('stake_' + id);

            if(odd > 1) {
                const edge = (odd * prob) - 1;
                edgeEl.innerText = (edge * 100).toFixed(1) + "%";
                edgeEl.className = edge > 0 ? "p-4 value-positive" : "p-4 value-negative";
                
                if(edge > 0) {
                    const kelly = (prob - (1 - prob)/(odd - 1)) * 0.1; // Kelly fraccionado al 10%
                    stakeEl.innerText = Math.max(0, kelly * 100).toFixed(2) + "%";
                } else {
                    stakeEl.innerText = "0%";
                }
            }
        }

        function updateAssistant(p_over, p_btts) {
            const box = document.getElementById('strategy-assistant-box');
            const text = document.getElementById('strategy-text');
            const signal = document.getElementById('strategy-signal');
            box.classList.remove('hidden');

            if(p_over > 0.60 && p_btts > 0.55) {
                text.innerText = "ALTO VALOR EN OVER + BTTS SÍ. AMBOS EQUIPOS TIENEN FUERZA DE ATAQUE SUPERIOR.";
                signal.innerText = "🚀";
            } else if (p_over < 0.40 && p_btts < 0.45) {
                text.innerText = "PARTIDO CERRADO (UNDER/BTTS NO). LAS DEFENSAS DOMINAN EL MODELO.";
                signal.innerText = "🛡️";
            } else {
                text.innerText = "MERCADOS EQUILIBRADOS. BUSCAR VALUE EN CUOTAS MAYORES A 2.00.";
                signal.innerText = "⚖️";
            }
        }

        function renderChart(h, a) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['0', '1', '2', '3', '4', '5+'],
                    datasets: [
                        { label: 'Local', data: h, backgroundColor: '#3b82f6' },
                        { label: 'Visitante', data: a, backgroundColor: '#f97316' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>

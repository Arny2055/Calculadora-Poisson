<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Calculadora Poisson Córners - Multi-Liga</title>
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--secondary); }
        
        /* Sección de Carga de Datos */
        .admin-section { background: #ebf5fb; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #d4e6f1; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; resize: vertical; font-family: monospace; font-size: 12px; box-sizing: border-box; }
        .full-width { grid-column: 1 / span 2; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* Selectores */
        .selector-group { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; padding: 15px; background: #eee; border-radius: 8px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 15px; cursor: pointer; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .btn-save { background-color: var(--secondary); }
        .btn-calc { font-size: 18px; margin-top: 10px; }

        /* Resultados */
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .over-under-card { grid-column: 1 / span 2; background: #fff; }
        
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .highlight { color: var(--primary); font-weight: bold; }
        .delete-link { color: #e74c3c; cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Poisson Corners Manager</h1>

    <div class="admin-section">
        <h2>Configurar Nueva Liga</h2>
        <input type="text" id="leagueName" placeholder="Nombre de la Liga (Ej: La Liga 2026)">
        <div class="grid-inputs">
            <div class="field">
                <label>Tabla Local (Home):</label>
                <textarea id="rawHome" placeholder="Pega aquí la tabla de corners local..."></textarea>
            </div>
            <div class="field">
                <label>Tabla Visitante (Away):</label>
                <textarea id="rawAway" placeholder="Pega aquí la tabla de corners visitante..."></textarea>
            </div>
        </div>
        <button class="btn-save" onclick="saveLeague()">💾 Guardar Liga</button>
        <div id="leagueList"></div>
    </div>

    <div class="selector-group">
        <div class="field">
            <label>Seleccionar Liga:</label>
            <select id="selectLeague" onchange="loadTeams()"></select>
        </div>
        <div class="field">
            <label>Local:</label>
            <select id="homeTeam"></select>
        </div>
        <div class="field">
            <label>Visitante:</label>
            <select id="awayTeam"></select>
        </div>
    </div>
    <button class="btn-calc" style="width:100%" onclick="calculate()">🚀 CALCULAR PRONÓSTICO</button>

    <div id="output" style="display:none;">
        <div class="results-grid">
            <div class="card over-under-card">
                <h3>📈 Probabilidades Over / Under (Totales)</h3>
                <table id="ouTable">
                    <thead>
                        <tr><th>Línea</th><th>Over (Más de)</th><th>Under (Menos de)</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <h3>Casa: <span id="labelHome"></span></h3>
                <table id="homeProbTable">
                    <thead><tr><th>Córners</th><th>%</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <h3>Fuera: <span id="labelAway"></span></h3>
                <table id="awayProbTable">
                    <thead><tr><th>Córners</th><th>%</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let leagues = JSON.parse(localStorage.getItem('cornerLeagues')) || {};

// Al iniciar, cargar ligas guardadas
window.onload = () => { updateLeagueSelectors(); };

function parseTable(text) {
    const lines = text.trim().split('\n');
    const data = {};
    lines.forEach(line => {
        // Regex para capturar nombre de equipo y las 3 columnas numéricas (GP, For, Against)
        // Se adapta a tabs o múltiples espacios
        const parts = line.split(/\t| {2,}/);
        if (parts.length >= 4) {
            const name = parts[0].trim();
            const forC = parseFloat(parts[2]);
            const agC = parseFloat(parts[3]);
            if (!isNaN(forC)) data[name] = { for: forC, ag: agC };
        }
    });
    return data;
}

function saveLeague() {
    const name = document.getElementById('leagueName').value;
    const homeRaw = document.getElementById('rawHome').value;
    const awayRaw = document.getElementById('rawAway').value;

    if (!name || !homeRaw || !awayRaw) return alert("Completa todos los campos");

    const homeData = parseTable(homeRaw);
    const awayData = parseTable(awayRaw);

    if (Object.keys(homeData).length === 0) return alert("Error al leer la tabla local. Verifica el formato.");

    leagues[name] = { home: homeData, away: awayData };
    localStorage.setItem('cornerLeagues', JSON.stringify(leagues));
    
    alert("Liga guardada con éxito");
    document.getElementById('leagueName').value = '';
    document.getElementById('rawHome').value = '';
    document.getElementById('rawAway').value = '';
    updateLeagueSelectors();
}

function updateLeagueSelectors() {
    const select = document.getElementById('selectLeague');
    select.innerHTML = '<option value="">-- Selecciona Liga --</option>';
    Object.keys(leagues).forEach(l => {
        select.add(new Option(l, l));
    });
}

function loadTeams() {
    const leagueName = document.getElementById('selectLeague').value;
    const hSelect = document.getElementById('homeTeam');
    const aSelect = document.getElementById('awayTeam');
    hSelect.innerHTML = ''; aSelect.innerHTML = '';
    
    if (!leagueName) return;

    const teams = Object.keys(leagues[leagueName].home).sort();
    teams.forEach(t => {
        hSelect.add(new Option(t, t));
        aSelect.add(new Option(t, t));
    });
}

function factorial(n) {
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}

function calculate() {
    const leagueName = document.getElementById('selectLeague').value;
    const hName = document.getElementById('homeTeam').value;
    const aName = document.getElementById('awayTeam').value;

    if (!leagueName || !hName || !aName) return alert("Selecciona liga y equipos");

    const league = leagues[leagueName];
    
    // Calcular Promedios de esta liga específica
    let hForSum = 0, hAgSum = 0, aForSum = 0, aAgSum = 0;
    const teams = Object.keys(league.home);
    teams.forEach(t => {
        hForSum += league.home[t].for;
        hAgSum += league.home[t].ag;
        aForSum += league.away[t].for;
        aAgSum += league.away[t].ag;
    });
    const avg = {
        hFor: hForSum / teams.length,
        hAg: hAgSum / teams.length,
        aFor: aForSum / teams.length,
        aAg: aAgSum / teams.length
    };

    // Calcular Lambdas (Expectativa)
    const lambdaHome = (league.home[hName].for / avg.hFor) * (league.away[aName].ag / avg.aAg) * avg.hFor;
    const lambdaAway = (league.away[aName].for / avg.aFor) * (league.home[hName].ag / avg.hAg) * avg.aFor;

    renderTables(lambdaHome, lambdaAway, hName, aName);
}

function renderTables(lH, lA, hName, aName) {
    document.getElementById('output').style.display = 'block';
    document.getElementById('labelHome').innerText = hName;
    document.getElementById('labelAway').innerText = aName;

    const hBody = document.querySelector('#homeProbTable tbody');
    const aBody = document.querySelector('#awayProbTable tbody');
    hBody.innerHTML = ''; aBody.innerHTML = '';

    let probsHome = [], probsAway = [];

    for (let i = 0; i <= 30; i++) {
        const p1 = poisson(i, lH);
        const p2 = poisson(i, lA);
        probsHome.push(p1);
        probsAway.push(p2);

        if (i <= 15) { // Mostrar solo hasta 15 en tabla individual para no saturar
            hBody.innerHTML += `<tr><td>${i}</td><td>${(p1 * 100).toFixed(2)}%</td></tr>`;
            aBody.innerHTML += `<tr><td>${i}</td><td>${(p2 * 100).toFixed(2)}%</td></tr>`;
        }
    }

    // Calcular Over/Under Totales
    // La suma de dos variables Poisson independientes es una Poisson con lambda = lH + lA
    const totalLambda = lH + lA;
    const ouBody = document.querySelector('#ouTable tbody');
    ouBody.innerHTML = '';

    const lines = [5.5, 6.5, 7.5, 8.5, 9.5, 10.5, 11.5];
    lines.forEach(line => {
        let probUnder = 0;
        for (let i = 0; i < line; i++) {
            probUnder += poisson(i, totalLambda);
        }
        let probOver = 1 - probUnder;
        
        ouBody.innerHTML += `
            <tr>
                <td><strong>${line}</strong></td>
                <td class="${probOver > 0.6 ? 'highlight' : ''}">${(probOver * 100).toFixed(2)}%</td>
                <td class="${probUnder > 0.6 ? 'highlight' : ''}">${(probUnder * 100).toFixed(2)}%</td>
            </tr>
        `;
    });
}

function deleteLeague() {
    // Función extra si quieres borrar datos
    const leagueName = document.getElementById('selectLeague').value;
    if (confirm(`¿Borrar ${leagueName}?`)) {
        delete leagues[leagueName];
        localStorage.setItem('cornerLeagues', JSON.stringify(leagues));
        updateLeagueSelectors();
    }
}
</script>

</body>
</html>

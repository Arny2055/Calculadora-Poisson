<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - xG & Poisson Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-yellow: #fcc419;
            --accent-blue: #339af0;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); text-align: center; letter-spacing: 2px; font-weight: 900; margin-bottom: 5px; }
        h1 span { color: var(--accent-yellow); }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 25px; display: block; }

        .section-title { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        textarea { width: 100%; height: 120px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #51cf66; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; resize: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        select, input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; background: #0b0e14; color: white; border: 1px solid var(--border); outline: none; cursor: pointer; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; background: linear-gradient(135deg, #4dabf7, #228be6); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reset { background: linear-gradient(135deg, #343a40, #212529); color: #adb5bd; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(77, 171, 247, 0.4); }
        .btn-reset:hover { background: #c92a2a; color: white; border-color: #c92a2a; }

        .xg-display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .xg-box { background: rgba(77, 171, 247, 0.05); border: 1px solid var(--primary); border-radius: 12px; padding: 15px; text-align: center; }
        .xg-box label { font-size: 0.65rem; color: var(--primary); font-weight: 800; display: block; margin-bottom: 5px; }
        .xg-box .val { font-size: 1.8rem; font-weight: 900; color: var(--text-white); }
        
        .delta-badge { font-size: 0.7rem; padding: 5px; border-radius: 6px; font-weight: bold; background: #0b0e14; border: 1px solid var(--border); margin-top: 5px; display: inline-block; }
        .delta-pos { color: var(--accent-green); border-color: var(--accent-green); }
        .delta-neg { color: var(--accent-red); border-color: var(--accent-red); }

        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-item label { font-size: 0.6rem; color: var(--text-muted); display: block; }
        .stat-item b { color: var(--accent-yellow); font-size: 0.9rem; }

        #results { display: none; }
        .prob-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .prob-box { background: var(--bg-dark); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .prob-box:hover { border-color: var(--primary); }
        .prob-box span { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .prob-box .val { font-size: 1.3rem; font-weight: 900; color: var(--accent-green); display: block; margin-top: 5px; }
        
        .value-check-container { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed var(--border); }
        .value-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; align-items: end; }
        .value-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-top: 10px; }
        .has-value { background: var(--accent-green); color: black; }
        .no-value { background: var(--accent-red); color: white; }

        .chart-container { height: 250px; margin-top: 25px; }
        .market-highlight { border: 1px solid var(--accent-blue); background: rgba(51, 154, 240, 0.05); }

        .insight-box { margin-top: 15px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 0.75rem; line-height: 1.4; color: var(--text-muted); border-left: 4px solid var(--primary); }
        .insight-box b { color: var(--text-white); }
        .efficiency-tag { font-size: 0.6rem; text-transform: uppercase; color: var(--accent-yellow); font-weight: bold; display: block; margin-top: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> ENGINE PRO</h1>
    <span class="subtitle">Análisis Predictivo xG / G-SoT / Poisson Integrado</span>

    <div class="card">
        <div class="section-title"><span>📂</span> 1. CARGAR DATOS (xG, Goles, xG/T)</div>
        <textarea id="homeTableInput" placeholder="Pega aquí la tabla avanzada..." oninput="saveToStorage()"></textarea>
        
        <div class="btn-group">
            <button class="btn" onclick="parseTables()">1. ANALIZAR PODERÍO OFENSIVO</button>
            <button class="btn btn-reset" onclick="clearData()">LIMPIAR</button>
        </div>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="section-title"><span>⚔️</span> 2. CONFIGURAR ENFRENTAMIENTO</div>
        <div class="selector-grid">
            <div>
                <label>EQUIPO LOCAL</label>
                <select id="selectHome"></select>
            </div>
            <div>
                <label>EQUIPO VISITANTE</label>
                <select id="selectAway"></select>
            </div>
        </div>
        
        <div class="value-check-container">
            <div class="section-title"><span>💰</span> COMPARADOR DE CUOTAS</div>
            <div class="value-grid">
                <div>
                    <label style="font-size: 0.7rem; color: var(--text-muted);">MERCADO</label>
                    <select id="valueMarket">
                        <option value="winL">Gana Local</option>
                        <option value="draw">Empate</option>
                        <option value="winV">Gana Visita</option>
                        <option value="o25">Over 2.5</option>
                        <option value="u25">Under 2.5</option>
                        <option value="btts">Ambos Marcan</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.7rem; color: var(--text-muted);">CUOTA BOOKIE</label>
                    <input type="number" id="bookieOdd" step="0.01" placeholder="Ej: 2.10">
                </div>
            </div>
        </div>

        <button class="btn" style="background: var(--accent-green); color: black; width: 100%; margin-top: 20px;" onclick="calculatePoisson()">2. EJECUTAR POISSON AVANZADO</button>
    </div>

    <div id="results" class="card">
        <div class="section-title"><span>📊</span> PANEL DE PREDICCIÓN FINAL</div>
        <div id="matchTitle" style="text-align: center; font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; color: var(--primary);"></div>
        
        <div class="xg-display-grid">
            <div class="xg-box">
                <label id="nameL_label">EXPECTATIVA REAL</label>
                <div class="val" id="val_xgL">0.00</div>
                <div id="deltaL_badge" class="delta-badge">ΔxG: 0.00</div>
                <span id="effL" class="efficiency-tag"></span>
            </div>
            <div class="xg-box">
                <label id="nameV_label">EXPECTATIVA REAL</label>
                <div class="val" id="val_xgV">0.00</div>
                <div id="deltaV_badge" class="delta-badge">ΔxG: 0.00</div>
                <span id="effV" class="efficiency-tag"></span>
            </div>
        </div>

        <div class="insight-box" id="deltaInsight"></div>

        <div class="prob-card">
            <div class="prob-box" id="box_winL"><span>Local</span><span class="val" id="pWinL">0%</span></div>
            <div class="prob-box" id="box_draw"><span>Empate</span><span class="val" id="pDraw">0%</span></div>
            <div class="prob-box" id="box_winV"><span>Visita</span><span class="val" id="pWinV">0%</span></div>
        </div>

        <div class="prob-card">
            <div class="prob-box" id="box_o25"><span>Over 2.5</span><span class="val" id="pO25">0%</span></div>
            <div class="prob-box" id="box_btts"><span>Ambos Marcan</span><span class="val" id="pBTTS">0%</span></div>
            <div class="prob-box" id="box_u25"><span>Under 2.5</span><span class="val" id="pU25">0%</span></div>
        </div>

        <div id="valueAnalysisResult" style="text-align: center; margin-top: 15px; display: none;">
            <div id="valueBadge" class="value-badge"></div>
            <p id="valueDetail" style="font-size: 0.8rem; margin-top: 5px; color: var(--text-muted);"></p>
        </div>

        <div class="chart-container">
            <canvas id="poissonChart"></canvas>
        </div>
    </div>
</div>

<script>
let masterData = [];
let chartInstance = null;
let currentProbs = {};

window.onload = function() {
    if(localStorage.getItem('betags_data')) {
        document.getElementById('homeTableInput').value = localStorage.getItem('betags_data');
    }
};

function saveToStorage() {
    localStorage.setItem('betags_data', document.getElementById('homeTableInput').value);
}

function clearData() {
    localStorage.clear();
    location.reload();
}

function parseTables() {
    const input = document.getElementById('homeTableInput').value;
    const lines = input.trim().split('\n');
    masterData = [];

    lines.forEach(line => {
        const p = line.trim().split(/\t|\s\s+/);
        if (p.length >= 6) {
            // Intentamos mapear las columnas según tu tabla:
            // 0:Nombre, 1:xG, 2:Goles, 3:xGDif, 4:Tiros, 5:xG/T
            const name = p[0].replace(/^\d+\.\s*/, "").trim();
            const xG = parseFloat(p[1]);
            const goles = parseFloat(p[2]);
            const xGDif = parseFloat(p[3]);
            const tiros = parseFloat(p[4]);
            const xGTiros = parseFloat(p[5]);

            if(!isNaN(xG)) {
                masterData.push({
                    name, xG, goles, xGDif, tiros, xGTiros,
                    avgXG: xG / 19, // Asumiendo 19 partidos si no hay GP
                    avgG: goles / 19
                });
            }
        }
    });

    if(masterData.length === 0) {
        alert("Formato no reconocido. Asegúrate de copiar las columnas: Equipo, xG, Goles, xGDif, Tiros, xG/Tiros");
        return;
    }

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";
    masterData.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
        sH.add(new Option(t.name, t.name));
        sV.add(new Option(t.name, t.name));
    });

    document.getElementById('selectionArea').style.display = 'block';
}

function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poisson(k, l) { return (Math.exp(-l) * Math.pow(l, k)) / factorial(k); }

function calculatePoisson() {
    const home = masterData.find(t => t.name === document.getElementById('selectHome').value);
    const away = masterData.find(t => t.name === document.getElementById('selectAway').value);

    // LÓGICA BETA-GS PRO:
    // 1. Lambda Base basada en xG (lo que genera el equipo realmente)
    let lambdaL = home.avgXG; 
    let lambdaV = away.avgXG;

    // 2. Ajuste por Regresión a la Media (xGDif)
    // Si un equipo tiene xGDif negativo ( Palace -14), sumamos el 10% de esa deuda al lambda
    if(home.xGDif < 0) lambdaL += (Math.abs(home.xGDif) / 19) * 0.2;
    if(away.xGDif < 0) lambdaV += (Math.abs(away.xGDif) / 19) * 0.2;

    // 3. Ajuste por Calidad de Tiro (xG/Tiros)
    // El promedio es 0.11. Si es superior, multiplicamos el lambda por el ratio de calidad.
    const qualityFactorL = home.xGTiros / 0.11;
    const qualityFactorV = away.xGTiros / 0.11;
    lambdaL *= (0.8 + (qualityFactorL * 0.2));
    lambdaV *= (0.8 + (qualityFactorV * 0.2));

    // UI Updates
    document.getElementById('val_xgL').innerText = lambdaL.toFixed(2);
    document.getElementById('val_xgV').innerText = lambdaV.toFixed(2);
    document.getElementById('deltaL_badge').innerText = `ΔxG: ${home.xGDif.toFixed(1)}`;
    document.getElementById('deltaV_badge').innerText = `ΔxG: ${away.xGDif.toFixed(1)}`;
    document.getElementById('effL').innerText = `Calidad: ${home.xGTiros}`;
    document.getElementById('effV').innerText = `Calidad: ${away.xGTiros}`;

    // Probabilidades
    let pL = 0, pV = 0, pX = 0, pO25 = 0, pBTTS = 0;
    let probL = [], probV = [];
    for(let i=0; i<=10; i++) {
        probL[i] = poisson(i, lambdaL);
        probV[i] = poisson(i, lambdaV);
    }

    for(let i=0; i<=10; i++) {
        for(let j=0; j<=10; j++) {
            let p = probL[i] * probV[j];
            if(i > j) pL += p; else if(i < j) pV += p; else pX += p;
            if(i + j > 2.5) pO25 += p;
            if(i > 0 && j > 0) pBTTS += p;
        }
    }

    currentProbs = { winL: pL, draw: pX, winV: pV, o25: pO25, u25: 1-pO25, btts: pBTTS };

    document.getElementById('pWinL').innerText = (pL*100).toFixed(1) + "%";
    document.getElementById('pWinV').innerText = (pV*100).toFixed(1) + "%";
    document.getElementById('pDraw').innerText = (pX*100).toFixed(1) + "%";
    document.getElementById('pO25').innerText = (pO25*100).toFixed(1) + "%";
    document.getElementById('pU25').innerText = ((1-pO25)*100).toFixed(1) + "%";
    document.getElementById('pBTTS').innerText = (pBTTS*100).toFixed(1) + "%";

    // Insights
    let insight = `<b>Estrategia:</b> `;
    if(home.xGDif < -5) insight += `El <b>${home.name}</b> tiene una deuda de goles masiva; el modelo predice que romperá su sequía. `;
    if(home.xGTiros > 0.14) insight += `Ojo: <b>${home.name}</b> es quirúrgico (pocas llegadas, mucho peligro). `;
    document.getElementById('deltaInsight').innerHTML = insight;

    checkValue();
    document.getElementById('results').style.display = 'block';
    renderChart(probL.slice(0,6), probV.slice(0,6));
}

function checkValue() {
    const odd = parseFloat(document.getElementById('bookieOdd').value);
    const market = document.getElementById('valueMarket').value;
    const analysisArea = document.getElementById('valueAnalysisResult');
    if (isNaN(odd) || odd <= 1) { analysisArea.style.display = 'none'; return; }

    const prob = currentProbs[market];
    const value = (prob * odd) - 1;
    analysisArea.style.display = 'block';
    const badge = document.getElementById('valueBadge');
    
    if (value > 0.05) {
        badge.innerText = `VALOR DETECTADO: +${(value*100).toFixed(1)}%`;
        badge.className = "value-badge has-value";
    } else {
        badge.innerText = `SIN VALOR`;
        badge.className = "value-badge no-value";
    }
}

function renderChart(l, v) {
    const ctx = document.getElementById('poissonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0', '1', '2', '3', '4', '5'],
            datasets: [
                { label: 'Local', data: l, backgroundColor: '#4dabf7' },
                { label: 'Visita', data: v, backgroundColor: '#fcc419' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
</script>
</body>
</html>

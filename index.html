<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - Minute-by-Minute Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-yellow: #fcc419;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --text-white: #e9ecef;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        h1 { text-align: center; color: var(--primary); letter-spacing: 2px; }
        h1 span { color: var(--accent-yellow); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; height: 150px; background: #0b0e14; color: var(--accent-green); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: #339af0; }
        .btn-save { background: var(--accent-yellow); color: #000; margin-top: 5px; font-size: 0.8rem; padding: 10px; }

        .league-manager { margin-bottom: 15px; display: flex; gap: 10px; align-items: flex-end; }
        .league-manager div { flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-box label { font-size: 0.6rem; color: var(--accent-yellow); display: block; }
        .stat-box .val { font-size: 1rem; font-weight: bold; }

        .heat-map { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .heat-cell { padding: 15px 5px; text-align: center; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: black; }

        .selector-area { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select { width: 100%; padding: 12px; background: #0b0e14; color: white; border: 1px solid var(--border); border-radius: 8px; }

        .result-panel { display: none; margin-top: 20px; }
        .chart-container { height: 300px; margin-top: 20px; }
        
        .prediction-badge { background: rgba(81, 207, 102, 0.1); border: 1px solid var(--accent-green); padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> MINUTE LAB</h1>
    
    <div class="card">
        <div class="league-manager">
            <div>
                <label style="font-size: 0.8rem; color: var(--primary);">NOMBRE DE LA LIGA / ARCHIVO</label>
                <input type="text" id="leagueName" placeholder="Ej: Premier League 2024" style="width:100%; padding:10px; background:#0b0e14; border:1px solid var(--border); color:white; border-radius:8px; box-sizing:border-box;">
            </div>
            <div style="flex-grow: 0;">
                <label style="font-size: 0.8rem; color: var(--primary);">LIGAS GUARDADAS</label>
                <select id="savedLeagues" onchange="loadSelectedLeague()" style="padding:9px;"></select>
            </div>
        </div>

        <div class="grid-inputs">
            <div>
                <label>DATOS LOCAL (15 MIN)</label>
                <textarea id="localData" placeholder="Pega la tabla de locales aquí..."></textarea>
            </div>
            <div>
                <label>DATOS VISITA (15 MIN)</label>
                <textarea id="visitaData" placeholder="Pega la tabla de visitantes aquí..."></textarea>
            </div>
        </div>
        <button class="btn btn-calc" onclick="processTables()">PROCESAR DATOS POR MINUTOS</button>
        <button class="btn btn-save" onclick="saveLeague()">💾 GUARDAR ESTA LIGA</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="selector-area">
            <div><label>LOCAL</label><select id="selectHome"></select></div>
            <div><label>VISITANTE</label><select id="selectAway"></select></div>
        </div>
        <button class="btn btn-calc" style="background: var(--accent-green);" onclick="analyzeMatch()">ANALIZAR ENCUENTRO POR TRAMOS</button>
    </div>

    <div id="results" class="result-panel">
        <div class="card">
            <h3 id="matchTitle" style="text-align: center; margin-top: 0;"></h3>
            
            <div class="section-title">🔥 PROBABILIDAD DE GOL POR TRAMO (CRUZADA)</div>
            <div class="heat-map" id="heatMap"></div>

            <div class="prediction-badge">
                <div style="font-size: 0.8rem; color: var(--accent-green);">PROYECCIÓN FINAL XG</div>
                <div id="finalXg" style="font-size: 2.5rem; font-weight: 900;">0.00</div>
                <div id="topTramo" style="font-size: 0.75rem; margin-top: 5px;"></div>
            </div>

            <div class="chart-container">
                <canvas id="minuteChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let database = { home: {}, away: {} };
let myChart = null;

// Cargar lista de ligas al iniciar
window.onload = function() {
    updateLeagueList();
};

function parseMinuteData(text) {
    if(!text) return {};
    const lines = text.trim().split('\n');
    const result = {};
    lines.forEach(line => {
        const parts = line.split(/\t|\s{2,}/);
        if (parts.length >= 7) {
            const name = parts[0].trim();
            const intervals = parts.slice(1, 7).map(item => {
                const [g, r] = item.split('-').map(Number);
                return { g: g || 0, r: r || 0 };
            });
            result[name] = intervals;
        }
    });
    return result;
}

function processTables() {
    const localRaw = document.getElementById('localData').value;
    const visitaRaw = document.getElementById('visitaData').value;

    database.home = parseMinuteData(localRaw);
    database.away = parseMinuteData(visitaRaw);

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";

    const homeTeams = Object.keys(database.home).sort();
    const awayTeams = Object.keys(database.away).sort();

    if(homeTeams.length === 0 || awayTeams.length === 0) {
        alert("Asegúrate de pegar los datos correctamente.");
        return;
    }

    homeTeams.forEach(n => sH.add(new Option(n, n)));
    awayTeams.forEach(n => sV.add(new Option(n, n)));

    document.getElementById('selectionArea').style.display = 'block';
}

function saveLeague() {
    const name = document.getElementById('leagueName').value.trim();
    if(!name) { alert("Ponle un nombre a la liga para guardar."); return; }

    const leagueData = {
        name: name,
        localRaw: document.getElementById('localData').value,
        visitaRaw: document.getElementById('visitaData').value
    };

    localStorage.setItem('league_' + name, JSON.stringify(leagueData));
    updateLeagueList();
    alert("Liga '" + name + "' guardada con éxito.");
}

function updateLeagueList() {
    const selector = document.getElementById('savedLeagues');
    selector.innerHTML = '<option value="">-- Seleccionar --</option>';
    
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('league_')) {
            const name = key.replace('league_', '');
            selector.add(new Option(name, key));
        }
    }
}

function loadSelectedLeague() {
    const key = document.getElementById('savedLeagues').value;
    if(!key) return;

    const data = JSON.parse(localStorage.getItem(key));
    document.getElementById('leagueName').value = data.name;
    document.getElementById('localData').value = data.localRaw;
    document.getElementById('visitaData').value = data.visitaRaw;
    
    processTables();
}

function factorial(n) {
    if (n === 0) return 1;
    let r = 1; for(let i=2; i<=n; i++) r *= i;
    return r;
}

function analyzeMatch() {
    const homeName = document.getElementById('selectHome').value;
    const awayName = document.getElementById('selectAway').value;
    
    const hStats = database.home[homeName];
    const vStats = database.away[awayName];

    if (!hStats || !vStats) return;

    let xG_Timeline = [];
    let prob_Timeline = [];
    let totalXG = 0;
    const labels = ["0-15'", "16-30'", "31-45'", "46-60'", "61-75'", "76-90'"];

    const heatMap = document.getElementById('heatMap');
    heatMap.innerHTML = "";

    labels.forEach((label, i) => {
        const expL = (hStats[i].g + vStats[i].r) / 2;
        const expV = (vStats[i].g + hStats[i].r) / 2;
        const combinedXG = expL + expV;
        
        totalXG += combinedXG;
        xG_Timeline.push(combinedXG.toFixed(2));

        const probNoGoal = Math.exp(-combinedXG);
        const probGoal = (1 - probNoGoal) * 100;
        prob_Timeline.push(probGoal.toFixed(1));

        const cell = document.createElement('div');
        cell.className = 'heat-cell';
        cell.innerHTML = `${label}<br>${probGoal.toFixed(0)}%`;
        
        const alpha = Math.min(probGoal / 100 + 0.2, 1);
        cell.style.background = `rgba(81, 207, 102, ${alpha})`;
        heatMap.appendChild(cell);
    });

    document.getElementById('matchTitle').innerText = `${homeName} vs ${awayName}`;
    document.getElementById('finalXg').innerText = (totalXG/6).toFixed(2);
    
    const maxIndex = prob_Timeline.indexOf(Math.max(...prob_Timeline).toFixed(1));
    document.getElementById('topTramo').innerText = `TRAMO MÁS PELIGROSO: ${labels[maxIndex]} con ${prob_Timeline[maxIndex]}% de prob. de gol.`;

    renderChart(labels, xG_Timeline);
    document.getElementById('results').style.display = 'block';
}

function renderChart(labels, data) {
    const ctx = document.getElementById('minuteChart').getContext('2d');
    if (myChart) myChart.destroy();

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Intensidad de Goles (xG Cruzado)',
                data: data,
                borderColor: '#4dabf7',
                backgroundColor: 'rgba(77, 171, 247, 0.2)',
                fill: true,
                tension: 0.4,
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, grid: { color: '#2c3440' } },
                x: { grid: { display: false } }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Poisson Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; --gold-value: #ffd700; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; font-size: 0.8rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        .matrix-cell { padding: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 9px; border-radius: 4px; }
        .value-positive { color: #00ff88; font-weight: bold; }
        .value-negative { color: #ff4444; }
        
        /* Efecto Oro para el Edge Maestro */
        .gold-value-row { 
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.05), rgba(255, 215, 0, 0.15)) !important; 
            border-left: 4px solid var(--gold-value) !important;
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.05);
        }
        .gold-badge {
            background: var(--gold-value);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            margin-left: 8px;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">POISSON ELITE</span>
            </h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1">
                <a href="index.html" class="px-4 py-2 rounded-lg text-xs font-bold bg-slate-700 text-bet-yellow">POISSON</a>
                <a href="roi.html" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white">ROI LAB</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>ASISTENTE DE ESTRATEGIA</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Esperando datos...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-5 rounded-2xl">
                    <h2 class="text-xs font-bold text-bet-yellow uppercase mb-3"><i class="fa-solid fa-pen-to-square mr-2"></i>Identificación</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="league_name" placeholder="Liga" class="p-2 uppercase font-bold text-emerald-400">
                        <input type="text" id="event_name" placeholder="Evento" class="p-2 uppercase font-bold text-emerald-400">
                    </div>
                </div>

                <div class="glass-card p-5 rounded-2xl border-l-4 border-blue-500">
                    <h2 class="text-xs font-bold text-blue-400 uppercase mb-3"><i class="fa-solid fa-globe mr-2"></i>Promedios Liga</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[8px] text-slate-500 font-bold uppercase">Goles Local Prom.</label>
                            <input type="number" id="l_avg_h" step="0.01" class="w-full p-2" value="1.78">
                        </div>
                        <div>
                            <label class="text-[8px] text-slate-500 font-bold uppercase">Goles Visita Prom.</label>
                            <input type="number" id="l_avg_a" step="0.01" class="w-full p-2" value="1.25">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-5 rounded-2xl border-l-4 border-emerald-500">
                    <h2 class="text-xs font-bold text-emerald-400 uppercase mb-3"><i class="fa-solid fa-chart-simple mr-2"></i>Estadísticas Equipos</h2>
                    <div class="space-y-3">
                        <div class="bg-slate-800/40 p-3 rounded-lg">
                            <p class="text-[9px] font-black text-blue-400 mb-1 uppercase">Local (Home)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="h_gf" step="0.01" class="p-2" placeholder="G. Marcados">
                                <input type="number" id="h_ga" step="0.01" class="p-2" placeholder="G. Recibidos">
                            </div>
                        </div>
                        <div class="bg-slate-800/40 p-3 rounded-lg">
                            <p class="text-[9px] font-black text-orange-400 mb-1 uppercase">Visitante (Away)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="a_gf" step="0.01" class="p-2" placeholder="G. Marcados">
                                <input type="number" id="a_ga" step="0.01" class="p-2" placeholder="G. Recibidos">
                            </div>
                        </div>
                        <button onclick="calculatePoisson()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg">Calcular Poisson</button>
                        <button onclick="clearFields()" class="w-full bg-slate-800 hover:bg-red-900/30 py-2 rounded-xl font-black text-[9px] text-slate-500 uppercase transition-all border border-slate-700 border-dashed">
                            Limpiar Partidos
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl h-[250px]">
                        <canvas id="poissonChart"></canvas>
                    </div>
                    <div class="glass-card p-4 rounded-2xl overflow-y-auto max-h-[250px] scroll-custom">
                        <h3 class="text-[9px] font-bold text-slate-500 uppercase mb-2">Matriz de Probabilidad Exacta</h3>
                        <div class="grid grid-cols-6 gap-1" id="score-matrix"></div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden border border-white/5">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900 text-[9px] text-slate-500 uppercase font-bold">
                            <tr>
                                <th class="p-4">Mercado Seleccionado</th>
                                <th class="p-4">Prob %</th>
                                <th class="p-4">C. Justa</th>
                                <th class="p-4">C. Casa</th>
                                <th class="p-4">Edge</th>
                                <th class="p-4">Stake</th>
                                <th class="p-4 text-center">ROI</th>
                            </tr>
                        </thead>
                        <tbody id="market-table" class="divide-y divide-slate-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pChart;
        const STORAGE_KEY = 'betags_v3_miner';

        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        function poissonProb(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function clearFields() {
            const fields = ['event_name', 'h_gf', 'h_ga', 'a_gf', 'a_ga'];
            fields.forEach(f => document.getElementById(f).value = '');
            document.getElementById('score-matrix').innerHTML = '';
            document.getElementById('market-table').innerHTML = '';
            document.getElementById('strategy-assistant-box').classList.add('hidden');
            if(pChart) { pChart.destroy(); pChart = null; }
        }

        function calculatePoisson() {
            const l_avg_h = parseFloat(document.getElementById('l_avg_h').value) || 1.78;
            const l_avg_a = parseFloat(document.getElementById('l_avg_a').value) || 1.25;
            const h_gf = parseFloat(document.getElementById('h_gf').value) || 0;
            const h_ga = parseFloat(document.getElementById('h_ga').value) || 0;
            const a_gf = parseFloat(document.getElementById('a_gf').value) || 0;
            const a_ga = parseFloat(document.getElementById('a_ga').value) || 0;

            const h_attack = h_gf / l_avg_h;
            const a_defense = a_ga / l_avg_h; 
            const a_attack = a_gf / l_avg_a;
            const h_defense = h_ga / l_avg_a;

            const lambda_h = h_attack * a_defense * l_avg_h;
            const lambda_a = a_attack * h_defense * l_avg_a;

            let p_h = [], p_a = [];
            for(let i=0; i<=5; i++) {
                p_h.push(poissonProb(i, lambda_h));
                p_a.push(poissonProb(i, lambda_a));
            }

            renderChart(p_h, p_a);
            processMarkets(p_h, p_a);
        }

        function processMarkets(p_h, p_a) {
            let p_over = 0, p_under = 0;
            const matrix = document.getElementById('score-matrix');
            matrix.innerHTML = '';

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    const prob = p_h[h] * p_a[a];
                    if(h + a > 2.5) p_over += prob;
                    if(h + a < 2.5) p_under += prob;

                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 4})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob*100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }

            const p_btts_yes = (1 - p_h[0]) * (1 - p_a[0]);
            const markets = [
                { id: 'o25', name: 'OVER 2.5 GOLES', prob: p_over },
                { id: 'u25', name: 'UNDER 2.5 GOLES', prob: p_under },
                { id: 'by', name: 'BTTS (SÍ)', prob: p_btts_yes },
                { id: 'bn', name: 'BTTS (NO)', prob: 1 - p_btts_yes }
            ];

            const tbody = document.getElementById('market-table');
            tbody.innerHTML = '';
            markets.forEach(m => {
                const fair = (1 / m.prob).toFixed(2);
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40 transition-all duration-500" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-300 flex items-center">
                            <span id="name_${m.id}">${m.name}</span>
                        </td>
                        <td class="p-4 text-emerald-400 font-bold">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-16 p-1 text-center font-bold" oninput="updateEdge('${m.id}', ${m.prob})" id="odd_${m.id}"></td>
                        <td class="p-4 font-black" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center">
                            <button onclick="sendToROI('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600 hover:bg-emerald-500 text-[9px] px-3 py-2 rounded font-black uppercase transition-all">ROI</button>
                        </td>
                    </tr>
                `;
            });
            updateAssistant(p_over, p_btts_yes);
        }

        function updateEdge(id, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const edgeEl = document.getElementById('edge_' + id);
            const stakeEl = document.getElementById('stake_' + id);
            const rowEl = document.getElementById('row_' + id);
            const nameEl = document.getElementById('name_' + id);

            if(odd > 1) {
                const edge = (odd * prob) - 1;
                const edgePercent = (edge * 100).toFixed(1);
                edgeEl.innerText = edgePercent + "%";
                
                // LÓGICA VALOR ORO (8% a 15%)
                if (edgePercent >= 8.0 && edgePercent <= 15.0) {
                    rowEl.classList.add('gold-value-row');
                    if (!nameEl.querySelector('.gold-badge')) {
                        nameEl.innerHTML += `<span class="gold-badge">VALOR ORO</span>`;
                    }
                    edgeEl.style.color = "var(--gold-value)";
                } else {
                    rowEl.classList.remove('gold-value-row');
                    const badge = nameEl.querySelector('.gold-badge');
                    if(badge) badge.remove();
                    edgeEl.style.color = edge > 0 ? "#00ff88" : "#ff4444";
                }

                if(edge > 0) {
                    const kelly = (prob - (1 - prob)/(odd - 1)) * 0.125; 
                    stakeEl.innerText = Math.max(0, kelly * 100).toFixed(1) + "%";
                } else { stakeEl.innerText = "0%"; }
            }
        }

        function sendToROI(id, market, prob) {
            const league = document.getElementById('league_name').value.trim();
            const event = document.getElementById('event_name').value.trim();
            const odd = parseFloat(document.getElementById('odd_' + id).value);
            if(!league || !event || !odd) return alert("⚠️ Revisa Liga, Evento y Cuota.");

            const newBet = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                teams: `${league.toUpperCase()}: ${event.toUpperCase()}`,
                market: market,
                prob: prob,
                odd: odd,
                edge: document.getElementById('edge_' + id).innerText,
                stake: parseFloat(document.getElementById('stake_' + id).innerText) || 0,
                status: 'pending', profit: 0
            };

            let bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            bets.unshift(newBet);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));

            const btn = document.querySelector(`#row_${id} button`);
            btn.innerHTML = '✅';
            setTimeout(() => btn.innerHTML = 'ROI', 2000);
        }

        function updateAssistant(p_over, p_btts) {
            const box = document.getElementById('strategy-assistant-box');
            box.classList.remove('hidden');
            const text = document.getElementById('strategy-text');
            const signal = document.getElementById('strategy-signal');
            
            if(p_over > 0.65) { text.innerText = "ALTA PROBABILIDAD OVER 2.5."; signal.innerText = "⚽"; }
            else if (p_over < 0.35) { text.innerText = "TENDENCIA UNDER 2.5."; signal.innerText = "🛡️"; }
            else { text.innerText = "ANÁLISIS COMPLETADO. BUSCA EL VALOR ORO."; signal.innerText = "📊"; }
        }

        function renderChart(h, a) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['0','1','2','3','4','5+'],
                    datasets: [
                        { label: 'Local', data: h, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Visita', data: a, borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
        }
    </script>
</body>
</html>

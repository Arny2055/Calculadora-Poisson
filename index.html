<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETAGS - 1-x.mx Direct Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sl-dark: #020617;
            --sl-card: #0f172a;
            --sl-accent: #38bdf8;
            --sl-green: #22c55e;
            --sl-border: #1e293b;
        }
        
        body { 
            background-color: var(--sl-dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
        }

        .scorelab-card { 
            background: var(--sl-card); 
            border: 1px solid var(--sl-border); 
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .value-detected {
            border: 2px solid var(--sl-green) !important;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.05);
        }

        .btn-action {
            background: linear-gradient(to right, #2563eb, #0891b2);
            transition: all 0.3s;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* Indicador de Extensión CORS */
        .cors-check {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #450a0a;
            color: #fecaca;
            border: 1px solid #7f1d1d;
        }
        .cors-active {
            background: #064e3b;
            color: #d1fae5;
            border: 1px solid #065f46;
        }
    </style>
</head>
<body class="p-4">
    <nav class="container mx-auto flex justify-between items-center mb-8 bg-slate-900/50 p-4 rounded-xl border border-white/5">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-white tracking-tighter italic">BETA<span class="text-sky-400">GS</span></h1>
            <div id="cors_status" class="cors-check">
                <i class="fa-solid fa-shield-halved mr-1"></i> CORS UNBLOCK REQUIRED
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="fetch1XMx()" class="btn-action px-6 py-2 rounded-lg font-black text-xs uppercase tracking-widest">
                <i class="fa-solid fa-magnifying-glass-chart mr-2"></i> Escanear 1-x.mx
            </button>
        </div>
    </nav>

    <main class="container mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-4">
            <div class="scorelab-card p-5">
                <h3 class="text-[10px] font-black text-sky-400 uppercase mb-4 tracking-widest">Configuración Poisson</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[9px] text-slate-500 font-bold">LOCAL GF</label>
                            <input type="number" id="h_gf" value="1.75" step="0.1" class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-sm outline-none focus:border-sky-500">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-500 font-bold">LOCAL GC</label>
                            <input type="number" id="h_gc" value="1.10" step="0.1" class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-sm outline-none focus:border-sky-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[9px] text-slate-500 font-bold">VISITA GF</label>
                            <input type="number" id="a_gf" value="1.30" step="0.1" class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-sm outline-none focus:border-sky-500">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-500 font-bold">VISITA GC</label>
                            <input type="number" id="a_gc" value="1.50" step="0.1" class="w-full bg-slate-950 border border-slate-800 p-2 rounded text-sm outline-none focus:border-sky-500">
                        </div>
                    </div>
                    <p class="text-[8px] text-slate-500 italic">* Estos valores se usan para comparar contra las cuotas en vivo de 1-x.mx</p>
                </div>
            </div>

            <div class="scorelab-card p-4 h-40">
                <canvas id="miniChart"></canvas>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-black uppercase text-slate-400">Scanner de Cuotas Directo (1-x.mx)</h2>
                <span id="match_count" class="text-[10px] font-mono text-sky-500">0 partidos encontrados</span>
            </div>

            <div id="radar_grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-full border-2 border-dashed border-slate-800 rounded-2xl p-20 text-center">
                    <i class="fa-solid fa-tower-broadcast text-4xl text-slate-800 mb-4"></i>
                    <p class="text-slate-600 font-bold">Esperando señal de la API...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let poissonChart;

        // --- MOTOR DE CONEXIÓN DIRECTA ---
        async function fetch1XMx() {
            const corsBadge = document.getElementById('cors_status');
            const radar = document.getElementById('radar_grid');
            
            // Endpoint de Línea de Fútbol de 1xBet / 1-x.mx
            const api_url = "https://1-x.mx/LineFeed/Get1x2MS?sports=1&count=50&lng=es&mode=4&country=1";

            try {
                const res = await fetch(api_url);
                const data = await res.json();
                
                if(!data.Value) throw new Error("CORS_BLOCK");

                // Si llegamos aquí, la extensión CORS está funcionando
                corsBadge.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> CORS BYPASS ACTIVE';
                corsBadge.className = 'cors-check cors-active';
                
                processMatches(data.Value);

            } catch (e) {
                console.error(e);
                alert("⚠️ Error de CORS. Asegúrate de que la extensión 'CORS Unblock' esté instalada y ACTIVADA para 1-x.mx");
                corsBadge.className = 'cors-check';
                corsBadge.innerHTML = '<i class="fa-solid fa-warning mr-1"></i> CORS BLOCKED';
            }
        }

        function processMatches(events) {
            const radar = document.getElementById('radar_grid');
            radar.innerHTML = '';
            
            // Obtener valores de Poisson del usuario
            const hgf = parseFloat(document.getElementById('h_gf').value);
            const hgc = parseFloat(document.getElementById('h_gc').value);
            const agf = parseFloat(document.getElementById('a_gf').value);
            const agc = parseFloat(document.getElementById('a_gc').value);
            
            // Probabilidad de Poisson para W1 (Victoria Local)
            const probW1 = calculatePoissonProb(hgf, hgc, agf, agc);
            const fairOdd = 1 / probW1;

            events.forEach(m => {
                const oddW1 = m.E.find(e => e.T === 1)?.V || 0;
                const oddX  = m.E.find(e => e.T === 2)?.V || 0;
                const oddW2 = m.E.find(e => e.T === 3)?.V || 0;
                
                // CONDICIÓN DE VALUE: Si la cuota de la casa es mayor a nuestra cuota justa
                const edge = ((oddW1 / fairOdd) - 1) * 100;
                const isValue = edge > 5; // Más del 5% de ventaja

                const card = document.createElement('div');
                card.className = `scorelab-card p-4 hover:border-slate-600 ${isValue ? 'value-detected' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[8px] font-black text-slate-500 uppercase truncate max-w-[150px]">${m.LE}</span>
                        ${isValue ? '<span class="bg-green-600 text-[8px] px-2 py-0.5 rounded-full font-black animate-bounce">VALUE</span>' : ''}
                    </div>
                    <div class="font-bold text-sm mb-4">
                        <div class="flex justify-between"><span>${m.O1}</span> <span class="text-sky-400">${oddW1}</span></div>
                        <div class="flex justify-between text-slate-500 text-xs"><span>Empate</span> <span>${oddX}</span></div>
                        <div class="flex justify-between"><span>${m.O2}</span> <span class="text-sky-400">${oddW2}</span></div>
                    </div>
                    <div class="pt-3 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Edge Poisson</span>
                        <span class="text-xs font-mono font-black ${edge > 0 ? 'text-green-400' : 'text-red-400'}">${edge.toFixed(1)}%</span>
                    </div>
                `;
                radar.appendChild(card);
            });

            document.getElementById('match_count').innerText = `${events.length} eventos sincronizados`;
            updateMiniChart(hgf, hgc, agf, agc);
        }

        // --- MATEMÁTICAS POISSON ---
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function calculatePoissonProb(hgf, hgc, agf, agc) {
            const expH = (hgf + agc) / 2;
            const expA = (agf + hgc) / 2;
            let winL = 0;
            
            const distH = Array.from({length: 6}, (_, i) => poisson(i, expH));
            const distA = Array.from({length: 6}, (_, i) => poisson(i, expA));

            for(let i=0; i<6; i++) {
                for(let j=0; j<6; j++) {
                    if(i > j) winL += distH[i] * distA[j];
                }
            }
            return winL;
        }

        function updateMiniChart(hgf, hgc, agf, agc) {
            const ctx = document.getElementById('miniChart').getContext('2d');
            const expH = (hgf + agc) / 2;
            const expA = (agf + hgc) / 2;
            const dataH = Array.from({length: 6}, (_, i) => poisson(i, expH));
            const dataA = Array.from({length: 6}, (_, i) => poisson(i, expA));

            if(poissonChart) poissonChart.destroy();
            poissonChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [0,1,2,3,4,5],
                    datasets: [
                        { label: 'Local', data: dataH, borderColor: '#38bdf8', tension: 0.4, fill: true, backgroundColor: 'rgba(56, 189, 248, 0.1)' },
                        { label: 'Visita', data: dataA, borderColor: '#22c55e', tension: 0.4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 8 } } } }
                }
            });
        }

        window.onload = () => updateMiniChart(1.75, 1.10, 1.30, 1.50);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Quantum Miner - Pro Tier</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bet-green: #006341; --bet-yellow: #ffeb00; --dark-bg: #050d0a; --accent-green: #00ff88; --gold-value: #ffd700; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        input { background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 0.5rem; }
        .recommendation-box { background: linear-gradient(90deg, #1e1b4b, #312e81); border: 1px solid #4338ca; padding: 15px; border-radius: 12px; }
        
        /* ESTILOS PROFESIONALES DE VALOR */
        .gold-bet { 
            background: rgba(255, 215, 0, 0.15) !important; 
            border-left: 5px solid var(--gold-value) !important;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
        .suspicious-value { color: #ff9800; text-decoration: underline dotted; }
        .matrix-cell { padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); font-size: 10px; }
        
        .mode-selector-pill { background: #111827; border-radius: 8px; padding: 4px; display: flex; gap: 4px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 6px; font-size: 9px; font-weight: 800; border-radius: 6px; text-transform: uppercase; transition: all 0.2s; }
        .mode-btn.active { background: #059669; color: white; }
        .mode-btn.inactive { color: #4b5563; }

        .best-market-row { background: rgba(255, 235, 0, 0.07) !important; box-shadow: inset 4px 0 0 0 var(--bet-yellow); }
        .badge-gold { background: var(--gold-value); color: black; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">
                BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase tracking-widest text-emerald-400 not-italic ml-1">QUANTUM MINER v4.0</span>
            </h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1 text-[10px]">
                <div class="px-3 py-1 bg-slate-700 rounded text-slate-300">8-12% EDGE TARGET</div>
                <div class="px-3 py-1 bg-slate-700 rounded text-slate-300">WEIGHTED POISSON (8G)</div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div id="strategy-assistant-box" class="recommendation-box hidden mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-black text-blue-300 uppercase mb-1"><i class="fa-solid fa-robot mr-2"></i>INTELIGENCIA DE MERCADO</h3>
                    <div id="strategy-text" class="text-sm text-white font-medium italic">Analizando variables...</div>
                </div>
                <div id="strategy-signal" class="text-2xl animate-bounce"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-bet-yellow uppercase mb-4 italic underline decoration-emerald-500">Configuración deλ</h2>
                
                <div class="mode-selector-pill">
                    <button id="mode-avg" onclick="setEntryMode('avg')" class="mode-btn active">xG Directo</button>
                    <button id="mode-total" onclick="setEntryMode('total')" class="mode-btn inactive">Ponderado (8 Partidos)</button>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="league_name" class="w-full p-2 text-xs" placeholder="Liga (Ej: Premier)">
                        <input type="text" id="event_name" class="w-full p-2 text-xs" placeholder="Partido">
                    </div>
                    
                    <div id="weighted-inputs" class="hidden grid grid-cols-2 gap-2">
                        <div class="col-span-2 text-[9px] text-emerald-400 font-bold uppercase text-center mb-1">Goles en los últimos 8 juegos</div>
                        <input type="number" id="h_last3" class="p-2 text-xs" placeholder="Local Últ 3">
                        <input type="number" id="h_prev5" class="p-2 text-xs" placeholder="Local Ant 5">
                        <input type="number" id="a_last3" class="p-2 text-xs" placeholder="Vis. Últ 3">
                        <input type="number" id="a_prev5" class="p-2 text-xs" placeholder="Vis. Ant 5">
                    </div>

                    <div id="direct-inputs">
                        <div class="p-3 bg-slate-800/40 rounded-xl border border-white/5 mb-3">
                            <label class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Media Goles Local</label>
                            <input type="number" id="h_gf" step="0.01" class="w-full p-2 text-center text-xl font-bold" placeholder="1.75">
                        </div>
                        <div class="p-3 bg-slate-800/40 rounded-xl border border-white/5">
                            <label class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Media Goles Visitante</label>
                            <input type="number" id="a_gf" step="0.01" class="w-full p-2 text-center text-xl font-bold" placeholder="1.25">
                        </div>
                    </div>
                    
                    <button onclick="calculate()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all shadow-lg">Simular Probabilidades</button>
                </div>
            </div>

            <div id="visual-section" class="lg:col-span-2 glass-card p-6 rounded-2xl">
                <div class="h-[250px]"><canvas id="poissonChart"></canvas></div>
                <div class="mt-4 grid grid-cols-6 gap-1" id="score-matrix"></div>
            </div>
        </div>

        <div id="table-section" class="glass-card rounded-2xl mt-6 overflow-hidden border border-white/5">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-slate-500 uppercase text-[10px] tracking-wider">
                    <tr>
                        <th class="p-4">Mercado Analizado</th>
                        <th class="p-4">Prob %</th>
                        <th class="p-4">Cuota Justa</th>
                        <th class="p-4">Cuota Bookie</th>
                        <th class="p-4">Edge (Valor)</th>
                        <th class="p-4">Kelly (1/8)</th>
                        <th class="p-4 text-center">Registro</th>
                    </tr>
                </thead>
                <tbody id="market-table" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let pChart;
        let entryMode = 'avg';

        function setEntryMode(mode) {
            entryMode = mode;
            document.getElementById('mode-avg').className = mode === 'avg' ? 'mode-btn active' : 'mode-btn inactive';
            document.getElementById('mode-total').className = mode === 'total' ? 'mode-btn active' : 'mode-btn inactive';
            document.getElementById('direct-inputs').classList.toggle('hidden', mode === 'total');
            document.getElementById('weighted-inputs').classList.toggle('hidden', mode === 'avg');
        }

        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        function poissonProb(k, l) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function calculate() {
            let h_l, a_l;

            if (entryMode === 'total') {
                // Lógica de Pesos: Últimos 3 partidos pesan 60%, anteriores 5 pesan 40%
                const h3 = (parseFloat(document.getElementById('h_last3').value) || 0) / 3;
                const h5 = (parseFloat(document.getElementById('h_prev5').value) || 0) / 5;
                h_l = (h3 * 0.6) + (h5 * 0.4);

                const a3 = (parseFloat(document.getElementById('a_last3').value) || 0) / 3;
                const a5 = (parseFloat(document.getElementById('a_prev5').value) || 0) / 5;
                a_l = (a3 * 0.6) + (a5 * 0.4);
            } else {
                h_l = parseFloat(document.getElementById('h_gf').value) || 0;
                a_l = parseFloat(document.getElementById('a_gf').value) || 0;
            }

            let p_over = 0, p_under = 0;
            const prob_h_zero = poissonProb(0, h_l);
            const prob_a_zero = poissonProb(0, a_l);
            const prob_btts_yes = (1 - prob_h_zero) * (1 - prob_a_zero);

            // Matriz y Probabilidades
            const matrix = document.getElementById('score-matrix');
            matrix.innerHTML = '';
            let labels = [], h_p = [], a_p = [];

            for(let h=0; h<=5; h++) {
                labels.push(h + "G");
                h_p.push(poissonProb(h, h_l));
                a_p.push(poissonProb(h, a_l));
                for(let a=0; a<=5; a++) {
                    const prob = poissonProb(h, h_l) * poissonProb(a, a_l);
                    if(h + a > 2.5) p_over += prob;
                    if(h + a < 2.5) p_under += prob;
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    cell.style.backgroundColor = `rgba(0, 255, 136, ${prob * 2.5})`;
                    cell.innerHTML = `<b>${h}-${a}</b><br>${(prob * 100).toFixed(1)}%`;
                    matrix.appendChild(cell);
                }
            }

            renderChart(labels, h_p, a_p);
            
            const marketData = [
                { id: 'o25', name: 'OVER 2.5 GOLES', prob: p_over },
                { id: 'u25', name: 'UNDER 2.5 GOLES', prob: p_under },
                { id: 'btts', name: 'BTTS (SÍ)', prob: prob_btts_yes }
            ];
            renderTable(marketData);
            showStrategy(p_over, prob_btts_yes);
        }

        function renderTable(data) {
            const table = document.getElementById('market-table');
            table.innerHTML = '';
            data.forEach(m => {
                const fair = (1 / m.prob).toFixed(2);
                table.innerHTML += `
                    <tr class="market-row" id="row_${m.id}">
                        <td class="p-4 font-bold text-slate-200">${m.name} <span id="badge_${m.id}"></span></td>
                        <td class="p-4 text-emerald-400 font-mono">${(m.prob * 100).toFixed(1)}%</td>
                        <td class="p-4 text-slate-500 font-mono">${fair}</td>
                        <td class="p-4"><input type="number" step="0.01" class="w-20 p-1 text-xs font-bold" oninput="updateEdge('${m.id}', ${m.prob})" id="odd_${m.id}" placeholder="Cuota"></td>
                        <td class="p-4 font-black" id="edge_${m.id}">--</td>
                        <td class="p-4 text-bet-yellow font-black" id="stake_${m.id}">--</td>
                        <td class="p-4 text-center"><button onclick="saveBet('${m.id}', '${m.name}', ${m.prob})" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold">REGISTRAR</button></td>
                    </tr>`;
            });
        }

        function updateEdge(id, prob) {
            const odd = parseFloat(document.getElementById('odd_' + id).value) || 0;
            const edgeEl = document.getElementById('edge_' + id);
            const stakeEl = document.getElementById('stake_' + id);
            const row = document.getElementById('row_' + id);
            const badge = document.getElementById('badge_' + id);

            if(odd > 1) {
                const edge = (odd * prob) - 1;
                const edgePct = (edge * 100).toFixed(1);
                edgeEl.innerText = edgePct + "%";
                
                // LÓGICA DE VALOR PROFESIONAL
                row.classList.remove('gold-bet');
                badge.innerHTML = "";

                if (edge >= 0.08 && edge <= 0.12) {
                    edgeEl.className = "p-4 text-yellow-400 font-black";
                    row.classList.add('gold-bet');
                    badge.innerHTML = `<span class="badge-gold ml-2">GOLDEN RANGE</span>`;
                } else if (edge > 0.15) {
                    edgeEl.className = "p-4 text-orange-500 font-black suspicious-value";
                    badge.innerHTML = `<span class="text-[8px] text-orange-400 ml-2">⚠️ SOSPECHOSO</span>`;
                } else if (edge > 0) {
                    edgeEl.className = "p-4 text-emerald-400 font-black";
                } else {
                    edgeEl.className = "p-4 text-red-500 font-black";
                }

                // Kelly Fraccionario (1/8)
                if (edge > 0) {
                    const k = (prob - (1 - prob) / (odd - 1)) * 0.125;
                    stakeEl.innerText = Math.max(0, k * 100).toFixed(2) + "%";
                } else {
                    stakeEl.innerText = "0.00%";
                }
            }
        }

        function showStrategy(po, pb) {
            const box = document.getElementById('strategy-assistant-box');
            const text = document.getElementById('strategy-text');
            const signal = document.getElementById('strategy-signal');
            box.classList.remove('hidden');

            if (po > 0.62) {
                text.innerText = "ALTA PROBABILIDAD DE GOLES. EXAMINA EL RANGO 8-12% EN OVER 2.5.";
                signal.innerText = "🎯";
            } else if (po < 0.38) {
                text.innerText = "ESCENARIO DEFENSIVO DETECTADO. POSIBLE VALOR EN EL UNDER.";
                signal.innerText = "🛡️";
            } else {
                text.innerText = "MERCADO EQUILIBRADO. BUSCA DISCREPANCIAS EN CUOTAS MAYORES A 2.10.";
                signal.innerText = "⚖️";
            }
        }

        function renderChart(labels, h_p, a_p) {
            const ctx = document.getElementById('poissonChart').getContext('2d');
            if(pChart) pChart.destroy();
            pChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Local', data: h_p, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' },
                        { label: 'Visitante', data: a_p, borderColor: '#f97316', tension: 0.4, fill: true, backgroundColor: 'rgba(249, 115, 22, 0.1)' }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
            });
        }

        function saveBet(id, market, prob) {
            const odd = document.getElementById('odd_' + id).value;
            if(!odd) return alert("Ingresa cuota.");
            alert("¡Apuesta Registrada!\nEnviando a base de datos con Edge de " + document.getElementById('edge_' + id).innerText);
        }
    </script>
</body>
</html>

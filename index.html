<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Data Hub PRO - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans custom-scrollbar">

    <header class="bg-gradient-to-r from-blue-900 to-blue-800 p-6 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-extrabold flex items-center gap-2 tracking-tight">
                <i class="fas fa-chart-line text-blue-400"></i> FOOTBALL<span class="text-blue-400">PRO</span>
            </h1>
            <div class="flex flex-col gap-1 w-full md:w-auto">
                <div class="flex gap-2">
                    <input type="password" id="api-key" 
                           class="bg-blue-950 border border-blue-700 rounded px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all text-sm"
                           placeholder="Tu API Key">
                    <button onclick="saveApiKey()" class="bg-blue-600 px-3 rounded hover:bg-blue-500 shadow-lg"><i class="fas fa-save"></i></button>
                </div>
                <span class="text-[10px] text-blue-200 opacity-70 italic uppercase tracking-widest text-right">* Proxy Optimizado v4</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="bg-gray-800/50 p-4 rounded-2xl mb-8 border border-gray-700 backdrop-blur-sm">
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="fetchCompetitions()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm">
                    <i class="fas fa-trophy"></i> Ligas
                </button>
                <button onclick="fetchMatches('TODAY')" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm">
                    <i class="fas fa-calendar-day"></i> Hoy
                </button>
                <button onclick="fetchMatches('LIVE')" class="bg-red-600 hover:bg-red-500 px-5 py-2.5 rounded-xl transition-all font-bold shadow-lg flex items-center gap-2 text-sm animate-pulse">
                    <i class="fas fa-satellite-dish"></i> En Vivo
                </button>
                <div class="flex items-center bg-gray-700 rounded-xl px-3 border border-gray-600">
                    <i class="fas fa-search-plus mr-2 text-gray-400"></i>
                    <input type="date" id="date-picker" onchange="fetchByDate(this.value)" class="bg-transparent text-sm focus:outline-none py-2 uppercase font-mono">
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center my-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-500 h-16 w-16 mb-4"></div>
            <p class="text-blue-400 animate-pulse font-mono">PROCESANDO DATOS...</p>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500 border-2 border-dashed border-gray-800 rounded-3xl">
                <i class="fas fa-terminal fa-4x mb-4 opacity-20"></i>
                <p class="text-xl font-light italic">Esperando comando de entrada...</p>
            </div>
        </div>
    </main>

    <script>
        const PROXY_URL = 'https://corsproxy.io/?'; 
        const API_BASE = 'https://api.football-data.org/v4';

        // Cargar Key guardada al iniciar
        window.onload = () => {
            const savedKey = localStorage.getItem('fb_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };

        function saveApiKey() {
            const key = document.getElementById('api-key').value;
            localStorage.setItem('fb_api_key', key);
            alert('API Key guardada localmente');
        }

        async function apiRequest(endpoint) {
            const apiKey = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            loader.classList.remove('hidden');
            const targetUrl = `${API_BASE}/${endpoint}`;
            const finalUrl = PROXY_URL + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(finalUrl, {
                    method: 'GET',
                    headers: { 'X-Auth-Token': apiKey, 'Accept': 'application/json' }
                });
                
                if (response.status === 429) throw new Error("RATELIMIT: Máximo 10 peticiones por min.");
                if (!response.ok) throw new Error(`HTTP ERROR: ${response.status}`);
                
                const data = await response.json();
                loader.classList.add('hidden');
                return data;
            } catch (error) {
                loader.classList.add('hidden');
                content.innerHTML = `
                    <div class="col-span-full bg-red-950/30 border border-red-500/50 p-8 rounded-3xl text-center">
                        <i class="fas fa-microchip text-4xl mb-4 text-red-500"></i>
                        <p class="text-red-400 font-mono uppercase tracking-tighter">${error.message}</p>
                    </div>`;
                return null;
            }
        }

        async function fetchCompetitions() {
            const data = await apiRequest('competitions');
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = '';

            const freeTierCodes = ['WC', 'CL', 'BL1', 'DED', 'SA', 'PL', 'FL1', 'ELC', 'PPL', 'EC', 'CLI'];
            const availableLeagues = data.competitions.filter(c => freeTierCodes.includes(c.code));

            availableLeagues.forEach(league => {
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 hover:border-blue-500 transition-all shadow-xl group relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
                            <img src="${league.emblem}" class="w-32">
                        </div>
                        <div class="flex items-center gap-4 mb-6 relative z-10">
                            <img src="${league.emblem}" class="w-14 h-14 object-contain">
                            <div>
                                <h3 class="text-xl font-bold leading-tight">${league.name}</h3>
                                <span class="text-xs text-blue-400 font-mono">${league.area.name}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 relative z-10">
                            <button onclick="fetchStandings('${league.code}')" class="bg-blue-700/20 hover:bg-blue-600 text-blue-400 hover:text-white p-2 rounded-lg text-xs font-bold transition-all border border-blue-700/50">
                                CLASIFICACIÓN
                            </button>
                            <button onclick="fetchScorers('${league.code}')" class="bg-amber-700/20 hover:bg-amber-600 text-amber-400 hover:text-white p-2 rounded-lg text-xs font-bold transition-all border border-amber-700/50">
                                GOLEADORES
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function fetchScorers(code) {
            const data = await apiRequest(`competitions/${code}/scorers`);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "block w-full";
            
            content.innerHTML = `
                <div class="bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700">
                    <div class="p-6 bg-gradient-to-r from-amber-900/50 to-gray-800 flex justify-between items-center border-b border-gray-700">
                        <h2 class="text-2xl font-black italic underline decoration-amber-500">TOP SCORERS - ${data.competition.name}</h2>
                        <button onclick="fetchCompetitions()" class="bg-gray-700 p-2 rounded-full hover:bg-gray-600"><i class="fas fa-times px-2"></i></button>
                    </div>
                    <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${data.scorers.map(s => `
                            <div class="flex justify-between items-center bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 bg-amber-500 rounded-full flex items-center justify-center font-bold text-gray-900 text-xs">
                                        ${s.goals}
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-100">${s.player.name}</p>
                                        <p class="text-[10px] text-gray-400 uppercase tracking-widest">${s.team.name}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-amber-500 font-mono">${s.assists || 0} ASIST.</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        async function fetchByDate(date) {
            await fetchMatches(`CUSTOM?dateFrom=${date}&dateTo=${date}`);
        }

        async function fetchMatches(mode) {
            let endpoint = 'matches';
            if (mode === 'LIVE') endpoint += '?status=IN_PLAY';
            if (mode.startsWith('CUSTOM')) endpoint += `?${mode.split('?')[1]}`;
            
            const data = await apiRequest(endpoint);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            content.innerHTML = '';

            if (!data.matches || data.matches.length === 0) {
                content.innerHTML = '<div class="col-span-full text-center p-20 bg-gray-800 rounded-3xl border border-gray-700 italic">No hay registros para este periodo.</div>';
                return;
            }

            data.matches.forEach(match => {
                const date = new Date(match.utcDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                content.innerHTML += `
                    <div class="bg-gray-800 rounded-2xl p-5 border-t-4 ${match.status === 'IN_PLAY' ? 'border-red-500 animate-pulse' : 'border-gray-700'} shadow-xl">
                        <div class="flex justify-between text-[10px] text-gray-500 mb-4 font-bold uppercase tracking-widest">
                            <span>${match.competition.name}</span>
                            <span>${date}</span>
                        </div>
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex-1 text-center">
                                <img src="https://crests.football-data.org/${match.homeTeam.id}.png" class="w-10 h-10 mx-auto mb-2 onerror="this.src='https://via.placeholder.com/40'">
                                <p class="text-xs font-bold uppercase truncate">${match.homeTeam.shortName}</p>
                            </div>
                            <div class="flex flex-col items-center">
                                <div class="text-2xl font-black font-mono bg-black/40 px-3 py-1 rounded-lg text-emerald-400 border border-emerald-500/20">
                                    ${match.score.fullTime.home ?? 0}:${match.score.fullTime.away ?? 0}
                                </div>
                                <span class="text-[9px] mt-2 text-gray-400 font-bold tracking-tighter">${match.status}</span>
                            </div>
                            <div class="flex-1 text-center">
                                <img src="https://crests.football-data.org/${match.awayTeam.id}.png" class="w-10 h-10 mx-auto mb-2" onerror="this.src='https://via.placeholder.com/40'">
                                <p class="text-xs font-bold uppercase truncate">${match.awayTeam.shortName}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function fetchStandings(code) {
            const data = await apiRequest(`competitions/${code}/standings`);
            if (!data) return;

            const content = document.getElementById('content');
            content.className = "block w-full";
            const tableData = data.standings[0].table;

            content.innerHTML = `
                <div class="bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700">
                    <div class="p-6 bg-gray-750 flex justify-between items-center border-b border-gray-700">
                        <div class="flex items-center gap-3">
                            <img src="${data.competition.emblem}" class="w-10">
                            <h2 class="text-2xl font-black uppercase">${data.competition.name}</h2>
                        </div>
                        <button onclick="fetchCompetitions()" class="bg-gray-700 p-2 rounded-full hover:bg-gray-600 transition-colors"><i class="fas fa-arrow-left px-2"></i></button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-black/20 text-gray-400">
                                <tr class="uppercase text-[10px] tracking-widest">
                                    <th class="p-4 text-left">Pos</th>
                                    <th class="p-4 text-left">Club</th>
                                    <th class="p-4 text-center">PJ</th>
                                    <th class="p-4 text-center">G</th>
                                    <th class="p-4 text-center">E</th>
                                    <th class="p-4 text-center">P</th>
                                    <th class="p-4 text-center font-bold text-white">PTS</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableData.map(t => `
                                    <tr class="border-t border-gray-700 hover:bg-blue-500/5 transition-colors">
                                        <td class="p-4 font-mono font-bold">${t.position}</td>
                                        <td class="p-4 flex items-center gap-3">
                                            <img src="${t.team.crest}" class="w-6 h-6 object-contain">
                                            <span class="font-bold text-gray-200">${t.team.name}</span>
                                        </td>
                                        <td class="p-4 text-center text-gray-400 font-mono">${t.playedGames}</td>
                                        <td class="p-4 text-center text-emerald-500 font-mono">${t.won}</td>
                                        <td class="p-4 text-center text-gray-500 font-mono">${t.draw}</td>
                                        <td class="p-4 text-center text-red-500 font-mono">${t.lost}</td>
                                        <td class="p-4 text-center font-black text-blue-400 bg-blue-500/5">${t.points}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>

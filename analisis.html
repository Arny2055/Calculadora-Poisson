<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS Pro - Análisis de ROI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark-bg: #050d0a; --bet-yellow: #ffeb00; }
        body { background-color: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bet-card-custom { background: linear-gradient(145deg, #111827, #0d1117); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .status-win { border-top: 4px solid #22c55e; }
        .status-loss { border-top: 4px solid #ef4444; }
        .status-pending { border-top: 4px solid #eab308; }
        .metric-badge { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input, select { background: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 6px; padding: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-emerald-500/20 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white">BET<span class="text-bet-yellow">AGS</span> <span class="text-[10px] uppercase text-emerald-400 not-italic ml-1">ROI ANALYSIS</span></h1>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1">
                <a href="calculadora.html" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400">CALCULADORA</a>
                <a href="analisis.html" class="px-4 py-2 rounded-lg text-sm font-bold bg-slate-700 text-bet-yellow">ANÁLISIS DE ROI</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-6">
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Profit Total</p><p id="m-profit" class="text-lg font-bold text-white">$0</p></div>
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Yield</p><p id="m-yield" class="text-lg font-bold text-emerald-400">0%</p></div>
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Bankroll</p><p id="m-bank" class="text-lg font-bold text-white">$100</p></div>
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Win Rate</p><p id="m-hit" class="text-lg font-bold text-blue-400">0%</p></div>
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Picks</p><p id="m-count" class="text-lg font-bold text-slate-300">0</p></div>
            <div class="metric-badge"><p class="text-[9px] text-slate-500 uppercase">Avg Odd</p><p id="m-avg-odd" class="text-lg font-bold text-purple-400">0</p></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl">
                <h3 class="text-sm font-black text-emerald-400 uppercase italic mb-4">Filtros de Auditoría</h3>
                <div class="space-y-4">
                    <div><label class="text-[9px] text-slate-500 uppercase block">Mercado</label><select id="f_market" class="w-full" onchange="updateStats()"><option value="">TODOS</option><option value="OVER">OVER</option><option value="UNDER">UNDER</option></select></div>
                    <div><label class="text-[9px] text-slate-500 uppercase block">Tipo</label><select id="f_type" class="w-full" onchange="updateStats()"><option value="">TODOS</option><option value="strategic">ESTRATÉGICOS</option></select></div>
                    <button onclick="exportJSON()" class="w-full bg-slate-800 text-[10px] py-2 rounded font-bold hover:bg-slate-700 transition-all">Exportar Datos</button>
                    <button onclick="clearData()" class="w-full bg-red-900/20 text-red-500 text-[10px] py-2 rounded font-bold hover:bg-red-900/40">Limpiar Todo</button>
                </div>
            </div>
            <div class="lg:col-span-2 glass-card p-6 rounded-2xl h-[300px]">
                <canvas id="bankrollChart"></canvas>
            </div>
        </div>

        <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mt-8"></div>
    </div>

    <script>
        const BANKROLL_BASE = 100;
        let bets = JSON.parse(localStorage.getItem('betags_v3_miner')) || [];
        let bChart;

        function updateStats() {
            const fMar = document.getElementById('f_market').value;
            const fTyp = document.getElementById('f_type').value;

            const filtered = bets.filter(b => 
                (fMar === "" || b.market.includes(fMar)) && 
                (fTyp === "" || (fTyp === "strategic" && b.isStrategic))
            );

            const resolved = filtered.filter(b => b.status !== 'pending');
            const totalProfit = resolved.reduce((a, b) => a + b.profit, 0);
            const totalStaked = resolved.reduce((a, b) => a + b.stake, 0);
            const wins = resolved.filter(b => b.status === 'win').length;

            document.getElementById('m-profit').innerText = "$" + totalProfit.toFixed(2);
            document.getElementById('m-yield').innerText = (totalStaked > 0 ? (totalProfit/totalStaked*100).toFixed(1) : 0) + "%";
            document.getElementById('m-bank').innerText = "$" + (BANKROLL_BASE + totalProfit).toFixed(2);
            document.getElementById('m-hit').innerText = (resolved.length > 0 ? (wins/resolved.length*100).toFixed(1) : 0) + "%";
            document.getElementById('m-count').innerText = resolved.length;
            document.getElementById('m-avg-odd').innerText = resolved.length > 0 ? (resolved.reduce((a,b) => a+b.odd, 0)/resolved.length).toFixed(2) : "0";

            renderHistory(filtered);
            renderBankrollChart(resolved);
            
            // Sincronizar con el asistente estratégico de la otra pestaña
            localStorage.setItem('backtesting_data', JSON.stringify(resolved.map(b => ({
                liga: b.league, mercado: b.market, profit: b.profit, stake: b.stake, cuota: b.odd
            }))));
        }

        function renderHistory(data) {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = '';
            data.forEach(b => {
                const card = document.createElement('div');
                card.className = `bet-card-custom status-${b.status}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div><span class="text-[10px] text-emerald-500 font-black">${b.league}</span><h2 class="text-lg font-bold">${b.teams}</h2></div>
                        ${b.isStrategic ? '<span class="bg-emerald-500 text-black text-[9px] px-2 py-0.5 rounded font-bold">💎 REAL</span>' : ''}
                    </div>
                    <div class="grid grid-cols-2 gap-2 bg-black/20 p-3 rounded-xl text-xs mb-4">
                        <div><p class="text-slate-500">Mercado</p><p class="font-bold">${b.market}</p></div>
                        <div><p class="text-slate-500">Cuota</p><p class="font-bold">${b.odd}</p></div>
                        <div><p class="text-slate-500">Stake</p><p class="font-bold">$${b.stake.toFixed(2)}</p></div>
                        <div><p class="text-slate-500">Profit</p><p class="font-bold ${b.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}">$${b.profit.toFixed(2)}</p></div>
                    </div>
                    <div class="flex gap-2">
                        ${b.status === 'pending' ? `
                            <button onclick="resolve(${b.id}, 'win')" class="flex-1 bg-emerald-600/20 text-emerald-400 py-2 rounded-lg font-bold text-xs hover:bg-emerald-600 hover:text-white">GANADA</button>
                            <button onclick="resolve(${b.id}, 'loss')" class="flex-1 bg-red-600/20 text-red-400 py-2 rounded-lg font-bold text-xs hover:bg-red-600 hover:text-white">PERDIDA</button>
                        ` : `<button onclick="resolve(${b.id}, 'pending')" class="flex-1 bg-slate-800 text-slate-400 py-2 rounded-lg text-xs">REINICIAR</button>`}
                        <button onclick="deleteBet(${b.id})" class="p-2 text-slate-500 hover:text-white"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function resolve(id, status) {
            const b = bets.find(x => x.id === id);
            if(!b) return;
            b.status = status;
            b.profit = (status === 'win') ? b.stake * (b.odd - 1) : (status === 'loss' ? -b.stake : 0);
            save();
        }

        function deleteBet(id) { if(confirm('¿Borrar?')) { bets = bets.filter(x => x.id !== id); save(); } }
        function save() { localStorage.setItem('betags_v3_miner', JSON.stringify(bets)); updateStats(); }
        function clearData() { if(confirm('¿Borrar TODO el historial?')) { bets = []; save(); } }
        function exportJSON() { window.open("data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bets))); }

        function renderBankrollChart(resolved) {
            const ctx = document.getElementById('bankrollChart').getContext('2d');
            if(bChart) bChart.destroy();
            let current = BANKROLL_BASE;
            const data = [BANKROLL_BASE, ...[...resolved].reverse().map(b => { current += b.profit; return current; })];
            bChart = new Chart(ctx, {
                type: 'line',
                data: { labels: data.map((_, i) => i), datasets: [{ data, borderColor: '#00ff88', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0, 255, 136, 0.05)' }]},
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' } } }, plugins: { legend: { display: false } } }
            });
        }

        window.onload = updateStats;
    </script>
</body>
</html>
